body:
  text: 懷清堂集卷六吏部侍郎湯右曾撰出國門别諸子王程趣辦嚴結束事逺役昨宵故人酒離思紛已迫今朝城南門風雨晦行迹依依戀親愛渺渺怨違隔須臾意不忍況在歲年别青山去逶迤待此萬里客遙憐牂牁水漾漾瘴雲白回頭九衢塵燈火夢疇昔清遊知幾時悵望勞思積涿州南涉溝連北涉溝肅皇無復舊宫樓鳯池院裏新眉色一帶青山入涿州獲鹿懷古石邑西來入亂雲花光嵐氣漸氤氲清思童水千巖束險接陘山一線分東海青林神女廟南荒黃屋尉陀墳茫茫舊史堪慿處剩有蒼煙送夕曛憩曹氏水亭澄泓鹿泉水流出碧山岑幽徑一支瀉虛亭四面臨翠深滋竹色雲薄散林陰濯足石潭曲松風清我心為家兄篆辛題煙江圖畫出長江疊嶂圖青林潮沒片帆孤歸心己逐鴟夷子一點煙波落五湖兄弟東山志趣同可憐束帶已成翁心知不愛髙官職樓閣江天夢想中韓明府席上弦索爭將風月清梨園小部最知名人間歇絶花奴手九歲誰傳羯鼓聲真定道中滹沱一水抱城回慘慘平蕪朔吹哀全趙山河平似掌晚來風雨過寒臺順德懷陳叔毅趙國檀臺已廢丘幾行雲樹接沙溝草中蝌蚪書應在城下鴛鴦水自流酒肉朱門堪失笑風埃青鬢足間愁最憐覔句陳無已短䇿方為梁宋遊登叢臺霸圖銷歇入間憑雲閣岧嶤最上層斜日煙蕪迷二水悲風猿鶴散三陵美人池畔蛾眉淺鼎士臺中袨服曾不斷太行山莽蒼西來猶似識衰興磁州道中夾隄栁色映泉流滏口清源滙曲溝二十里中荷葉路水風吹緑到磁州過鄭州雨後道濘肩輿雜出村落畦隴間青蔥彌望甚可樂也午炊滎河飯晚指鄭城宿雨後清風生一日變涼燠僕夫畏泥濘迂道幾縈曲落身禾麻中平野舞淨緑敷榮己可愛未暇計成熟平生老農書雖好未竟讀微官田園興久矣念空蓄但求陽羡米敢盜太倉粟吾儕亦何須衣食望粗足提筐出村女聨袂共牆屋悵焉感逺逰萬里雙轉轂出西門一絶句髙低坡隴到今存槐栁隂中碌碡村我亦天涯念兄弟斜風細雨鄭西門寄錢石臣洛陽穀城伊闕鬱青蒼水北山南古洛陽第一邦人重經術遺碑存否蔡中郎北地深知苦旱多千金遺堨近如何銅龍古器非難得便是元康繼太和渌水池應付劫灰團焦光氣本天開由來磊落英雄事愛爾髙歡酒一杯九僧遺集叩禪關詩社風流逝不還何日縣南三十里龍門諸寺接香山春鳥秋蟬相續鳴東陽門外聼松聲伊川修竹真堪買便合移家住洛城東皋禾黍繞茅茨驅馬悠悠周道遲望裏何由見宛平洛幾回循諷右丞詩禹州贈吳尉頗愛人間杜五郎閉門不出十年強先生可是黎陽尉試覔涼陰一本桑六六峯前好卜居丈人澗上未全疏蘇州莫漫嗟卑吏春草生時合著書馬上一天涼露斗斜橫羅薦輕寒近五更殘夢白河三十里水葒花氣杜鵑聲卧龍岡古之求志人往往雜耕釣嗚呼諸葛公伊吕得同調隆中吟梁父妙意寄歌嘯三分限王業一隅割巴徼艱危氣逾振成敗事難料萬騎祁山東長星晦光耀英雄襟上淚時往不可弔我來卧龍岡目盡逺山眺蜿蜒西南斷千里自嵩少遙峯銜落日小閣耿餘照虛寢蔭疏槐上或施蘿蔦英靈猶髣佛蜀魄子規呌成都八百桑古柏賸遺廟極望勞峨岷夜猿同噭噭新野今日樂莫樂水上兩菖蒲不知何年花一笑風回裾公私亂蛙聲兩部鳴不已安得挾彈過湛湛一池水白水村風俗東都記文章西鄂存赤符千歲歷白水數家村銅馬何知帝蒼龍尚有孫原陵蕭瑟久里社薦盤飱襄陽懷古馬蹄一蹴失荆門百戰山河殘角聲估客帆檣依斷戌人家水竹暗孤城干戈格鬬英雄事賓從風流江漢情鄴下諸郎如虎兕不爭劉表一書生大隄曲去去隄下舟望望隄上樓鯉魚風信急漢水不西流宛轉唱桃葉哀怨歌竹枝攔街白銅鞮何如襄陽兒美人楚雲端明璫大隄下一曲歌落梅肯换千金馬結伴踏青遊新妝待明發日暮行雨歸自惜雙羅襪緑水浸紅紗橫塘漢皋曲五月南風生一夕北人宿郎網縮項鯿一網出千頭持妾金錯刀欲前却還羞王師北征大捷凱旋恭紀憶趨班劍屬車旁萬乘旌旄下朔方共識霆威臨北户一時兵氣壓西羌朱旗晴閃天王字青海秋寒太白芒鬱鬱關門吹急雪大風雲起看飛揚春遲苜蓿尚枯荄竟夕叢生天馬來九驛山川皆禹服萬靈風雨護軒臺前軍一戰妖氛滅邊燧全銷絶域開諸將不須分道入六師爭唱凱歌回陰山天外插長屏積甲髙齊熊耳形磧北己遮唐塞隧漠南敢近漢邊庭規恢社稷基磐石一用干戈勢建瓴萬帳降人皆不殺始知寬大在朝廷極北心殷隔九關喜聞霄漢捷書頒溫禺韙獻燕然下阿布思擒瀚海還廟算如神收絶幕侍臣刻石紀封山自慚喻蜀西南徼威德應須曉百蠻登峴山亭至甘泉寺籃輿嘔軋傍城隈積霧霾陰黯不開一磴自穿雲氣入萬峯爭送雨聲來山川浩蕩今如此裘帶風流安在哉千載牛山共揮涕古苔秋井易心哀雲藏巖谷晝冥冥忽聽天風響佛鈴草際老僧迎客至煙中修竹入門青坐來瀛海茫茫地盡失山川漠漠形休問葡萄撥醅後甘泉一酌自清泠午後忽開霽襄樊歷歷在目誰教洗出翠姢姢恰與青鞋布襪便飛灑雨猶行下界笑談人己坐諸天雲生重覺衣裳潤谷轉還欣草樹連不數太行晴了了山靈亦似舊因緣習家池賢達不買名況乃盡醉時山翁坐鎮日酩酊何所為舉鞭問愛將拍手笑童兒風流徑千載流詠髙陽池臨鳯皇灘望鹿門諸山漢廣詎輕涉況此驟風雨既霽昏翳除白浪猶掀舞江亭晚置酒悵望臨極浦隔江鹿門山列嶂淡可數中有隱君子塵枉笑州府崔徐亦雅遊牀下誰客主襄陽耆舊盡樵牧煙中塢蔡州髙唱歇渺渺雲端樹南睇漁浦潭水深魚所聚漁人競賽神坎坎叢祠鼓會看澄潭下巨鱗出網罟明日復過灘上我昨凌飛湍足踏千仞石濤波不可渡萬竅號竟夕坐笑片帆耳蛟龍爾何惜空令雲木杪隔此棲遁迹明朝初日亮馬嘶行意迫林端霞色明沙外練光白頓驚夷險異波軟穩如席重留豈不佳嚴程逺于役車中省登覽嗒然恍夙昔青山爭向背眷眷昨遊客漢江還送我十里照衣碧顧此雲物間羡彼魚鳥適人生如蓬飄西東我何擇但愧抱甕老五畝得安宅魚梁近可指何處雲夢澤回望穀隱山山寺失咫尺它年覷熊緣還著永嘉屐斑竹鋪北十里曉起風露濕暗中草木香微聞蟲啾唧漸覺山低昻一線緣蟻上中休似蟄藏荆南己如此愁絶瘴雲鄉龍山寺樓清絶龍山寺松杉六月寒斜光低雉堞逺勢出檣竿雲物堪銷夏江天入倚闌傳聞潭五色步屣試求看五色潭在寺左側荆州剩礎遺隍問舊疆龍門馬牧總茫茫接天波浪三江口橫地風雲百戰場尚有帆檣下巴蜀無多户口在耕桑不堪原野蕭條地吹角重城倚夕陽戎馬壬申逮甲申萬家煙火幾家存人如刲豕屠羊慘事異黃巾青犢論妖樹禍生天北極怪風寒捲郡南門龍陂橋外坡陀血誰洗忠臣九地魂地形天險楚江寬欲借荆州自古難虛笑百人稱武吏豈同列郡領材官雲臺特給親軍仗玉帳新登上將壇駿馬健兒君識否時平政要重師干黃灘一線勢危哉駭浪驚濤打岸回水國分麞空入市秋風卧虎想登臺迅從巫峽千盤下濁比洪河萬里來每念築堤能捍水始知髙氏亦雄才髙氏堤五百三十里孱陵沙雜山厨飯風吹野館燈江深波浪惡月黑到孱陵公安城東門駕小舟沿陂湖入不翳禪院散帶披襟村路東小橋流水曉煙中行穿徑窄家家竹唤得帆輕葉葉風但有僧皆堪入社況逢酒恰載連筒時舟子方以買酒至邑緑漪笑爾波三尺一任蛟龍萬仞宫塵中無地避炎蒸濯足滄浪勝踏氷清梵依依煙寺出竒峯歷歷火雲升百年著我真浮客一飯何人愧老僧菱葉荷花雙槳路他時聊記昔遊曾晚過來雲庵暑光漸退晚涼天羽扇絺衣就夜禪修竹遍栽鄰徑後清江橫繞寺門前無猜沙鳥應如我重到山雲不記年一室優曇花是否盆中草木總蒼然夜半渡蘭江比曉至新田鋪岡巒林木鬱然深秀頓忘行役之勞矣澤國多清川方舟得屢渡蘭江波似鏡雙楫自沿泝昨來白沙洲沙際起宿鷺還尋洗墨池崖崩己非故來雲佛燈上一縷香煙度澄波延餘賞暝色入徐步三更天風生缺月光微吐星芒翻上下黯黮沈水霧列炬棲鳥驚征夫即前路性怯既畏馬且還登我車登車苦顛頓夢寐無安舒復起攬衣裳暗中思故書澧陽舊有蘭可紉不可鋤只今白石上齒齒誰復餘物理異今昔人事同盈虛時見荒陂中清露洗芙蕖山腰列騎疏熹微見曙色天光一以辨萬象誰得匿巖巒走坡陀蒼翠淨如拭髙低林木暗清泉流湜湜冥濛南山雲俄頃滿山北山靈欲出雨久旱潤黍稷吾行叩村扉一笑得飽食朱立山太守見枉新詩奉答夜涼卷帙自回環坐聽青猿夢裏還倣佛白綿紅雨句謝公亭外舊青山太守有白綿鋪細草紅雨落芳溪句往時在敬亭作也夜郎西下最思君水復山長去住分栁葉湖邊連夕雨桃花洞口萬重雲澄江如練日哦詩公事蕭間晝漏遲亦有清平賢太守不曾拜表賀龍池朗州司馬行吟處野水荒煙一片平今日武陵溪上路與君同聽竹枝聲白馬渡山勢垂將絶江聲撼殷空磴初盤鳥道人欲倚天風逼仄喧呼急艱難道路巾逺看帆影落煙渚曉濛濛入桃源山牽蘿捫葛拾級而上洞穴宛然還過遇仙橋細流淙淙欲求漁人纜船之所了不可得故碑亦剝落無復存者狹路披榛入仙源杳不逢空餘石橋水蒼蘚認遺蹤山鳥幽自哢溪雲間更封野僧無一事飯罷午時鐘世外神仙宅雲中雞犬聲捨舟何路入沿棹有人行聞道春來水桃花幾瓣橫年年流出在長共楚江清長阪鋪雨後蒼溪西去總山程水穴風巖盡意行隔嶺雲含殘雨氣抱枝蟬帶蚤秋聲峯攢古木陰陰秀雪濺奔泉瀏瀏清正是暑消千嶂裏緑黏芳草愛初晴辰龍關束馬懸崖險關門鬱不開居然橫戟地曾此挂弓回浩蕩妖星落蒼茫野吹哀兵家爭間道為語勒銘才諸將破賊從郭家溪小路入馬鞍山山行日以髙起伏勢未已盤紆衆峯盡一峯倚天起峯峯相羅絡雲氣間其裏雲生始膚寸萬狀變譎詭須臾滿太虛一氣失俯視雷聲如嬰兒雨在絶壑底不圖人間世險絶轉可喜汗漫乞天漿嵌空抉石髓正從九州外㵼此一泓水七盤嶺百里轉絶壁萬木枝交撑下臨不測溪浩浩但有聲今來登歷異目擊心己驚四虛無依倚巖崿起崢嶸石塌容足劣徑垂如髮縈急雨吹山風重陰匿光晶山髙風轉削颯然飄襟纓古人仗忠信入險無異營性命絶可憐煩憂一時并青林隱鬼火白日來山精誰能禦魑魅懷緬傷我情七夕詞針樓河漢低露氣晚淒迷此夕清猿呌良人過五溪修纎月一痕長眉畫初嫁可憐新女兒燒香繡簾下為君買香羅裁為金縷衣春風著來舞蛺蝶一雙飛辰州江樓楚澤深來地轉靈浮香沅芷繞回汀竹郎祠外昏山雨燕子巖邊疊畫屏五嶺佛桑開更白嶺表有紅佛桑頃在太守齋中乃更見白者兩京虀菜采還青武陵一曲吹羌笛言語侏􅍣不可聽漫成天星寨髙山入雲羣苗捷若猿猱羣十餘年前此窟穴􅀈木營下屯諸軍堂堂大將執枹鼓汾陽逺孫闞虓虎莫道潭中巨鯉魚橫海長鯨膏砧斧村市鈔奪愁精夫漢家賨布充國租熟苗咿嚘生苗樂順宜噢喣逆當誅紅旗山下人相呼丈二尚有君王殳辰陽莫輕楚門户逺控粵蜀滇黔隅錦州大姓彭與田願比內郡興國年長官宣慰吁可惜表裏偵伺為諸姦正嘉以還頻作孽麻瀘二邑無炊煙安得感恩秦刺史組練三千誓同死官軍至多苗不畏不怕軍多怕糧多此昔苗語也餽餉不繼兵且退箐林伏弩利鋋矛一縱獵火宜髙秋人言石壘果可築上因懸崖下深谷地形天險人必爭州家官府尤清平昔者乾道盧陽西特與諸蠻布威信武安不救馬邑戮古重徼功啓邊釁方今天子德唐堯四門穆穆九譯朝如天好生性不殺苗乎苗乎爾莫驕江樓晚坐渺渺危欄外涔涔暮雨來江山抱城郭燈火間樓臺濁浪浮槎逺崩濤觸石回三川驚暴漲愁絶且當杯江漲行君不見辰州城南夜將午馮夷江心起槌鼓老蛟跋浪濳虯舞六丁天符遣行雨江聲如雷轟百怪雨腳如麻垂萬縷沈沈三日白晝冥仰視漏天那得補萬溪環滙崩奔流泛溢漸逼中南樓間茅我亦江岸住日側水勢聨方舟初來忩中星斗近爾日户內魚蝦稠天瓢頓翻兩龍子海眼誰鎮三犀牛窮山大樹蔽江下傍水老屋隨波浮災祥未省五行志頽壓自為千家愁街中乘船朝入市父老驚嗟童稚喜傳説曾經萬歷時七十餘年重見此人家半扉何足道屋瓦沙痕留水底心慚河內乘軺車浪説周南滯太史百憂集行路難明朝欲往愁飛湍驅黿役鵲不得渡中夜敧枕危難安從來楚俗重禱祀江神應復哀我頑香煙未絶風西南宿雨欲洗山拖藍晚霽二首枕席濤瀾上人間憂患長身真踏鼇背路尚阻羊腸日月終開霽風雷已退藏忽傳江漲落喜極倒衣裳每恐髙城決猶欣巨浸平鯨鯢終窟宅燕雀且生成捍患時方急橫流禍不輕漫勞喧鼓角悲健雜江聲詠古伏波三輔英寄迹關隴間晚成遇英主名並蕭曹扇據鞍矍鑠翁垂老征羣蠻壺頭咽喉扼成功詎云難道暑水毒淫跕跕愁飛鳶曵足視鼓譟見者猶哀憐身死印綬收勳髙賞不延傷哉薏苡車讒鼎應雕鐫觀其誡子弟刻鵠逺咎愆誰能易世後擩嚌防未然峩峩銅柱標長留極南天蠻祠喧簫鼓珓斚亦告虔巫言神醉止野老舞躚躚突兀虛殿瓦歲久溜雨穿薄帷飄回風仿像識遺顔緬思雲臺畫弔古留餘澘三閭身既放長鋏帶陸離瑶圃駕青虬崑崙驂白螭恢之言彌廣侘傺世莫知上沅乘舲船凝滯江水湄辰陽既夕宿溆浦行逶遲去國日漸逺雲日交蔽虧雪霰一以零幽巖淡無姿渺渺洞庭波佳人見何時汀洲搴杜若客與將遺誰葅醢百不悔謡諑言其私芳馨與腥臊詎得同器施蓽路啓山林鐘虡倐將移夷陵秦火入章臺猶射麋雲雨巫山陽武關歸無期試招汨羅魂悲風滿靈旗弟子亦搖落煩寃作楚詞夜郎竟長流天末懷李白咨嗟赤霄裏鎩此鸞鳯翮四明狂歌人天台坐忘客一見驚仙骨八極可揮斥賦詩上金鑾非常主恩澤翻然乞身去浩蕩事逺適悠悠平臺春泛泛滄海夕東南波連山潯陽夜挂席水軍旌旃滿名髙見驅迫浮煙揮賜金順逆不再擇九天一飄墮萬里遂竄謫江潭憔悴容遼海流離迹匡山懷舊隱頭白歸夢隔聲名王中允行在奏凝碧鄭老雲海間地下誰蕩滌人生遭逢異往者非一格羽衣黃樓中追想年五百當時投魍魎此樂得猶昔文章光焰長放逐天地窄嗟哉武陽山萬古一片石殊方猺獠􅊂音接巴渝舊俗同鴉鋤荷蠻女桐子拾溪童土禁丹砂穴家收白蠟蟲殊方風物異油素愧揚雄船溪驛久習靜便趣矧兹巖壑鄰溪風涼送暑山月夜留人忩好開書帙牀虛拂簟塵誰知是淹泊延佇夙心親大龍門時暴漲甫落卷波吞岸谷炊黍少人家滄海真驅石恆河只散沙斷崖崩碨􅓓老樹卧槎牙晚景頽簷下風吹杜若花沅江驛樓飛梁千尺偃長鯨斜日煙霏紫翠橫曾憶亂山沅水驛徐珌沅州驛詞云秋欲暮路入亂山深處慣經遷客舞州城倚簾江映琉璃色傍舍秋寒蟋蟀聲正是愁心孤迥處龍標明月晚還生龍標城距州五十里回龍關擘開翠硤迅湍流洗出晴雲秀嶺浮拂拭西風衣上雨回龍關下暮江樓相見坡清風生山巔微雨在山腳後山路始窮前山壁又削飛龍中忽斷奔馬勢旋郤兩山鬱嵬峩一水相互絡泄雲天光漏仄壁石氣錯俯逐飲澗猿仰睇投林雀髙低總臲􅑶下上殊苦樂彼途俄復經此路邈如昨千里同一瞬青冥倚寥廓飛雲巖蒼然月潭寺秀絶飛雲巖玲瓏窔奧坼幽閟神靈潛千年水穿溜點滴滲石乳垂垂萬峯窠爐鞴不得補即事山谷陰晴異西南氣候偏螺紋苗女髻雞尾馬郎顛飽食愁香米侵膚畏瘴煙猶防孔翠毒不敢飲流泉清平縣麻峽古厄塞歷代蠻所爭盤旋三重壁峭削萬仞城峻極香爐峯百萬容勝兵瀵水户可汲沃疇人可耕在地有設險誰能廢承平明初防戍卒九千此連營百年閲武場草長蟪蛄鳴所以正德中羣苗復縱橫鋭師下貴竹徑旅來湖荆百道絶梯衝戰功何由成適會長至夜銜枚卷麾旌火焚焰照天諸酋猶宿酲姦凶鬼神怒雷雨殱滿盈七亭訪遺址落日悲風生黃猴落燈間故老難指名空餘重岡路草木颯秋聲髙真觀溶溶浴仙池三百歷年久仙人浴不起池下石犀守偉哉張千户殷勤報己厚鐵椎椎金魚封侯印如斗可憐仙緣薄凡骨亦速朽懷中棗尺餘米汁那得取平越客舍見田綸霞少司寇題壁麻哈江聲夜擊撞西風老屋字斜行蠻書一卷秋燈裏不獨登臨憶侍郎懷清堂集卷六
