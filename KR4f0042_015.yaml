body:
  text: 懷清堂集卷十五吏部侍郎湯右曾撰雨後膏乳爭流野勸耕濃雲旋卷晚還晴萬家燈火常依塞四面煙嵐盡繞城泥滑過門知客少茶香入院愛泉清夜䦨一枕伊涼夢喚起檀槽鐡撥聲隔舍有小伶一部題畫清閟閣前煙景富春江上家風悠然雉尾龍尾宛在詩中畫中賀韓城大司冦張公紛綸三相門得姓天上古淵源溯貽厥纍積自父祖幽潛發竒光大賢表風矩刈楚黔陽秀羡粟太倉庾峩峩尚書公早嵗繼前武講筵陳六萟祕閣紬四部函丈東南行諸生比鄒魯獨識斑麟角每用漸鴻羽秋燈窮巷中為恤機杼苦至今所拔士豈但十得五歸來踐臺閣色線舜衣補帝曰咨秋官乃往視圜土吁嗟武健吏側目劇乳虎人皆望臯蘇獄敢倚徐杜惟公正直性不茹亦不吐未停貝錦織百中含沙弩西歸謝賓客請學老農圃明年官曹清國典威質斧仍聞尺一召朝野歌且舞還登喉舌地上荷聖明主時當萬夀辰大澤九州普公尤承眷渥瓊章照朱户六代恩榮殊盛事快先覩披圖得髣佛賀客正旁午門前五丈旗鏗鍧節金鼓飄然鸞鳯詔遙下神仙宇廟祏列堂庭禮器陳簋簠拜前復拜後至敬僂傴俯是時雙鳯皇聮翩祕書府童孫又玉雪繡褓手弄組光榮被戚婭歡喜到僮竪家風萬石君問馬用䇿數仲弓實𢎞道占星百里聚于門知必興秋荼解網罟矧兹邁種德淑問天所祜應期調鼎鼐為國作風雨右曽薄材資短筆了無取未能諧鐘律浪自鳴瓦釜聊從嘉慶餘頌此股肱輔他年論世閲㑹冠百氏譜四月十二日宿愷功都憲别墅月中放櫂遍逰諸勝忽牽野興到江湖沿月扁舟入畫圖幾曲波光連太液千枝燈影散蓬壺輞川嶺乍迷斤竹洛下花新放鼠姑無數煙雲滿清供先生自愛列仙儒題愷功都憲自怡園二十一首同查悔餘兄弟賦篔簹塢南階日夜添退之詩笋添南階竹東溪森復緑唐陸陶詩不厭束溪緑玉君君看讀書堂正在篔簹谷雙竹廊雷奮穿牆日龍騰破壁時誰能礙髙節並上拂雲枝桐華書屋庭隂炎氣薄雨滴夏景清髙唱出金石載懷東方生蒼雪齊北地少竹色低叢亦可愛矧此青琅玕節比江南大巢山亭蒼蒼斗立壁中有太古隂雨自膚寸出雲歸靉靆深荷塘荷花紅似拭荷葉緑堪把遲爾蕩舟人月明風露下北湖落日荷芰香朝隂梧竹色咫尺煙波閒已隔水南北隙光亭遙光木末映孤月雲際豁一葉向鷗邉江湖渺空闊因曠洲髙下唯所適池館還追攀耳目一以曠水天心共閒邀月榭謝公邱壑性無事此頻來寧知邀月榭即是凌風臺蘆港明湖思舊歷髣佛草年事自大明湖至歷下亭與此景絶似夾岸蕭蕭聲已覺秋風至栁沜澄波屢回曲髙栁環其中千條與萬葉一一含清風芡汊緑盤圓欲齊紫苞剖可食的皪萬真珠水妃惜不得含漪堂倒射溪堂明漣漪開夕景瀲瀲霞上波漾漾月中影釣魚臺寓物尚可樂細大理則均海中連六鼇何異一寸鱗南橋橋邉巉巉石橋下泠泠水憶昨一扁舟潭烟山月裏四月十一夜於此橋下登舟游歷雙遂堂名賢際昌運鐘鼎兼山林濟時稷契老髙世箕潁心紅藥欄翠色紛可擷紅芳似有期悠悠晚春節小謝省中詩靜鏡居萬緑息心瑩百態呈影寫湛然一室中顧此悠悠者朱藤徑幽隂徑乍轉蒼翠色如許自繞長廊行不知三伏暑野航非舟復非陸三面臨水妙意寄所耽幾時秋水至還共客兩三愷功都憲有夀山田石山髙月小硯屏歌他山繼作亦和一首公有希世珍近在几案間几案之間咫尺耳乃有峩嵋天半萬仞之髙山山髙路杳聲影絶但見孤月一㸃開烟鬟青冥萬里霣其丸光景蹙蹜栖人寰斜漢左界覔不得絶代之子竊藥仙去仍來還公詩如蘇公遙與風林月石妙句相追攀查田亦繼作喜獲聮璧來雙環舊聞芙容峯前夀山麓落落有石謝石頑溫其金厚載賦剖溫其之潤比德瑜與瑾紅緗紫白艾緑殷惟此黃中實通理正色凜凜邪不姦金精下融黑江底虹氣上貫銀河灣輝然大寶玉出田一笑直破造物慳置在公家琉璃雲母四十二幅裏時有雲氣生斑斑我雖未摩挲他日容叩關仇池有穴夢可到況此日夕隨清班涵星泓邉管城側休沐倘許終朝閒應從月脅望瑩潔似入風磴聽淙潺願公夀國夀民長如此夀石者坐令百嵗猶朱顔憩椿樹下自愛吾廬美䕃頻一回徙倚一回新青雲布葉偏宜夏黃纈舒花已過春添得清風生北牖借將翠色與東鄰年年不改濃隂在底用莊生紀大椿五月十三日喜澗房自汴城來京酒闌話舊感賦千里嵩陽一紙書先五日得來書書來繾綣說相思每嗟落月何由見豈意深杯忽共持萬事風花傷眼底兩家羊酒記兒時白頭未忘平生約五畝柴桑指後期宿石匣小庵地曠金溝館山圍石匣營千巖蒸雨氣五月作秋聲有水皆穿塞何年此作城晚投雙樹宿塵夢一宵清僧房閒寂偶憶東坡白髮相望兩故人句因念澗房甫至悔餘將歸隔越數百里不得見也悵然各寄一首相顧衰年百不思同開三徑每嫌遲山中王烈呼應出雄飛地下陳琳弔豈知叔毅某水某邱猶昨日一班一級竟何時澗房方謁選吏部期君對酒欣然笑贏得江東號沈詩鵷鸞臺閣正連翩忽賦歸歟種秫田為樂每憂兒輩覺生天一任丈人先元和體有三千首謝朓才論二百年我欲舉君還自代似君真合領羣仙次韻悔餘畫義詩兼呈愷功都憲莫笑鄭廣文寒無坐客氊莫嗤玊川子破屋團團天我貧亦好事有琴常無絃君家緑玉玦半破九府圜復有桃竹杖登山可梯緣二美必有合玉潤竹節堅仍作靈夀扶兒童笑應顛畫義仿古製六幅挂巨然放翁詩分明六幅巨然山故事舉東坡臨臯日百錢詩來語絶妙價抵黃金千揆公洵彊對吟廢食與眠一篇特乞此句法鐘律懸定心苟不起尤物誠可捐我笑轉一語鄭璧易許田懷恩紀事詩有序康熙五十二年五月二十五日蒙恩召臣右曽隨諸王大臣後宣賜筵宴得遊避暑行宫伏見山巒竒秀湖水澄徹林木葱蒨烟雲卷舒珍禽喧於百族桂花發於列砌飛流懸瀑風泉益清翠壁蒼崖臺榭間出蒲蓮荇芷浩藪澤之觀菽麥稻禾譜田家之景凡諸耳目應接步屧躋攀多夢寐所未經亦意計所不到仙源乍引靈境遍探誠忭誠歡詞難覼縷復得仰窺聖製特灑宸毫詩文為萬世之師書法兼百家之體皆由幾暇備極思功雖天縱之神竒亦學力之精奧臣俯投五體驚嘆無涯仰贊一詞形容奚自復蒙賜臣扁額對聮異數殊恩出之望外以方往古則唐之劉洎宋之張錫遭逢之幸臣殆過之感激寸忱銘鐫心骨謹呈懷恩紀事詩二十四章臣右曾稽首頓首恭進入宫門苑籞紅泉繞翠岑萬幾餘暇始登臨寧知清暑迎涼地盡是諴民阜物心登舟搖溶桂楫漾蘭舟青雀晴飛彩鷁浮欲到蓬萊三萬里應從瀛海更乘流賜宴仙人六膳出珠宫九奏簫韶率舞同百子池頭萬年樹侍臣身在綵雲中無暑清涼碧樹周阿夏景清三才萬物厪皇情每尋解愠歌薰句已覺涼颸殿角生萬樹園遙青不斷緑雲鋪萬木蒼然總畫圖對面千林有瑶島蓬壺髙處望方壺趵突泉洑流噴薄雪成堆潤物資生一竇開直送恩波到東海俱從天上發源來石磯觀魚穿蒲戲藻自游行集網垂鈎了不驚自是至仁周萬物一鱗一鬛總生成瀑布曾從廬阜尋巖瀑憶到黃華問水簾今日銀河天半落恍疑兩地一時兼石壁回崖㳫嶂翠浮空峭壁巉巉插水中直是五丁開不得天然叠出錦屏風曲水流觴波回芷岸接菱汀曲水流杯眼乍經總為帝書真第一恍從蘭渚到蘭亭雙湖夾鏡夾鏡澄明倒碧虛四山晴翠繞周廬分明圖畫西湖景此景西湖較不如稻田麥隴稻垂麥仰足隂陽土厚泉甘草木香㑹吐雙岐銜九穗一星天上應農祥上帝閣聖心原自合天心誠敬由來昭格深此日髙居瞻絳節六時仙樂海潮音西嶺晨霞軒窗面面納紅霓左是丹臺右玊梯每惜寸隂勤乙覽晨霞紅映數峯西芝徑雲隄殊形特似産芝房行盡雲根别有莊橫截一隄銀漢繞大羅天在水中央白櫻桃青絲籠裏盛猶早白玉盤中看不殊每向上蘭宮樹望勻圓萬顆水精珠金蓮花移根幸植玊階旁寶地蓮臺萬品香天與十分端正色承恩先借御袍黃馴鹿仙巖時有絳雲封槲葉隂邉自養茸待到千年毛盡白仍驂赤驥御蒼龍候雁將雛挾子共因依瑶草金沙翠羽肥從此隨陽天直北年年更不要南飛草荔枝龍沙小草孕瓊漿賜出金盤得共嘗一自嘉名天錫與海南不記荔支香恭讀御製麥秋詩墨海烟雲五色鮮宸毫灑向麥秋天自今金匱瑶函裏併入豳風豳雅篇恭讀御製烏鬚文皇心無僞亦無欺盥誦天章謨典垂宵旰但期民盡樂不辭㸃㸃上霜髭恭覩親灑宸翰筆力真看挽萬鈞包羅百代典型新自從羲畫開天後古往今來只一人恩賜扁額對聮勉思清白勤官守敢謂文章侍直廬五色榮光照蓬蓽子孫世世寶天書紀恩詩有序閏五月初二日二十日復䝉恩召臣右曾隨扈從頒賜珍膳兩逰避暑行宫清漪翠嶂隨境而皆澄鮮美木佳花踰時而彌暢遂接芬芳於耳目發清曠於心神君父之恩至於再三臣子之榮溢於涯分似兹感激莫可名言又臣留止熱河殆將經月竊見五風十雨擊壤歌衢場麥既已畢登秋禾行復大稔聞各行省莫不皆然此皆我皇上萬夀昌期上帝眷佑鴻禧純嘏日盛月新正未有艾我皇上受福於天即錫福於民臣誠踴躍歡忭上慶一人永膺無疆之庇下喜萬姓長享太平之樂手舞足蹈莫知所云也又臣所歷山亭池館皆有御題仰見我皇上典學勤政阜物寧人之至意當此豐亨和㑹之日彌懷憂勤惕厲之心發於至誠形於實政此真自古聖帝明王所不能逮旬日中更得仰讀御製朱子全書序及理學論發內聖外王之全功析三才萬物之奧義直範圍乎百代洵包括夫六經文章之事至此極矣更得恭誦御製文光果及溫泉應候詩呈形肖物比興之㫖該宣化授時亭育之功溥法度之精密意義之宏深自漢魏以及唐宋専門名家者皆莫及也臣庸虛弇鄙未獲窺見萬一惟是心悅誠服口不能宣復撰紀恩七言律詩四首仰請聖訓臣右曾稽首頓首恭進君恩重許到行宫復嶺澄湖望不窮仍泛靈槎渡河漢復驂法駕上崆峒神臯路逈環仙境福地天開養聖躬長願萬年調玉燭五雲樓閣翠微中謳歌東陌復西阡瑞麥嘉禾滿塞壖人慶六旬逢聖節天教九域遍豐年中和氣與隂陽㑹易簡心通造化先昨日山靈出時雨為迎仙蹕到溫泉松風别殿倚層岑寶字瓊章許遍尋孝養陔華崇帝德阜成民物見天心文包理數圖書祕詩叶咸韶雅頌音揮翰萬言成頃刻由來聖學至髙深蘢葱佳氣接芳原淑景晴開閶闔門三謁帝臺當晝永每承宸幄似春溫風前紅蕚穿波出檻外金英耀日繁小草亦蒙天地德微材難報聖明恩次韻櫻桃塞外熟應晚枝頭摘尚先味逾英豆美山櫻桃名英豆色並若榴然密綴瓔相似偷窺鳥作緣山家清供好況乃近宫壖次韻野雞卵雉子斑猶未虞人網已羅草深疑乍乳麥秀得全窠破殼完差少堆盤纍已多俊思賓閣味四月中在苑西曽以食余一色耀銀鍋閏五月草四日與玉叔通政經憩長山峪北小茅庵烟光嵐翠洗氛埃憶昨茅亭絶澗隈白雨忽催人共去青山應識我重來森森灌木隂皆合寂寂巖扉呌不開與子共乘風雨腋便從此路上丹臺前月二十二日至庵中被命追還熱河題許不棄先人甌香書畫册二王遺法未銷亡十紙分明似過江想見夕佳樓上客虬龍風雨夜穿窗畫手詩人兩並傳寒藤古木入蒼烟百年浩劫拋殘後猶記風流水墨仙懷清堂集卷十五
