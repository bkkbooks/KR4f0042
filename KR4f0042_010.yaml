body:
  text: 懷清堂集卷十吏部侍郎湯右曾撰和新城先生早春三咏花下逰絲白日春晝餘亭亭脈脈花枝疏不妨靚好如靜女冶葉倡條空笑渠春日憶樊川舊逰南山蒼翠去天低鈴馱秋風記舊題謂公奉使蜀道今日樊川重回首落花殘雨灞陵西雪中梅花如花雪己映似雪花爭發暖氣欲融春橫枝先郤月為王敏行僉事題文貞公叢竹圖緑沈曾記三百本瓊粉還憐十數竿少不如多君自領萬條寒碧畫中看尚書髙節世應無小筆猶留叢竹圖昨日翠琅玕下過新添五色鳯凰雛題汪悔齊太常觀海圖天書一夕下東溟奎壁曾占使者星今日乘槎問遺事只應留得大荒經神逰八極本仙才歎息騎鯨去不回弱水西流三萬里更從何處指蓬萊恭祝萬夀詩巍巍至德仰我皇苞育天地符隂陽府修事和百度章端拱上理登虞唐九服作息安耕桑蠲租賜復厚蓋藏膏雨時布和風翔協氣感召嵗屢穰民諴物阜來嘉祥重譯萬里修貢筐逺及烏弋黃支鄉升平詎將咨警忘宵衣旰食常弗遑愛民勤政冠百王高深聖學難測量逺紹洙泗淵源長兩儀萬象窮豪芒旁耽圖史羅縹緗百家諸子咸該詳天葩睿藻日月光珠毫寶翰懸焜煌小臣簪筆螭坳旁紀神聖功職所當遭逢景運賡明良麒麟游囿鳯集岡朱草榮砌芝生房祥圖仙牒殊未央億萬寶厯歌無疆送李總憲歸里乞歸乍許詔書新鸞鶴飄然自在身長有清風留憲府誰從嘉石辨寃民公在法司核擬平反甚多草年魚水君臣契一夕林塘夢寐親取次烟花滿吳㑹為公吟望五湖春東門張飲畫成圖自昔輪經大雅扶愛士名爭歸沈范纍朝族自重崔盧烟消驛外晨排馬月出臺端夜集烏它日㑹煩中使問肯教鄉思老蓴鱸上孝感相公四首遙望杓南第一星清時名德重朝廷致君心己超三代力學功尤在六經家泝水源江漢白人如嶽峙岱嵩青調元四十年來事勳業應看鼎鼐銘烽銷王㑹萬方同密侍謀深倚相公憂樂每關天下計髙閒真見古人風公力請解閣務專領書局雨來滄海雲生壁日出扶桑翠掃空不是書紬金匱裏誰知元老格天功右曽充政治典訓纂修官見公奏對語多人所不能言者儒宗一代富研搜學海長懸萬古流蒼籀文竒探祕簡咸韶音古戞鳴球每從别派驅楊墨自有微言接孔周東觀遺書南史筆早傳褒貶繼春秋明史出公一手春官桃李五成行别有門庭一瓣香曾侍康成趨石室早因子固拜歐陽清心肯慕神仙宅碩畫長留政事堂七十朱顔人見否吳絲未㸃鬢邊霜題查逸逺先生學圃圖三首王氣銷青蓋高人在白衣嶺雲終不出海鶴只孤飛雨後紅薑熟秋來緑芋肥偶然同老圃聊息漢隂機用意無人識於陵日灌園嘉蔬比君子香草念王孫儒術名元大幽居道益尊永懷耆舊傳文雅在清門小劫過風雨披圖尚見之芝蘭叢發日裙屐共逰時白鳯委蛇態青山偃蹇姿無由牀下拜應恨我生遲題蘿軒畫梅小筆風流自一家草堂寒色上梅花青羊宫路千株雪最愛橫枝竹外斜風流裘帶寄斯文過嶺清詩迥出羣今日烟霏豪素上墨花猶帶海南雲寄淮南友人别君每憶淮南樹客舍河壖幾風雨歸來空壁耿銀燈誰復高歌聽金縷三年執手如夢寐終夜重思對牀語休從塞馬論得失肯與狙公爭喜怒君才鬱鬱蛟龍姿白日雷霆起烟霧時來騰達非難事紫蟹白魚且歸去依人暫就臯伯通乞米應思謝仁祖兒郎玉雪己可愛况伴維摩有天女三山地軸隱嶙峋空見清泉如潑乳似君磊落吾所伏爾雅蟲魚不妨注聞陳斐公為余料理山莊竹木兼完屋舍嵗晚思歸慨然有作病夫思負暄南榮日屢曝心間萬想滅所苦歸不速忽傳山中書似與清景逐山中亦何有架茅幾間屋往時賢使君山莊明副使包公所營挂冠此卜築百年閲興廢高岸移深谷只今摧翳餘舊觀己難復但餘潺潺水屈曲繞林麓青山爭橫從雲表峙緑玉樓中一騁望蒼翠紛滿月我歸定何日佳處夢己熟譬如長飢人說食甘於肉平生蓴鱸興念豈有令僕二頃不願餘山資底須足遙憶飛來孤天竺割一峯吾廬在其下面面青芙蓉昔有古先生知此山所從藏舟在巨壑夜半無留蹤安知鷲嶺西他日不再逢巖巒含窈窕落落風入松幽禽怪毛羽下寫澄潭容靈隱古招提山門烟翠重時放出林梵或聞亭午鐘禪誦課六時吾老性己慵但於斗室內虛白生心胸洞中呼老猿石門蒼蘚封時來理公巖喚起泓下龍山地多磽確負耒謝老農桑箔飼眠蠶隙地十餘畝皆種桑薄綿衣可縫雜種桃李梅花時各丰茸最愛萬竿碧翠色無春冬真堂作記人興己如酒濃先人有幽宫去此咫尺地經營得數椽亦為敦祀事霜露以時零松柏手勤植龎公嵗上冡斑白偕童稚壺觴逮餕餘屢舞躚躚醉兹堂聚同姓歡㑹連信次聽泉過野亭飯僧入山寺昔者先大夫丙舍接埏隧劫灰三紀餘古木沈寒吹攀號再念此竊祿偶然遂承家有遺書鑿楹付來嗣中間一木石未可輕棄置法公釋門舊法微長老數遣侍者鋤理荒廢飛錫再三至鉢底咒老龍時時出護視柴荆具茗飲後約或不愧惟當治尺宅勿使風雨萃低頭拜東野退之昔曾云常恨不相從所願身為雲雲龍相追逐我竊舉似君憶托臭味初氣挹秋蘭芬蕭然出埃壒學道亦己勤手披楞伽字口誦貝多文自從墮地來寧識羶與葷周妻未為纍大布自褁裙白晳好兒郎秀頴漸有聞吾家老禪伯家兄廣崖脫巾謝俗氛時時從子逰初地收放紛念昔三人居亦足開其羣秋吟山月皎春踏陌草薰少壯能幾時白髮不可耘我衰又多病如何離鄉枌並鄰墟曲中雖貧心所欣寸田養黃芽不救野火焚期君得靈藥庶共刀圭分寄題梅東敝居梅東橋接白洋橋楊栁須栽幾萬條好與遮留春色住老夫暮暮復朝朝癸未除夕前四日書蕉飲使滇集後四絶句應復南中見綵雲知君筆落動星文五花山寺昆明路誰共題襟馬上分海雨山風手自攜不從二㸑覓珠犀益州使者空持節但拜南崖縹碧雞山採青銅井煮鹽西南幕府利權兼一時詩卷都將去集中倣長慶體三首言滇事甚悉翻笑先生太不廉仙人柱下兩芒鞋舊夢慿君喚却回天末故人零落盡豫去夜郎八年閻中丞以下强半物故白頭無分得重來題載書圗恭送漁洋先生請假歸新城四紀列彤闈致君堯舜如大儒經世務所得古人書職密典機衡心清抱沖虛一念滄海曲遙情賦歸與顧思明主恩欲言復躊躇但申邱壟請未及齒髮疏至尊眷老臣溫語聞直廬尚書天喉舌公行不再除暫賜休沐間五月田園居渚鴻任翔集山雲從卷舒張飲東都門何如昔二疏僕夫秣征馬門生扶籃輿壓軫三萬軸過此不願餘清風誰當傳圖繪禹鴻臚風神照魚鳥情話樂里閭黃花九秋節采采盈衣裾丹雀銜書來翩翻下林墟公其出為國未可云遂初喜雪預恐來年旱三冬雪片稀如花猶未集似絮已紛飛喜極因呼酒寒添更著衣竹間聞淅瀝凍雀亦知歸正月六日喜得雪時尚未立春猶臘尾也六花侵夜忽分飄宿麥初霑一寸苗已信遺蝗應入地尚嫌積雪未封條紅樓日上融仍濕紫陌塵飛暖易消聖主郊壇正祈穀喜逢上瑞應今朝扈從大駕南巡閲河舟行至河西務同張侍郎劬齊陳副憲實齊用風字帝為勤民出時和應協風人如星拱北恩共水流東列艦勾陳轉乘槎河漢通桃花春漲濶更試濬川功恭讀御製黃船記乘流每羡龍驤逺引纜爭傳鷁首輕大知獨先周萬物至仁實欲濟羣生雕文繢綵曾無取巨浪衝風了不驚捧出奎章齊照耀始知精意寓川衡恭讀御製擬田家春日詩勸耕頻嵗主恩加東陌西阡望翠華正以春和乘月令每縈睿思是田家隴餘佳麥知民樂村逺垂楊隔市譁倣佛豳風歌稼穡太平有象發天葩恭讀御製乙酉仲春南巡船窗偶作調寄栁梢青詞氤氲淑氣散千畦鳯舸徐行轉大堤六合同春知帝力八風從律自天題祥烟時傍牙檣繞瑞羽常隨桂櫂低最是讀書勤乙夜每忘月落御窗西扈從大駕南巡閲河安瀾方慶奏功新善後尤煩睿慮頻萬世利應留澤國十行詔已下波臣星占共指連牛斗槎泛還如上漢津自愧河清非頌手空隨仙蹕紀南巡恭覩上親校射遙傳校射建金麾七萃分行盡虎羆已息烽烟全盛日未忘弧矢太平時廣場地接風雲氣曲岸天臨日月姿的暈三穿神藝少萬人驚歎見真竒崇光寺樓懷吳允哲十七年前我到時老僧猶指舊松枝依然竦竦竹侵徑不改潺潺水入池桃李穠華收昨夢風埃蓬勃入新詩一杯茗葉山樓上幾度思君與共持附北信後作一絶句故鄉誰道似天涯旅思茫茫未有家轉憶王城三月尾兩株如雪壓欄花雨中逰攝山棲霞寺偶與靈境契得隨緇侣尋沿洄一溪水出入萬松林寺憶齊梁古嵓從紫翠深欣然稅塵鞅猶是在山心便踏飛梯去烟蘿絶磴懸清香度千佛微雨散諸天親洗澗邉术還烹池上泉白乳泉也攝生期此地未敢望仙緣題河上集後八首呈澤州相公雲際搖溶春漲遲浮查日月傍天池長虹貫月滄江夜想見龍蛇繞筆時海山空濶杳聞琴徽指推移不可尋公在崑崙最髙頂八風嶰谷有遺音龍旗羽蓋楚江邉萬姓歌聲沸管絃慿仗丹青元化手寫將秀句滿吳天一曲青溪一首詩桃花苑外獨吟時風流宰相承平日郤笑檀橋只賭棊行隨漁唱與樵風逸興巖扉窈窕中亦有青山好風日無由騎馬待山公右曽有小墅在飛來峯左公被知也詔㫖逰靈隱日右曾先在而不誰將逸響繼咸韶舊隱蓮洋已寂寥河中吳天章五言髙絶時類公作清泚王官谷中水空餘飛瀑灑中條褒從一字借春秋小泊寒花古戍樓公在滄州甎河驛有見懷詩詠罷虛舟意超越潮回滄海已東流百年奎壁河東地萬古詩情一鑰多回首太行千尺雪山川人物兩嵬峩濟州北麥大熟呈京江澤州兩相公黃雲覆野麥登場喜覺連村餅餌香幾郡流移歸北闕兩年冠蓋滿東方至尊旰食憂民切元老訏謨體國長稷契功名韓杜筆應添樂嵗好篇章李映碧先生祠摳衣猶得薦溪蘋異代清風俎豆新直筆空聞傳舊史先生有南北史合注與今本小有同異角巾每自號遺民丹臺淚灑危言日滄海名高勇退人長傍逋翁舊林麓待穿雪柏貫霜筠七月三日病起至樓上頗覺登臨懶秋來卧病初間聽林外雨困撥手中書抄飯疏鐘後焚香倚枕餘喧卑無地免只合此樓居習靜欣鄰接蕭蕭祗樹林每聞清夜梵時感入山心白日哀湍㵼清霜冷葉禁那堪衰謝意斷續與年深過雨果新熟交風豆亦肥心常愛林木户恰對烟霏一夕居多暇三年到恨稀自今勤泛掃高處置書帷次新城先生韻送陳六謙郎中出守石阡竹歌西下楚天長白納烏蠻又一鄉他日欲尋人物志風流應記舊曹郎離尊猶憶繞前除謂丙子秋典試入黔時萬里征軺逐貢書誰料十年還此别西風渺渺獨愁豫遙看按節下且蘭荒徼﨑嶇為一官叱馭尚留心事在握蛇騎虎不艱難山城斗絶望迢迢不噉檳榔食已消莫怪瘴雲低地黑五溪風土接三苗龍底江濵古石田此行未用悵飛鳶侍中㑹要揮毫手待賜黃金附耳蟬題王于謝小照少年白晳何事來下烟波釣筒一掩一重山碧春來春去花紅綺堂先生請假南還用東坡送仲元貺王元直韻作五詩奉送并索和章時癸未十一月朔後四日浮杯瀲灔欲别執手殷勤有言試問一枝棲託何如萬里飛鶱扁舟東下吳㑹獨夜一篷雪來嘔啞柔櫓人靜欵乃漁歌夢回何異登仙此行非關久厭承明慈母手中綵線佳兒膝下書聲杜鵑勸我歸去已是遲君一年它日追思前㑹九門風雪依行投林下征鞅寄謝山中故人看花踏月沽酒莫負湖邊好春懷清堂集卷十
