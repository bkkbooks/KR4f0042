body:
  text: 懷清堂集卷十一吏部侍郎湯右曾撰寒雲寺寂寞寒雲寺雲來特地寒壞墻塵自合老柏幹皆攢厨欲分香飯天教趁冷官貝多真實語只道汝心安修武道中懷舊山陽里天高落木空覆杯巖石上吹笛竹林中寂寞人埋照昻藏鶴入籠達生差可託嵇阮此遺風次新城先生韻題王秋史二十四泉草堂圖七十二泉上家泉望水泉泉名由來著書地不記種松年世外三畝宅山南一朵烟詩人好鄰並白雪舊樓前城南校射答趙豐原太守即用見貽原韻龍門雪將下先集乃維霰如山卷牘空靜若僧退院城南闢廣場農功出餘羡旗門好身手文雅事一變前臨三池上定水花幾瓣城南景明寺有二池邢子才碑文云金花映日又云信徒法侣持花成藪回頭洛陽塵烽火憶苦戰吾曹太平日弔古如夢電風雅得使君才具當八面拊髀思頗牧詎不在鄉縣富貴大槊耳士取意所便寧必老書生兀兀破萬卷相對共一笑斗酒且歡宴贈王孟穀疉前韻嵗寒青松枝百尺飽霜霰佳人紈扇曲凄斷凉葉院先生包古言如賈三倍羡蓬萊清淺水幾閲市朝變搴來青芙蓉一一手中瓣如何老驥伏不令猛士戰㑹當灑天瓢玉女開笑電今朝風雪夜燈火故人面嵩陽尋舊師百里阻山縣且留訪伊闕快馬短衣便石脈散淙流韋郎舊吟卷相期二三子攜手共遊宴送王秋史再疉前韻洛城三日雪庭宇復飛霰子抱卓犖才不歸學士院來言不得意買田思陽羡論道阻江湖坐看浮雲變家鄰華不注天際青一瓣抱此靜者心不問蠻觸戰昨試禮部作迅速走驚電暗中識光芒鬷蔑無半面豫在禮聞最後得秋史卷素亦不相識也將規讀書處不少山水縣子其慎自持獄市視民便文章經國事撐拄五千卷終期賡猗那言從柏梁宴嵗暮感懷三疉前韻迫兹嵗晏晨摵摵響風霰憶彼少年日隂隂宿花院來者詎得知往者徒可羡雕鐫肝腎竭憔悴齒髮變天寒除架日瓜摘無留瓣嚴霜一以零不救脫葉戰欲尋三乘法機鋒擬掣電不爾入醉鄉臘甕撥醅面文章差底病那用驚九縣甘思臘膎美暖想腰腳便亦有小兒郎之無甫開卷春盤猶可及歸覓團圞宴趙豐原太守招逰龍門香山竟日效樂天體賓遊聨騎出城闉山水佳時氣色新底用清商隨一部不須明月作三人餘霞似綺連嵩少殘雪如花舞洛濵多謝風流賢太守十分先借水邉春香山泉上懷韋蘇州韋郎昔著書暇從山水逰永日未能去愛兹泉上幽泉水至今碧漾漾寒藻浮靈液冬不枯煦若春和柔夕潭瀲彩翠散綴明珠稠涵虛本同源潤物或殊流感此悟物理喟焉思前修臨池兩嘉樹樹老枝相樛攀條為泫然斯人邈難求大海粟一顆終古貉一邱不知後視今感歎有此不石樓灘積鐵山幽幽濺波石齒齒不見樓上人時聞灘下水洛中絶句南北由來嗜好殊幽人風味不全孤玉川三百團團月一字何曾道酪奴庾郎鮭菜二十七嗤㸃何來李令公洛鯉伊魴非俊味白頭韭出客盤中志稱洛韭至美果然屠兒割肉妓兒繩敏捷當時甄李能何事江南老常侍只將片石說韓陵士馬并州劇亂麻淨宫兜率洗鉛華洛川多少興亡恨惆悵年年楊白花微君之故乃泥中婢亦知詩似鄭公不解雙聲定何語冠軍家自有春風南園池館久飛灰將相功名何有哉三十六峯雲雪路只應招鶴更歸來裴晉公有南園靜興詩子粒芒紅檢校頻兩京薄産事艱辛將書苦憶東屯老伊闕年年有好春香山寺裏留遺集杯酒何如身後名今日橋紅沙白路一篇長恨舊風情龍門雪下有佳期車馬漸漸水上遲但使都㕔遺事在未嫌歐尹不同時破垣遺竈天王院隂雨元功剩幾家歌管層層春處處夢中猶看洛陽花除夕奚里鋪雲林入幽處烟火半巖間家飲洛川水門臨少室山祝雞翁寂寂飲鶴澗潺潺今夕是何夕翛然心更閒黑石渡昨從邙山來今從邙山去邙山朽骨萬萬古惟有行人朝復暮黃金蝕盡白石爛螻蟻三泉尚知處我來欲酹酒一杯落日荒荒下前渡元日發鞏縣看山四面碧嶙峋且免車中邑邑人殘雪未消前度臘寒梅已帶乍回春老知時節心情減閒覺風花景物親二十年來兩元日天門頂上洛河濵丁丑元日舟次白沙村登天門山絶頂過虎牢關風日晴美關門設險笑徒勞絶壁緣雲舊虎牢黑色小兒空百戰也從洛口塞成臯才言今日已春還春在融融冶冶間栁意漸蘇波漸活東風先上虎牢關關上有清泉夾植楊栁須水店壁有題句云風滿山頭月滿城坐深衣袂覺秋生何人解識吟蛩語此是江南露下聲後二語絶佳不知誰作也依韻一首遙知木葉下秋城七字吟來太瘦生最是水天凉月夜人間惆悵子絃聲元夜在汴城偶念孟元老所記東京燈火之盛感慨係之雜成斷句春波細細縠紋生歌扇飄殘宛轉聲帝子不傳新樂府詞人空說舊東京從教百戲幻魚龍花陳香山幾萬重九十尺連青漢起可能留得最髙峯艮嶽有一峯最高至九十只千枝萬影朵樓開一道銀河瀉露臺天上忽飛金鳯下雲中時看玉龍回兩行綺陌界朱杈燈火三更夜市譁月到五樓明似水一重縹瓦一蓮花重添兩夜試燈期猶說錢王納土時鵓鴿旋中光眩轉路人爭踏五花兒萬嵗山前望貢雲香中百和最氤氲逰蜂冶蝶非時見先繞雙奴玉線裙宣和間汴京元夜有使喚蜂蝶之術蕭條相國寺如村指㸃菩提葉葉翻誰信當時正月半范石湖詩夜夜長如正月半緑窗朱戶盡歡門王傅宅邉春月皎太師橋畔午風和劉子翬汴京紀事詩夜月池臺王傅宅春風楊栁太師橋試教㸃檢蜂兒看黃雀披綿有幾多蔡京㸃檢蜂兒見在數目有三十七稱王黼盛時庫中黃雀鮓積屋二楹窠石空留四畫圖赦書著腳語何愚烏犀白玉煩緹裹重入思陵卷軸無水底鞦韆水上舟試燈才罷又春逰紀聞南燼稗官筆風雨移州夢汴州郟縣阻雪不得謁蘇公墓江河萬古㑹同流天半峨嵋汝水頭長恨身宫坐磨蝎空懷歸計老菟裘黨人遺籍悲他日瘴海餘生盡此州蘋藻墓門思一拜亂山風雪閉松楸逰風穴寺為愛連峯好連峯窈窕間清泠風出穴曲折寺藏山翠柏隂皆合叢篁密不刪門生傍籃輿應識老夫閒喜公池喜公池上坐竹裏暗泉聞細脈中峯落淙流下界分半規如得月一縷欲生雲萬箇篔簹外翛然鸞鶴羣牆角杏花長紅小白態交加一隊春中五杏花他日東風夢臨汝鶯鶯燕燕各天涯風穴萬竅忽怒號林摧巨石走太虛只一噫盛自土囊口我嘗笑斯語索之無何有兹焉乘風飈絶頂延佇久言尋萬古穴槖籥落吾手竒踪目親擊虛牝神所守何必天西南仇池九十九蕭梢如欲起先已在跟肘應蘇久沈疾乍醒初中酒下山憩茅庵絶境屢回首歸駕豈免促平生覺多負蘭臺快哉雄歌舞樂速朽冷然北窗下輸爾山中叟栁湖用東坡寄子由韻邱上那復更有邱爾雅誤讀笑刻舟宛中宛宛一湖水坐覺寒碧生船頭一生拍浮此便足何必鼎食羅珍羞家在江湖狎漁釣舟居陸處知誰優扣舷似泛溟漲濶浮芥便作坳堂逰天公寒暖提一律噀雨占晴定何術昨來蛺蝶飛作團今去黃蜂釀成蜜空餘隄栁絮翻撲誰信山茶幹蟠屈子由有詠開元寺山茶詩浮世眠食功與勞休論奴僕今旌旄宛邱先生讀書處美酒飲罷餘離騷我衰學廢瓶罍恥馬肆還來持尺箠差勝六年言責地終日一談惟唯唯用蔣儼貽田遊巖書語食蜊萬事寧復知蠟屐此生當著幾文書堆案日有程樂哉此舉非無名時以校射出郭沿湖一葉恣來去矯翼沙鷗箇箇輕子由讀書臺銅狄摩挲五百年旱湖幾尺水生烟鷗邊莫笑舟如葉門外猶疑浪接天梨棗有時看得道弟兄相望憶歸田一尊花下提壺共二老風流尚儼然陳州先後得元朗及家兄篆辛下世消息空齊對酒不能持兩日開書兩度悲夢裏池塘失康樂曲中山水憶鍾期舊來門戶真何託爾後詩篇待寄誰太昊陵西頻感歎無緣重問百莖蓍睢陽秋暑轉熾因次東坡人皆苦炎四字韻詩作四首欲割秋間六六鱗鯉魚風未起青蘋小詩亦有偶然作高枕偏宜率爾人手握冷蛇仍自熱心調狂象苦難馴月寒日暖飛光速始羡仙壺萬古春白汗翻漿日日皆如山卷牘對公齊時當火見三庚伏人笑烟昏七竅霾秋思江南花似雪飲徒河朔酒如淮惟應一餉清涼樂凍雨傾瓢水上階鄒生枚叟已黃土高李風流難指數說士深知視肉甘守官誰信如荼苦青蠅白鳥蚊也白鳥營營出金樓子空營營衰鬢華顛餘縷縷先生罷酒且休矣門外紞如打曉鼓星河耿耿夜厭厭漸覺氷輪影挂簷嵗月坐驚蛛網戶暄涼行看燕辭簾計秋分時始得去一杯沆瀣應知渴八尺琉璃好避炎睡足風軒念羸老敢言不病壯夫痁賦得微雲淡河漢路迥飄將斷河明淡不飛西流水清淺左界雨霏微斜度穿針閣遙停織錦機似聞瑶殿裏裁作不寒衣天宇纎埃斂風林殘滴聞光穿榆歷歷影散月紛紛半卷隨河霽全消入夜分九秋閒淡意只似雨餘雲同祝良仲項蛟藩王雪子夜泛栁湖欲采湖中花值此良夜永翩然一棹出明月浩千頃茫茫蒲蓮海泛泛漁釣艇撥觸船底聲搖溶波上影勞生牽物役百年苦鼎鼎詎意鞅掌餘獲兹幽絶境此邦許我老茅茨結孤迥季鷹或思吳歐公常慕潁人生苟適意異縣等同井嘉二三子賢高世比張邴偶然逰賞處别有天機秉境寂物態閒心清塵慮省嚴城數漏鼓坐久風露冷夤緣遂忘歸魚鳥逐清景遙聞九臯外孤鶴時一警晚過簡可太守汝陽池上講堂蓮塘一夜霜萬葉颯已枯爭言秋可悲况當嵗行徂嵗徂何足惜衰鬢非故吾昨來汝南行先賢傳有無往者利如錐只今競錙銖我慚文翁化刀布蜀物俱習歌述德詩欲選楊何徒手脫眼復暗文字愁糢糊憫兹經月勞忽得一餉娛宛宛開明鏡虹梁爛神扶玉堂清且嚴似入仙人壺邦君自公暇結搆城南隅百頃面風漪談宴羅文儒我忝草年舊懷抱亦不孤西風吹木葉落日低浮圖回睇甘露門佛香生寶趺光景既復佳還來立斯須分火照歸騎驚起城上烏再到汝陽目極淮西古戍樓烏烏殘角似邊愁一池鵝鴨寒波沒八代文章斷碣留夜半火光穿虎落曉來寒色犯貂裘病夫自笑摧頺甚風雪連天入蔡州沽酒行次胡抑齊侍講見貽原韻奉答冰雪凍天地臘甕忽已香破殼新鵝兒欲取大杓嘗康成飲一斛八尺頎而長叔夜玉山頺不用人扶將先生溫克姿性如九醞良獨醒視皆醉濡首時一昻晉安餉五經不誤縹與緗往嵗關隴間檢校費幾囊至今沃蘆管曾不羶黃羊歸來好事載時就元亭揚風味念麯生傾倒有索郎顧影每獨盡閒和淵明章且莫嗤惡客不飲者為惡客出元次山集害馬入歡場亦莫厭醉侯此藥未腐腸試共法士語大笑恐不詳美哉惟江公妙論入微茫夜半至栁湖宿蘇氏園前臨栁湖口月色照履迹十里寒烟中犬吠林外雪馬煩車亦殆豫亦倦于役稍喜燈燭光開門遲來客卧疴汴城閒寂無事偶於齊東隙地編竹籬雜植叢花小草期春夏間䝉密爭發亦可愛也因題一首窄窄編門短短籬藤纒花繞便能竒十年種樹心應懶三月成隂事未遲嵗久莫愁秋雨壞日晴惟待好風吹老夫管領春光在桃李無言自不知明日復用前韻千條萬葉欲穿籬幻出空齊一段竒漳浦自憐多病久劉郎不恨看花遲新歡良夜金尊滿往事鄰家玉笛吹絲竹中年賴陶寫若論兒輩莫教知次韻查悔餘見貽風急天仍雪春寒書苦隂故人空谷訪衰病隔年侵老辨中邊味禪空愛染心忽蒙題好句一字一兼金海內稱詩伯天邊閲嵗寒霜松心共古溟漲筆爭寬蓬户延新益蘭臺忝舊官應憐衰謝意只作朽株看淇汲道中與毛扆再淇汲春風已滿川花花葉葉各欣然輕烟薄霧熹微日最是詩中畫裏天哀怨猶傳水上聲驛門花事十年情丙子入黔與扆再同過此太行山下東風路頭白重來並馬行聞道說詩傳世業不須捧檄羡微官二王遺法分明在落筆從人袖手看泣玉投珠苦亂真一篇窮鳥尚長貧二千石不如逢掖始信威明是可人時將之京將逰黃華㑹病不果寄題四絶句世緣道味本難兼方丈維摩病轉添夢到青山看飛雨一條倒掛水精簾避暑宫猶故址存炎天冰雪瀑流翻晉陽萬騎圖中見霸氣西風賀六渾何處天花引佛幢數弓間地拓春窗此身只合針鋒隱底用山僧四十雙片石莓苔劫火餘王郎妙墨比何如隆慮山下秋風早滿谷黃花夜讀書奉文寺西廊揚幕風高花事稀蘋蒲一樹思依依祇應三月長廊下記取年年似雪飛道旁妃冢窗中玉女烟霧空地下香骨埋春風層城珠樹有搖落無賴野棠紅故宫盤龍古鏡回雙頸省識叉茸昔花影綵雲一散不歸來嗚咽泉源寒玉冷人間嵗月秋復春葬時百物隨輕塵土中拾得黃金雀回首可憐傾國人楚魂湘魄無休歇白道年年直如髮珠簾斷盡望京樓猶照羅衣舊明月百泉試院喜雨㓨山出飛泉散作百道乳歡喜千小兒一洗饑渴苦我持此願力默坐何所補大哉天公仁憫此欲焦土山中氣候變倐忽雲生縷竹間騷屑嗚晚來泉上雨隂連太行秀地入嘯臺古得酒對明燈中夜更起舞百泉蘇氏小樓垂栁垂楊緑可憐一泓春水細生烟小樓光景常如畫獨客心情只似襌紅藥喜霑三月雨青山長憶百門泉此身婚嫁行將了或恐巖栖有舊緣試院水亭蕭蕭夕葦嗚磔磔春禽語階下濟水深窗中太行雨題匡山瀑泉圖倒挽大海流忽下青天來萬古一匹練日走空中雷棲賢坐禪客靜聽如嬰孩仁者心不動聲聞何有哉看畫如看山恍與支許偕紅葉飛林杪白雲宿山隈當時謫仙人笑口為之開欲從乞涓滴㵼作萬瓊瑰四月十七日晚霽宿香山寺忽湧珠宫眼乍明毗耶長者舊經行門臨水態山容好客到終風暴雨晴楊栁老無飛剩絮琵琶凄斷譜餘聲白毫光裏黃金色幻出魚龍繞化城是夕張烟火戲城南蘭若偶因送客入孤村一帶蒼烟繞寺門長者更誰金可布人間不信石能言內有周使君碑含風細葉蟲吟早帶雨幽花鳥踏翻牆下蕭郎兩叢竹它年㑹見汝生孫立秋前一日吹臺奉送雄飛蛟藩雪子南歸同用秋字作一篇賓客平臺訪昔逰浩歌酒罷重離憂可知舊雨勝今雨他日杭州說汴州樓閣尚烘三伏暑林臯又到一年秋登高作賦須公等天上黃河繞郭流秋榜放寄萬生西田錦衣玉食李方叔穠李夭桃秦少遊毷氉秋風詩筆在且從南嶽鬬諸劉謂劉太乙庶常昆弟紫泉山下稻畦香朱老東鄰有草堂莫遣清樽負重九桂花零落菊花黃九日白髮依時至黃花太瘦生亡何聊可飲重九愛兹名淵明九日詩舉俗愛其名病廢耽書課間餘抱甕情暫來籬下坐指㸃說秋英立春日苜蓿先生到骨貧一尊酒尚可娛賓丞哉數慢應如我老矣無能只畏人冷暖暗移銀箭水顛狂任閙土牛春小饑忍待明年麥日望東郊雪意新日長雨荒三徑掩蓬蒿贏得吳葵幾尺高誰道日長無一事野人門外送櫻桃三月草七日偕諸友人吹臺小飲晏溫天氣景冲融勝地招邀勝侣同節物今朝春更夏是日立夏亭臺昨夜雨兼風九原賓客思公子萬乘旌旗謁故宫倚遍欄杆獨惆悵落霞遙映酒杯紅贈别陳五玉相逢兩世記交情書記翩翩方盛名早對楊梅人已異新題鸚鵡座皆驚土風偶采陳留傳地主應叨許氏評李義山詩叨蒙許氏評謂真意大令也三度春燈上元夜他時莫忘汴州城丁亥戊子己丑元夕五玉皆就余大梁大梁歸吳寶崖以四絶句見貽依韻奉答百川東下幾西回樗櫟天教飬不才千樹桃花等閒事底須惆悵看花來公事誰如松下哦可憐辛苦學隂何三年入座春風少千里懷人夜月多飛鏃塵埋古汴京百年弦誦賸遺聲須知食肉封侯地笑爾書生說管城壺中日月卷中詩燥濕絃從指上知拔俗云誰出新語為鄰自古愛清詞題吳寶崖雪龕煨芋圖異時求仙人辛苦為服食年年餌丹砂未見生羽翼不如寸田裏日夜掃荆棘此身如芭蕉霜霰將嵗逼寧知雪龕老有此冰玉色芋火衡山陽竒蹤出伏匿披圖感遺事宰相讀書力啖此毋多言仙骨㑹當識古意一篇答山言編修佳人坐華屋織錦寄相思脈脈窮巷女寒衣白素絲蘭苕春有贈桂蘂秋方期婉孌保嵗晏非云雲起時雨後月出復為雲掩團團白玉盤瀲瀲黃金色沈沈清虛府蕩蕩水精域經旬積雨洗明鏡淨如拭坐望夜景澄忽悵天宇黑冰蟾雖暫好奈此蝦蟆食未成如輪滿已妬為弦直喟然增煩憂何由豁胸臆淅瀝仍空階翻飛少歸翼何當掃昏翳一為破側塞清風颯然來真宰信有力題盧素公庶常抱經圖昔者吾先君友生求海隅通經鄙章句獨得博士盧風雨四十年壞壁餘榛蕪兩家子弟中君握瑾與瑜世業明春秋學先啖趙徒我聞聖人義一字懸褒誅五石與六鷁詳略徒區區三傳誠穿穴專門守拘迂如何盡舍旃虛空尋坦途君博且知要薈萃羣言殊少翁修先業授受寫此圖秀骨清而丰未覺列仙癯我老久廢學西家一愚夫竊聞古經術本以應時須君方上玉堂佐化若唐虞毋為决事比後世譏醇儒閒居遣懷負疴得閒居誰云常寡歡寢跡窮巷裏故人青雲端時時來相存勞苦問燠寒間或具酒食亦未陋儒酸言詠風月佳良夜每向闌因思三月病豈不在一官及兹未朝請轉幸啓處安既安何所須大笑挂壁冠昨日苦鬱蒸赤腳不可襪中宵氣候變淅淅凉颸發軒窗忽飛雨逺夢落清越朝來疏鐘動冠蓋趨天闕泥滑詎可行迫此後期罰繄余獨何事睡起意未歇既晏加我餐乍凉櫛我髮懶慢㑹當免眷焉竟此月謝彼燕頷姿稱此山巖骨愛山不在山田歌非知田古嘗有此語吾寧不謂然猿鶴文或移沮溺心相關山林與鐘鼎天性各所便古有獨行士九十常饑寒矧余東岡陂自守乃不堅連年復衰疾覽鏡非朱顔親舊半怛化自顧良獨難行歸秉我耒猶及秋風前鷃或疑九霄魚嘗樂千里豈知樊籬間不出盆盎裏去來隨運化小大冇物理我家南山南衣食粗可紀閒思琴書㺯逰值風日美招邀到緇錫談笑及兒子峩峩岱與嵩下視蟻蛭比瀛海環九州坳堂一杯耳前年梁宋交三月冬無雪去嵗復苦旱中夏失雨澤我乘使者車憂虞朝逮夕江淮又大水彌望失阡陌粒米貴於珠念此肺肝熱昨來長安住升斗太倉糴兹焉復連隂秋稼恐不實行愁米價貴何以安我室至尊軫民艱公卿屢前席訏謨廟堂事聊復守蓬蓽布衣一言死何况明主恩誦詩及此篇感激衰涕繁十年為誎官事每上殿論迂濶乖衆議數䝉天語溫雖微古人節庶幾職事存三年復來歸冗散日閉門江東頻水旱饑餓愁黎元進既謝言責退傷久疾魂太行未云險中有虎豹蹲咫尺生濤瀾蛟螭詎無痕報國事已矣終身歸灌園喜馮文子至欣聞故人駕來共菊花時吳㑹幾時發嵩陽隔嵗期烟波三載濶風雪一官遲攬鏡休嗟歎岧嶤緑玉枝懷清堂集卷十一
