body:
  text: 懷清堂集目録别集類六國朝卷一古今體五十四首卷二古今體六十四首卷三古今體七十六首卷四古今體五十四首卷五古今體四十九首卷六古今體九十四首卷七古今體七十三首卷八古今體九十一首卷九古今體六十五首卷十古今體六十五首卷十一古今體九十七首卷十二古今體六十首卷十三古今體五十八首卷十四古今體六十三首卷十五古今體六十五首卷十六古今體七十四首卷十七古今體五十首卷十八古今體五十六首卷十九古今體一百一首卷二十古今體六十首臣等謹案懷清堂集二十卷國朝湯右曽撰右曽字西崖仁和人康熙戊辰進士改庶吉士官至吏部右侍郎兼翰林院掌院學士浙江詩𣲖自西泠十子之後競以藻繪相髙而氣骨漸弱右曽以清鮮朗潤一洗其習初從學于王士禎稱入室弟子後以使事入黔體製一變詩格益進大抵煆鍊澄汰而出之以神韻當時士論翕然推之其名與查慎行相埒而慎行贈詩有蓬萊領袖得詩仙之句所以傾服于右曽者尤至沈德潛亦謂浙詩前推竹垞後推西崖兩家之間莫有能越之者今觀二家之集朱彛尊學問有餘而才力又足以運掉故能鎔鑄變化惟意所如右曽才足肩隨而根柢深厚則未免稍遜齊驅並駕似未易言然亦近人之卓然挺出者也乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
