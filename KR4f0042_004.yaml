body:
  text: 懐清堂集巻四吏部侍郎湯右曽撰同查查浦俞陳芳㳺憫忠寺幽州遼宋來憫忠寺最古緬昔締構初貞觀實英主長策御區域四荒羅牖户鴨頭漏帶水海外跨極浦葢金好鬚髯作事曹馬伍兇殘義宜取豈曰此裔土闗門士十萬一一手摩撫英公應祕記西嶺吼虓虎瑀公卧若龍東萊駭鉦鼓傳烽入塞垣破陣圗幕府登山紀功徳天子神且武豈知栁城南花生骨已腐哀忠塟遺骼傑搆闢宿莽要將龍象力洗此刀韣苦厥後上將旗聫翩三十五俘獲獻昭陵談笑收五部所恨莫離支生未伏鑕斧我來㡬憑弔事往難覼縷荒碑半剥落莓苔漬伏雨及此晩日晴松隂轉廊廡梵音寄喧寂秋容迷仰俯朋好得兩三筆力挽强弩千年如轉燭萬里想負羽待考金石文前史非小補過雙林寺髙栁鳴蟬已到門小橋雨壊晝昏昏茶香一勺知新味鴻爪何年識舊痕乍落槐花秋夢冷自翻荷葉午風喧癡人未用癡相惜寳帶華纓一笑論寄俞錦泉舎人三首石家勾管好風光紅袖圍中倒緑觴十二年來如昨夣舞筵猶記舊衣香碧闌干畔月朧明天禄圗書縱復横的是神仙有才子艶歌聲外讀書聲屋梁㡬載寄相思不遣㣲霜㸃鬢絲聞道先生新氣象酒邉瀟灑百篇詩送呉青厓初驚半面薊門霜乍别河干暑雨涼共羨少年先入洛豈知才子倦㳺梁庭分玉樹枝枝秀堂有槐花冉冉香每到經樓最髙處始知季虎氣堂堂題楊青村黔行圗盤江水淙濺五溪石竦桀天寒迫殘嵗我友萬里别垂腰大令綬行意慘不悦我還笑謂君有美此才傑虎頭食肉志固已輕九折豈比碌碌人跬步憚棲息志士有髙駕良馬無停轍龍蛇百尺姿正要飽霜雪夜郎古荒服勇鬭劇猊抉只今知詩書諸生習綿蕝往看文翁化魚貫就行列官閒亦何有俗朴門不閉陋邦雖苦貧往往富金鐡催科幸無擾得酒笑且咥昔者君先人曽持使者節六州思羊公遺愛猶可説至今百蠻地士女為哽咽君還訪舊經碑字未磨滅耕烟今逸老妙手寫幽絶山川與城郭好景非一設梯天一握近拔地寸步劣最愛巉巉峯雲裏見牡凸果然有此境遄往計當決況聞有丹砂磊砢出靈穴清詩照絶徼光比孤月潔還為風土吟寄我寫勞結題范夫人畫三絶句新蟬栁絮才髙早擅名丹青餘事亦天成閒將鸞鳳鴛鴦手寫出新蟬第一聲黄葵金陵小筆畫葵黄千載同拈此瓣香綺繡一絲容不得道家裝束淡衣裳紅蓼江南蓼岸紅無數多傍魚牀與釣槎標格一枝看更好不須辛苦作叢花李丹壑前輩見示白門集十年誦君詩三年隔君面闗河邈風雨塵土委筆硯君行曽㡬時日月如急箭别程槐黄黄鄉夢江練練天邉念朋好雲外踈鴻雁每思合并難執手笑且抃寒暄無恙外冰雪探一巻君才雙雕玉粹美無可揀十五登承眀麗藻壓羣彦詞塲㡬老宿斂手避文戰貞淫别雅鄭同異考箋傳沈酣嵗月來體製看數變蕭閒白門集暑雨冷夏簟一曲長干行飄零㡬歌扇秦淮好簾幕楊栁萬條線一一思舊經悠悠托深眷江花開五色妙語讓君擅沿流泝淮淝走馬過梁汴懐人弔古作一字一黄絹煙霄攜綵筆仍自入吟院顧余誠迂愚辱君屢殊眄㳺門篤舊友雅咏諧宻宴國香蘭九畹詎比蓬艾賤琅管俗耳驚雲錦凡目眩還君繡鴛鴦金鍼覔誰見移種白丁香兩株閒從老圃得深談灌植茅齋小似龕種樹寜為十年計看花自笑一春貪輕隂晝永移簾押殘夢香清撲枕函愛爾抱叢干㸃雪寸根銜取送江南次錢蓼湑見貽韻隻手誰能障巨河空驚五色眼中過新愁岸栁低攀袂昨夢宫花輭襯鞾楚澤三秋吟墜露漢庭一笑失横波先生貝齒侏儒飽底用風前想玉珂南榮有軒三楹縛竹為籬植雜卉其中以為㳺息偃仰之地四首讀書惜已老看花悔不早平生此二恨耿耿挂襟抱七年京城居庭未見寸草天機紛六鑿世網觸九惱豈知物外閒熙春自娟好形骸嵇叔夜土木太枯槁吾師郭林宗逆旅亦灑掃枳棘編作籬薜茘栽為墻年年貯秋雨草樹半已荒京國苦風埃此樂安可望盆盎得生意露下明月光破蟄走百蟲昨來㣲雨涼呼童縛竹埤花藥一兩行文無催我歸海棠破昨夢牽牛始引蔓錦帶已羃空纎纎白棣花萬㸃雪吹凍勝春如佳人朱顔酒㣲中光随暮色斂香與曉風送嬾知世縁踈静悟物態衆䑕肝與蟲臂擾擾争羣動南園飛蝴蝶翩翩若有情花房釀㳺蜂戢戢如有聲暄妍感時節辛苦各自營我來卷簾坐讀書軒南榮一餉亦云樂千載如可并異時王安豐眸子秋水清嗟哉營營子爝火安得明送吕山瀏之臨朐讀書把丹鉛作吏就朱墨書圍足瀟灑吏事有程式吕侯風雅才開卷欣獨得當其下筆妙魁磊百夫特只今親簿書民事紛已逼莫輕百里宰大小各奉職才從百練老節自寸莛植此中惟宜酒毋乃負飲食又笑朱子元奮髯太强力吾師葢公意刑名本道徳齊州桑麻川沃土惟赤埴烟雨勸春田燈火催夜織但期畢租税未用憂盜賊君才無不宜賢者詎可測三年課治行天際翔羽翼看君任諌諍偉矣邦司直送家兄子方之清流行路何必蠶叢難千渦萬沫新羅灘磋磨一線千仞底篙師談笑無波瀾山重水複阻烟霧孤城小驛開茅菅君今行持部牒去舴艋一葉凌飛湍隂崖暝谷濺急雪坐覺六月溪風寒到官梅雨歇清暑萬山茘子方舒丹訟庭無事數花落石上時有青苔斑清平長官父老喜儒雅吏治琴書閒對床應念老兄弟擾擾嵗月驚雙丸平生僻性愛水石念此不得同躋攀飛車恍若行萬里坐我絶壑危峯間清猿夜夜月挂樹素馨一一香連山閩州芳草滿沮澤百本好寄幽人蘭送魏禹平之濟南時赴李觀察幕七十二名泉娥姜水第一北為大明湖湖寺隂負日開軒面魚鳥水木最明瑟物理感廢興故址亡六七惟餘浄池水濫若咒泉溢年深壯蓬葦彌望日䝉宻緬昔厯下亭少陵有健筆千年觴詠地野水蕩為潏使君北海裔文雅邁流匹經營還舊觀比者工甫畢豁達排天字空明俯泉室十頃開鏡匳一片拭琴漆濟南多名士土風足紀述意猶不自厭千里盡僑肸君今囊書往文字提一律虚徐夏景清散落濠上帙照眼荷芙渠紅妝翠擎出輕舠弄烟水舊夢俄已失從君續前㳺欲往恐難必次韻送王令詒之茂名二首王㣲風月蚤知名綰綬南巴萬里城雪客有時還隠鷺金衣何處不聞鶯桄榔葉暗侵杯斚翡翠巢低偃斾旌京洛舊㳺重記否六街塵土閙春餳各以篇章鬬苦吟門前馬驟復車駸分箋共打蘭陵鉢索句休言單父琴海上著緋從政始鬢邉吹雪舊交深蠻鄉夜雨應囘首珍重瓊瑰贈别心題松南釣磯圖為令詒作春波鱗鱗逺涵碧孤月冏冏暝吐白萬條楊栁五湖風三尺綸竿一片石巻中漁釣誰畫本江左風流此詞客坐來興寄殊閒閒望裡神光猶脉脉平生廊廟才自大夢寐江湖性所適細觀鷗境訝許寛囘首羊腸等閒窄雲根沙鳥來有信磯畔春潮沒無迹先生甫里編庳篷丈人江上容安宅筣笓細碎安足道笭箵縱横竟何益明年海上拔鯨牙大笑天邉坐鼇脊送金孝緒之徳興丞扁舟泛彭蠡雲物入九夏落帆嵗寒山林木森繞舎官閒亦何有俗儉人事寡想見藍田尉哦詩古松下同方若霞沚晩過迎仙觀得九青六麻二首重過蘚逕與莎亭人似飛鴻此又經好景一年看厯厯秋光萬㸃散星星松廊斜日隂初轉石砌閒花晩欲零芝葢霓旌俱寂寞空餘薜茘短墻青玉清歸路有棲鴉不羨唐昌觀裏花冰齒猶寒青石髄囘頭已㫁赤城霞壺中浩刼匆匆過鏡裏霜毛漸漸加仙酒餘杬尚堪買煩君重到蔡經家夀徐少司空四首丹毫鳴佩玉丁東岳峻風標仰岱嵩七葉英華傳僕射九州水土倚司空謨謀朝右勲名大喉舌天邉地望崇眷注方隆開濟日共看一徳贊元功螭坳槖筆廿年餘一代文章重直廬鶴禁每開前殿講龍香時啓太清書三霄露下珠交映五朶雲裁錦不如昨日南宫司玉尺元和嘉祐轉移初身兼忠孝古無倫斑綵承顔色笑頻補衮日攜慈母線循陔節䕶北堂春堦前羣從芳蘭秀膝下諸郎玉樹新最是素絲清節久俸錢恒散故交貧如公金石固風期節貫暄寒冰雪姿愛士數搜轅下足㣲才曾獻卷中詩洪爐久荷鈞陶力哲匠親為儒雅詩八月秋風歌進酒露華方浥鳯凰枝題王茂京給諌仿荆闗青柯坪圗洪谷天成氣態殊闗穜古淡足工夫出藍標格無差别一様秋山樓觀圖題李松嵐翠㣲寺圗我愛西南峯三五總娟好何當領絶境佛閣破霜曉隂隂秋樹暗一一寒泉繞他年兩芒鞋雙塔記林杪送李約山之官涼州似君文采駕枚鄒忽漫乘軺過隴頭司馬一官新按部河西千里舊防秋邉庭鐃吹傳才子父老壺漿拜郡侯滿汎葡萄倚横笛桃花春醉古涼州送沈昭嗣之官監利東陽才子河陽令綵服還鄉破臘新千里江山方捧牒一船琴鶴便迎親邑中霜橘探懐美郭外湖魚人饌頻況是官閒詩思好渚宫西上待吟春夀大司成呉楞香巍峩今儒宗公如五岳岱延陵大賢後世逺典型在詩書承累葉彪炳發千載傳家棣華亭聞者知友愛中有養親園花藥粲多態公初讀書處黄山小樓對下有百尺谿溪聲喧雲碓烟光變朝暮山勢争向背發而為文章卓犖壓前代起衰真大手落落誰與配煒如金殿草鏘然玉堂佩公之博雅性蟲魚收細碎公得閩洛詮金石聞謦欬袞袞長安塵公獨樂恬退澄心觀往復貞志絶尤悔髙深詎窺測約畧舉其概平生門下士湜籍凡㡬輩昨年校春官鋤剔理蕪穢本以採蘭蓀何圖壯蓬艾青衫上講堂辱公勤教誨百家搜寳秘六義精剪裁侍坐每夜分燭跋見至再右曽薄材資有聞行不逮懐恩無所報拊心常自痗公為王謝門玉樹種庭内海國珠貝光天孫錦無纇清和好時節晴雲巻黮䨴一尊持獻公南山翠如黛夀考咏作人菁莪資灌溉他年秉樞軸㣲名置夾袋送潘集生之官曲沃連璧風神十倍加牽絲路指太行斜七年杏苑初懐綬一縣檀郎只種花詩境小胥安筆硯官情老父話桑麻銅琶錦瑟新聲好笑拂青鸞照臉霞集生新納燕姬送錢叔鬯之官閬溪金明池上杏園偏猶憶宫袍稱少年家有詩名傳大厯官從雲棧入西川山迴劍閣春風早水接嘉陵夜雨懸聞道閬中花最好歸栽梧掖柏臺邉題放鶴圖仙禽無凡姿矯矯九秋翮稻粱生計㣲雲水歸夢積主人意閒逺共爾風露夕舉杯向青㝠彈琴坐白石上玉峯徐公四首三星魁下指東呉萬壑流環海若趨宇宙大名前代少制科髙第一門俱䕫龍望自中朝峻楊墨言從别派驅開濟心勞勛徳重始知經國在醇儒邇英進講日曈曨一奏豳詩早達聰諷議每移明主意清嚴猶見古人風國家大手知無敵禁掖親題歎絶工天下文章公望在韓歐陽有起衰功海岳英華葢代人由來絶業逈殊倫六經屢折羣儒角九服齊扶大雅輪無事心常愛丘索有才誰不仰陶鈞每看元老虚懐處吐握風流一旦親春官玉尺手親持科目光華此一時嘗惜文辭傷篆刻獨將經術作宗師士當失意猶無恨材苟懐竒定見知只有公門慚小草也滋化雨伴仙芝送朱敬如出守九江三首望郎文采敵枚鄒旌葢南行及晩秋三十宿宜新月色二千石是古諸侯門前爐擁一峯秀郭外江看九𣲖流髙詠琵琶亭上路使君何減白江州世家喬木有清風複榭重䦨玉一叢我愛清吟此才子人言好士類司空雪車冰柱風標似秋月春雲意度同合與匡廬作賢主瀑泉萬斛在胸中閒分翠管擘雲箋文字師門托契偏貪借異書常萬軸共持杯酒又三年眼中簿領心期少望裏江山夢到先觴咏情懐官況味北來時遣驛書傳上陳太宰四首青漢珊瑚闢作窗看公談笑便經邦人間争御李元禮天下不名張曲江華嶽西來通蜿蟺黄河東下聴錚摐篤生合是山川力拔地擎天那得雙太常髙第早知名兄弟才華鶴算程雅以文章司瑣闥正從經術重公卿寳書天上含毫入香案雲邉領仗行每到九重嗟賞處玉堂鈴索悄無聲曽將詩格壓羣流大國齊盟數澤州倚出半峯姑射雪坐來脱葉洞庭秋撑腸平貯五千巻頫首休論三十籌王新城李合淝一時清望在每耽佳句輒㝠搜韓歐陽在許誰同屏底門生仰末風小草栽培嗟薄植大鈞陶播倚元功霜清或解孤生竹絃寂還收未㸑桐自顧何人最惆悵敢將啟事望山公送潘尹之官太倉四首輸與髯卿此一官只教髙枕勸加餐銅坑紅綻楊梅熟先上潘郎瑇瑁盤分得君王符竹來宦名雖小亦悠哉太平且喜稀公事撥了文書近酒盃呉中舊事未全荒畫本詩篇王太常今日東園好風景不妨騎馬數徜徉曲殘紅豆最相思何處鍼樓祝喜絲好為春風買桃葉待教唱我渡江詞雪霽寓齋小集跫然鼪鼯徑足音未易聞翩然鸞鶴姿叩門來數君數君髙世才聚或動星文輝光借蓬蓽謦欬生風雲朝來㣲霰集既霽仍清芬閉門手古帖不換千鵞羣車跡到亭午醆杓逮夜分要當劘詩壘豈徒列酒軍我方同公榮不飲亦自醺如香爇百和乍染猶氤氲仰屋笑著書此語古曽云吾徒亦何事糾軋長紛紛退之愛文字苦嘲盤饌葷踏筵果可致寜當避羅裙陋彼下士語細響同蠅蟁吾欲清其源三沐復三薫醉侯沈麹蘖左史誦典墳知味出醖釀欲殖非耕耘文堂共麾幢詩酒兩策勲熹㣲待朝影黯黮留斜曛懐清堂集巻四
