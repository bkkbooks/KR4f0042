body:
  text: 懷清堂集卷十八吏部侍郎湯右曾撰贈顧九恆時戊戌上元後四日八十翁真壯青雲算鶴程賦詩留古意把酒謝時名夜雨燈前話春風隴上耕魯連心倜儻髙意動聊城題萬九沙蘭窗卷劍履槐堂世業存髙風佩芷襲芳蓀窗前蘭似廳前栁指與丹陽六代孫春叢空谷紫抽芽九畹風流異代誇三百年來收拾得大弓寶玉送君家送馮文子之禮縣行矣將圖不朽名未嫌仙令一官輕地連同谷曽開府天近陽關尚用兵小邑自來無大費薄田只要勸深耕誰知萬里河湟外正有書生願請纓與翁思敏話舊小來同學又同年門户潘楊舊有連挾䇿尚思鄰馬肆脫繃誰省弄犀錢家山並宅心長在官海連舟地偶然虎嘯猿吟鄖子國不妨間話夜燈前寄和令詒給諫海上看鷗幾歲華舊來朋好每咨嗟九苞威鳯飢何食一角神羊觸必邪焚草未應忘報國著書聊喜得名家來詩有詩廦書淫之句當時湯餅筵前客玉雪兒郎已可誇憶到天池彩翠重只今梧院尚隂濃一坳水底波濤濶千尺枝邉雪霰封地下故人雙諫議謂西齋耳溪唐范攄云二諫垣矯翼翩翩雙名並席門前黛色九芙蓉祇應爛熟塵中事未厭山僧夜打鐘簡澗房兩三坊隔無多路六十年餘有限人只合時時尋老伴還教處處鬬間身詩場戰後千夫特酒海深來四序春我似右軍終樂死是非得喪等浮塵送色侍郎奉使西寧督理兵餉天近陽關震鼓鼙行營金印手親提轉輸關內兼河內節制湟西更隴西傳箭軍中收鐡勒踏歌池上唱銅鞮葡萄酒熟邉城路好問尚書訓士齊時冢宰富公開帥府肅州過法華庵玊河屈曲貫城流滙作風漪十頃幽清浪似翻龍鉢底間雲遙接雁池頭老慚佛法三乘入病想僧房一榻休他日蒲蓮浩如海可知宜夏復宜秋天河用杜韻素練經秋直涼波徹曉明界天分淡白避月出孤清隱見光浮地闌干影挂城待尋機石上好趂晚潮生棗初種甫尋尺今看半出簷實經風裏坼味較市中甜鄰逺知難撲兒爭笑不廉甘瓜削榆次為飣客盤兼偶見忽看田野趣半在老夫家屋角壺堪斷籬邉豆尚花侵階叢野菊絡石蔓秋瓜他日東屯去為農興倍加曉起林烏忽一鳴攬衣起已曙風吹夜來雨葉落窗中樹梁燕去仍還池花晨復暮似聞采菱曲夢入江南路宣武門東城下曉行老去應官有底忙未明先起攬衣裳人從鴉鵲聲中出路入輪蹄影裏長閘下已添秋水勢城隂初散曉煙光隔河樓上花枝好尚護重衾半篆香中秋月蝕明鏡塵昏奩匣斑參差桂樹有無間夢魂似到清虛府偃息真慙救護班玊斧修來仍璧合蚌胎滿後看珠還一篇孤憤貞元體笑爾妖蟇亦等間戊戌閏八月三日送安溪相公喪至廣渠門外歸過萬栁堂碧栁行疏尚有塘偶隨步屧一褰裳三年人到悲歡異乙未秋餞送相公假歸曽過此八月秋深葦荻荒橋壞誰裝新雁齒水枯已斷舊魚梁過溪更問參寥子向有龍井僧住此今叩之歸已二年矣雲物蒼然念故鄉葛氏莊入門池上小茅亭瑟瑟菰蒲水檻臨三尺也看波瀲灧數峯差喜石嶔崟天邉月到平臺逈春際花藏曲塢深不問園林誰是主可知看竹子猷心小雪後八日宿聿修學士苑西新居逆旅當時兩寓公壬辰以來數與學士借宿于此林亭今屬主人翁隔牆幾見葡萄熟來嵗還添芍藥紅衮衮流年飛鳥過紛紛俗慮覆杯空閉門風雪蒼寒地此意期君晚節同自苑西歸行墟墓間東華西苑往來頻失笑車中七尺身老冉冉兮雙鬢雪冡纍纍處百年人青天月自無今古滄海珠休問假真何肉周妻皆有纍不知何路出風塵大雪後一日九恆澗房同集寓齋感成一篇下坂千尋石礙輪掀天一葉浪無垠百年幾見為歡夜列座誰非既老人醉慰且休誇故李童兒聊任羡新秦溫房小墢堪遊戲已遣寒梅豫報春西苑請皇太后安是日大風寒甚撲面風尖奈爾何日光未動曉寒多問安長信宫中去緩步宜春苑裏過石以霜侵稜刻削冰如山立勢嵯峩汙人何與元規事十丈飛塵一任他除夕前一日作女中堯舜失宣仁聖主居廬孝理新每待檢書官燭短苦難安枕禁鐘頻十行遺詔冰霜日三獻哀詞侍從臣嵗晚玊堂尋故事更無帖子寫宜春覔春覔春惆悵為春遲九十風光欲半時桃蕊乍苞宫纈影栁條未散麴塵絲年年觸物心多感夜夜懷人夢有思院落燈紅簾月白且排間悶一篇詩元夜思敏南指聖湖雪子咸珍峙公聿修寓齋小飲寶馬香車五夜回銀花火樹九門開強酬節物因留客未減風情試撥醅皓魄最明今夕月繁枝猶放故園梅盆梅數本皆故鄉所寄只嫌寂寞歡悰少喚取笙歌一部來次韻奉贈雪子昔遊曾是十年遲洛水梁園並馬時笑我尚羈轅下足羡君未點鬢邉絲因懷薦士中多愧除却歸田百不思蚤晚髙才選何武中和樂職賦新詩清明前一日與蘭揮舜揚南指翰編奏功比部西亭水部蒼孚思敏農部聿修大令峙公雪子文學花下小飲初過百六煩春工千枝萬枝雲錦叢杏花未憨梅已老照眼瞥見山桃紅是誰銜出蓬萊宫吾家亭子東復東三更霑灑微雨潤百態婉媚朝陽烘胭脂點注珠粉融玉兒窈窕窺房櫳一堆香雪嬌婑媠三年三度清明風有力莫因陳子公得間即覔王無功山雲本是戀邱壑野鶴乍似辭樊籠樂哉纍觴一舉空冰綃卷出霏霧濛尋香已見接翅蝶簇蘂漸鬧黏鬚蜂武陵漁郎迷短篷天台仙路杳不通極知此日足可惜默數後會將毋同當時少年今老翁花開花落常忩忩夜闌更借官奴笛一曲清歌明月中酬蒼孚農部倚遍曲闌風年光逝水同春當三月尾人在百花中數數煩佳句時時借樂童農部每以歌者至鷓鴣遙夜唱聊復慰衰翁齋中山桃盛開雪子用東坡江行見桃花韻作一篇見貽次韻奉答佳士如名花常恐委草莽心思折麻贈莫遣采蘭阻之子故鄉來冰雪暗江浦坐我林亭春紅點衣上雨似聞歌桃葉婭姹譍門女連朝困風霾欲刮一寸土幾枝吹未折萬朵嬌無語酬之以清詩逸思共霞舉湖堤晴渌漲夢想煙際櫓武陵疑可尋雞黍具客主天台採藥去誰云入道苦我作如是觀造物方付與興酣掌中杯意盡腰下組期君和露種天上鳯翔翥新移蜀海棠二株石鏡山頭好顔色蜀王宫中留不得化為絶艷到天涯燕燕鶯鶯春一國嫣然顧我頎而姝雙鬟千萬買不如輕隂似護午睡態細雨為洗梅天圖施粉施朱兩何有強言國色朝酣酒慈仁院中今幾年玊蘂飄零根已朽小窗揀得最繁枝桃李開殘未後時風和畫永簾押靜看爾綽約神仙姿買耽花譜謂海棠花中神仙題汪蒼孚農部五世讀書圖萬籖曽説貯書倉三本猶應剩墨莊誰識茂林修竹外别開花峙讀書堂承家學海與經神司馬風流迹未湮喬木百年餘蔭在望郎今是有名人感懷四首弱齡志典墳中嵗踏朝市生逢堯舜君可以出而仕十年持史筆八載分諫紙回翔領清班荏苒逮暮齒雖無理人術頗抱竊祿恥進退觸藩羝耿介罹羅雉漳濵久寢瘵老氏貴知止傾危聲利場翻覆輕薄子昔為膠與漆今化虎與兕問君何以然趨勢古如此但邀令尹顧請為公子死冥坐息羣動曠懷思往賢塊然獨忘情乃在太古前昨得故人書謂田居逺别涕餘澘萋斐貝錦織斷絶朱絲弦自小為骨月豈能捐愛恩中路各翻飛四運多變遷蔥蒨瓊樹枝演漾璇水源榮枯詎一致得喪感萬端矧余三紀餘摧剝傷肺肝芳華及時曜霜露淒復寒君看田中瓜鈎帶子母連君看林中葛詰屈枝蔓纒在物猶如此于人良可歎仕宦三十年始獲有此居此居何所有所有千卷書髙詞足文府精理握道樞一語苟為妙萬言同翳如所以餐霞人騰身在空虛駕鴻乘紫鳯飄飄風露俱左顧汾水陽右盼崑崙墟天孫錦七襄靈妃衣五銖下士方辛苦窮老注蟲魚歌亦不全無酒亦不全有逍遙有無間雲夢吞八九黃河只裳帶泰山等培塿功名足還掎富貴手被肘同為可憐傷何者云不朽牛山忽揮涕歷載到峴首況我沈冥人大海粟何有直排金銀臺南北望箕斗題商邱畫蘭竹箭美必採澤蘭香宜紉公子鎮東南空谷無幽人偶然托妙墨寫此平生親吁嗟魏公籌小筆乃爾神己亥五月足疾杜門雪子峙公過訪間話竟日作二篇奉贈各以姓立韻五馬浮渡來最數江南王豈惟養炬輩烏衣冠諸郎吾子年少日五色成文章舅氏古先生館子白鳯堂當時兩冰玉戚婭分末光我時黔陽歸始接衣履香回頭二十載雙鬢漸已蒼鸞鳯刺天飛翦鴒不得翔朅來到京國執手共感傷子才必見收行待槐花黃世有蕭頴士當識古戰場何假吳武陵一賦袖阿房我老多昏忘頗似東陽沈南史沈約傳老大昏忘不應受䇿每呼讀雌霓愛子獨精審連年領書局捆載車接軫休沐無餘間肝腎費鐫鋟誰為左右手衰疾謝不敏子也實俊才墨盡有餘瀋寸截方圓玉百衲龍鸞錦平生江鮑體繁麗自天稟瑣瑣視羣兒不滿一笑哂雅耽水竹居時就文字飲娉婷惜不嫁況乃邢與尹我誦退之言枚臯窮且忍樹下一首日夕坐簷下愛此嘉樹隂嘉樹最何好斜陽在髙林兩株盡西靡一株還東臨葉葉似相蔭枝枝若相尋宵有熠熠螢晨有關關禽下及九仞泉不見螻蟻侵上蟠百尺枝時聽竽籟音生非椅與桐材不中瑟琴又非杞與梓梁棟非所任只合幽人居同此靜者心念昔始尋尺合抱遂見今荏苒四十年老大轉沈吟杜云沈吟屈蟠樹閲人良已多對酒未忍斟中丞宰木拱大令宿草深獨有憔悴客猶然未抽簪四十年前屋主人為傅雨臣中丞沈澗房大令嘗假館焉余每往來談宴於此旬日癬毒發右足創甚至不能履地一篇解嘲是身如芭蕉破碎霜雪裏衰年諸病入小者亦爾爾經旬困吟呻永日在牀笫乍疑馬便疥肯信蛇齧指癢當十手搔禮記癢不敢搔快得一餉美初焉爬鳥爪既乃螫蠆尾顛倒魂夢驚楚毒支體毁寧知痛至骨但見水如泚到曉或不瞑竟夕常數起嗔火熾未斷魔風揚不死山谷詩黃昏風死浪亦半皴剝無憐肌浸淫有抉髓誰云尊兩足會當滅一趾決命訪醫門捧方求藥市暖湯濯宜數杜詩暖湯濯我足裂裳褁方始裂裳褁足墨子事茗勤點紅囊果還佐青子近用龍井茶研末橄欖核燒灰詎免水厄誚聊用瘍祝比支離近齊纂磨括類燕砥敢云蹇無尤粗望跛能履鶴脛翹不下夔足隻還踦介驚公文軒半笑習鑿齒拘拘還造物跂跂逐蟲豸折或以占鼎欹恐同廢几跰􅓷亦復佳蹣跚未宜鄙久虛結客襪屢缺候門屣猶能踏冰無但可曵杖耳臨風畏蹉跌看月艱尺咫扶行必徐徐舉步輒止止誰爭黃犢健自愛白駒駛智已不如葵憂同常置杞易林據棘履杞跌刺為憂何由輕緣骨空自繫金柅就燥呼芎藭去濕載薏苡榆枋雀一踊霄漢鵠屢企扶輿有門生閉户非髙士白詩閉户病足非髙士聞音久寂寞遺土或倫擬莊子視喪其足猶遺上也周遭解脫門出入無何里嗒然忘其身微疾何愠喜恭和御製詩四首有序康熙五十八年六月上賜大學士王掞等七言律詩一章都人傳誦口沫手胝臣右曾亦得擎跽回環尋繹熟復仰見我皇上勤勞機務優厚耆舊至意而鏗金戞玉美備八音瑞日卿雲光呈五色臣伏思七律所自權輿有唐沈宋始導其源髙岑復衍其派王孟繼之以清雋杜韓加之以沈鬱劉白之流便精切溫李之緻密婉麗以逮錢劉皮陸各有所長並臻其奧至我皇上駢羅百代囊括諸家詩學萃於大成琅函垂諸萬世今兹聖製一篇正如神龍片甲縈帶風雲丹鳯一羽照耀日月臣幼耽吟咏粗習篇章遭逢聖明塵忝侍從蒙恩拔擢以至今職親見欽明文思之君獲窺嫓雅儷頌之什誠歡誠忭心慕手追伏念宋時太平興國以後凡有御製多命近臣屬和唐時張説為集賢院學士有奉和聖製賜諸州刺史及賜崔日知往潞州諸作臣現直翰林不揣弇鄙竊附斯義敬和四章上請聖慈俯賜誨示臣雖衰鈍尚得仰稟訓詞知所師法臣不勝欣幸顒望之至四始鈞陶第一人宫商入律協君臣髙詞冠古篇篇妙至德根心字字真道貫百王言作範書窮萬卷筆如神揮毫旰食宵衣後六十年來慎笑嚬包羅歷代衆詩人沈謝何劉總隸臣句裏風雲森氣象行間煙月出清真黎元念切知無逸造化心通識至神遙想仙都凝望處夏山新霽翠如嚬螭坳龍尾幾前人寶翰輝華寵老臣求舊每多今昔感撝謙亦本性情真詩成御製同三代福自天申護百神殿閣薰風晴晝永墨花遙共苑花嚬樗散才非侍從人猥蒙異數領詞臣十行札賜劉常侍兩命恩隆賀季真立鵠班中瞻晬穆飛龍天上見精神南山願獻無疆夀四海歡聲笑不嚬雨過徂暑溽未闌油雲曖將夕林中過涼雨牆外響幽屐在襟沖思盈即事囂塵隔氣迥枕簟冷意愜魂夢適起行到前除抱疴稀履迹池邉孤月上露下幽花滴牀頭一卷書千載猶宿昔不有盈樽酒何以慰離索獨坐老椿百尺枝髙槐一畝隂不見喬木古詎知幽居深身間疾漸遣事往感在今挾子烏朝飛嘯侣猿夜吟如何别親愛惻惻恆此心長廊去逶迤行迹難重尋惟餘松石間髣佛有遺音幽憂何以寫空此風中琴卧起遣懷天風海濤喧一枕卧看髙槐舞疏影起行雨過百草榮坐久窗虛九秋冷青綾白夾或時御葵扇絺衫俱可屏隂濃舍後有梧竹寂寞門前無造請偶然一病豐暇豫且為多年掃頑礦時患癬毒米鹽家人事休白婚嫁兒曹書不省泛泛常思月在湖悠悠只憶雲生嶺歸與老境便平魚稻久矣童心戀閭井且試山中昨寄茶玉溝清泚佳光景七月一日偶作夜多不寐晝慵行強起風前白夾輕老去但餘松石意客來勸聽管絃聲緑萍得雨依依合紅葉先霜艷艷明都中雁來紅盛于六七月至八月後則萎矣物色新添四叢桂故人逺致闔閭城立秋後漢瞻見過取次金行熱未休櫚庭一葉落還不誰言積雨能消暑才到斜陽已入秋是日以酉時立秋舉扇似添風瑟瑟展衾試待夜悠悠清樽可是招涼物更乞先生為小留明日復用前韻作一篇叢薄煙銷雨意休西風䇿䇿簟知不每嗟世閲人成世見列子肯信秋非我有秋見漢書殘暑入林蟬嘒嘒蚤涼牽夢蝶悠悠曲闌干外間亭子多為看花待月留重過法華庵慈恩寺外碧湍流故老猶傳地最幽銀漢影斜天左界鏡光湖接水西頭煙雲日日從舒卷衰病年年未退休九十劫如風雨疾蟪蛄那復問春秋夜雨淅淅復淅淅終夜不斷絶恍聞秦絲怨如聽隴水咽孤臣十年流思婦萬里别如何此時情淚下俱成血夢吳山我夢還山中山中叢桂發洞古林壑幽臺髙風景豁潮聲落江海秀色割吳越感彼巖端棲弄此石上月送翽梧翽梧一字待翁因以待字立韻梅花庾嶺上綻若珠百琲歸來廬山雲湓口一帆待舊遊曾幾日槐火嵗五改喜子膺薦書治行壓寮寀謁帝蓬萊宫賜衣光翠彩忽承明主問敢蹈蔽賢罪故人乃知君令名出無賄行馳太守傳嘉績佇三載榴花照眼紅别我向淮海王城方苦旱乞雨禁刲宰何物登盤筵畦蔬尚堪採送介夫介夫一字固庵因以固字立韻大槊取富貴儒冠計或誤霓裳譜遺聲乃遭俗工顧騏驎天驥子鹽車在道路美人桃李顔倐忽感遲暮遊從三十載愛子心迹素冷然青松枝不受雪霜沍精心貫金石軟語欵親故昨來連牆居寒廳約頻赴兹晨忽告别離緒增觸忤悠悠淮南雲杳杳廣陵樹明湖足臨泛流電走烏兔大力負之趨藏山未必固明年待吾子槐黃及秋賦懷清堂集卷十八
