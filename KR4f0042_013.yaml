body:
  text: 懷清堂集卷十三吏部侍郎湯右曾撰次韻查悔餘編修元日試筆手板未能趨北闕蹇驢且免借東鄰傳杯後飲今逾後去癘神巫久不神一夕白頭遼海夢三年紅縷汴州春東坡元日詩堆盤紅縷細茵陳新來又復隨兒女綵勝銀幡作上寅再得一首簡悔餘相愛相於分最親道南道北况為鄰老欺病骨全無力筆笑詩翁底有神雪帶金門將盡臘花偷碧海未回春今嵗正月六日立春更思釀黍邀同醉恰喜今年嵗在寅聞悔餘齋中菊花入春色香不改亦一異也作一首簡悔餘幾見黃花秋復春别含淑氣轉洪鈞金堂玉室常溫地緑髮蒼顔不老身詎肯前驅為桃李要將晚節鬬松筠天教留作先生瑞草木應知臭味親再次悔餘見酬韻學白體來看濕雪冷煙中尚有餘香戀故叢對客留連誰送酒助君愛惜自障風往來筆札添詩興顛倒春秋笑嵗功任爾溫房烘不出好誇都市賣花翁次韻王樓村送桃花一本立春後三日點注夭桃出小枝也看碧葉間紅蕤江南三月屏風上寫遍徐熙畫裏詩曲曲回塘短短籬映門猶記乞漿時鬢絲襌榻春風少誰省三生杜牧之元夜前三日樓村悔餘西谷石臣小集寓齋以鈎字立韻樂事衰遲強半休空傳九陌逐燈毬故人地近能頻過遙夜情親更小留聲靜惟聞棋落子局喧忽笑酒探鈎皆是夕實事還期病起春風在排日同為爛漫逰疊前韻老病真宜急退休草年回首月燈閣名毬敢叨故祿三分去虛為頭綱八餅留世事難尋盂下覆人情誰測掌中鈎些些似得幽居趣碧海新圖作卧逰答人餉瓜二首把鋤已似到西疇老圃風神有此不他日秋瓜動秋思憶君如憶鄭瓜州春苗夏熟蒂秋除蒲鴿青青似愛渠十七篇書傳野老韋郎休笑理生疏題寶崖杖頭貰酒圖酒泉直欲就先生玉饋澄泓似鏡清轉笑能詩何水部生來從不識杯鐺百錢名輩有遺風似爾清標約略同裙屐諸郎半年少故應入座問車公為雲舉編修題蘿軒山水畫扇渴者每思飲飢人恆説食連旬望甘霖人帶憔悴色天公幾時出號令坐令油雲蔽天黑招提有客掃北窗造化挽回由筆力誰言雨氣終虛無淋漓妙墨為先驅林木痷靄潤不枯巖谷霾翳隂風俱何來此扁舟無乃舊釣徒跨溪作橋彴往看波跳珠渺然幽思凌江湖沙平渚逺不可摹更添茅齋倚絶壁是中端合置老夫樂哉冰壺已濯魄何用伊川買泉石圖成試問持贈誰玉堂才人紫煙客似從魚鳥共飛沈已覺山川在咫尺平生笑李成但得平逺工豈嘗師范寬凛凛盛暑中伏日割肉明光宫歸來傳玩招我同阿香門外鞭癡龍明朝一尺街泥融莫言放手難須知用心苦置君懷袖定何許會令青天出風雨送友之閩中東西澄徹兩溪分仙穴時時起白雲此去真如駕鸞鶴會應親見武夷君文公精舍隱屏邊小劫應論八百年待擬相招到雲窟誰言謗道是神仙文公隱屏詩下有雲一窟仙人久相招席上上下花光與燭光周遭碧樹映紅堂一時嘉會人傾坐四卷纎雲月照廊無事且論今夕飲有懷還發少年狂凛秋節物春暄暖誰道青驄滿路霜寄錢石臣侍御蘭臺梧掖忝為鄰龍尾螭坳總近臣回首十年如過雨相看一笑等前塵貧無夾轂雙官騎病念扶藜二老人余亦久困羸疾因用東坡和錢穆父堪笑東西二老人句歸日清隂還待我兩家同占緑楊春蕉飲南歸江都郵示近集作此寄簡應劉俱異物謂元朗赤抒岑范各衰年與子深相憶新詩好共傳煮鹽饒估舶伐荻足江田一誦蕪城賦真思隱似仙題華亭少宗伯甲秀園圖謝公有邱壑逺在五湖湄共指青山宅遙翻赤羽旗天題留尚濕睿賞出常遲兩度逰歌地千秋魚藻期昔者扈仙蹕曾經到午橋九峯分映户一水暗通潮日照苔階麗雲依綵仗飄至今圖畫裏倣佛聽咸韶閏七月二十六日過一莖庵試拈一莖花往問文殊師如何大地藥不救霜生髭秋風灑袂秋窗曉清淨莫嫌詩自繞蝸角蚊巢有戰爭回頭未覺兹庵小同雄飛文子雪子以不雨晝常隂句足成一篇病謝驅馳力秋知黯慘心乍寒人已覺不雨晝常隂天外雁初到草根蟲苦吟無絃會幽意留取淵明琴送文子南歸請歌毋庸歸驪駒已首路秋霖泥滑滑漸車不可渡一帆直沽雲千里逐鷗鷺羣書滿船繫清景隨所寓憶昔榴花明言指嵩陽樹回頭一寒暑相隔如晨暮今來無幾時告别返江步故人猶故態脫略見情愫我老心尚孩談諧苦無度聊煩答賓戲未敢令公怒相過沈昭略澗房蛤蜊食不顧王郎雄飛拔劍歌既茹還復吐眼中二子在豁達肝膽露其餘異死生宿草荒墟墓四十年來事天地莽回互猿鶴與沙蟲擾擾詎知數子今存一氊未是折腰具歸歟且慰意能事託毫素清齋苜蓿盤不受酒肉汙雖傷嵗時晚未恨才名誤家奉一先生經傳小章句蘇湖遺法在弟子望戶屨明年當從君寒廳展良晤尚思王與沈共宅清漳住大火方西流長河復東注儒冠雖冷落終竟勝紈袴繞膝有嬌兒對案有佳婦到家秋正中圓月看顧兔簡吳小眉君就招提宿清香入院時緑槐風細細冰簟雨絲絲秀句人爭誦間情自不知白蘋汀上路傳得栁家詩題宋蘭揮芰梁撰杖圖玉井有蓮花亭亭十丈直如船進雪藕誰云惻不食讀書適時用祕此禁林職伊人含清姿妙意寄水墨悠悠西陂賞渺渺東山憶折菡下芳洲澄鮮秋水色何郎霧夕句宿昔心已識雨霽聽盡終宵雨開門朝日暉鬭生花有態獨下鳥忘機焙藥題新褁燒香理故衣蕭間只如此已覺往年非秋海棠海棠何有此蜀府未知名朝日芙蓉色秋風籬落生翠應憐小草紅欲艷傾城移作清齋供幽香配杜蘅送陳五玉之廣陵名何減驃騎子方在第五賈氏諸弟昆季也虎最怒文度置膝上當年記懷祖我每到君家輒共阿戎語流年飛電過頭顱各如許翩翩書記才彩筆懸幕府開懷淨冰雪不遣溪壑阻曾看橫海鯨東誇朝日吐三年陳留郡為愛風俗古南登滕王閣帝子弔江渚今兹草四橋雷塘滿禾黍平山聊騁望千里入平楚過江六朝山一一淡可數兹遊殊不惡况乃得賢主嵗晚歸去來片帆買江滸卧聽吳娘歌一枝響柔櫓到家臘甕熟呢呢話兒女白鬚有賢兄夜聽對床雨間繞西湖寺勝踏東華土俗士難與言寂寂笑鄧禹齋中青瓷墩一嘉萬間宫中物也偶成四十二韻陶旊工精藝宫庭嵗進瓷尚方傳甓器雅具列香墀采奪三雲殿光搖百子池土鉶雖質朴瓦注更葳蕤婀娜花全繞丰茸葉倒披赤霄翔孔雀丹陛翊文螭方丈山􅍶崒昆明水渺瀰偶然留小物亦足訪前規摩刮人堪鑑雕鎪鳥細窺堅疑山斫骨滑想玉流脂雨過遙天後山橫積翠時此時看祕色是處映清姿古佛螺盤髻飛仙黛作眉削成青瑪瑙瑩出碧琉璃石鼓形如肖絃鞉柄莫持雨中迷瑟瑟霜後認差差位置應何所承平略可追低憑緣鬬草小立為爭棊清暑晨常到迎涼晚最宜止惟依鹿女眠只護猧兒豈有緇塵拂常勞紅袖垂坐來彈錦瑟倚去寫烏絲一自軍烽急驚聞戰角悲銅槃嗟已折金碗出無期似爾真流落如人閲盛衰未曾同璧碎且得共杯遺飄蕩隨門栁荒寒帶砌葵自憐時代改莫笑主人為寒露零逾淨衝風撼不欹恍依鴉臼歇任當馬韉騎蒲椅歡相得繩牀據似之看雲嘗獨起待月或頻移詎可橫成枕誰教破作瓻枯藤空自褁舊繡漫輕施桐葉留詩客貓雛配畫師王凝有繡墩獅貓圖泥澄官置局油徹內分司往者曹皆偶今兹數只竒愛因同鐵石嘲是近尻脽萍實浮寧類匏瓜見定疑底須論國寶已擬算家資翡翠無留羽珊瑚有斷枝人間今昔意於此感成虧送大司冦韓城公三千著律令原本忠厚意古者師朱儒輕典用頌繫刑書雖鑄鼎往往傳古義狼牧而虎冠後世進酷吏誰能一杯酒獄犴洗寃氣足知三刺聽詎有百金利峩峩韓城公明堂棟梁器秋官大司冦職在讞鞫地惟良助仁德實布天子惠粒米盜太倉罪重法不貰見知相從坐盛世無此例公乃正色爭獨先在廷議飄然遂去國鶴聽九臯唳西歸太華山三峯卷清霽彈琴石室內雲牖夜不閉日月當髙旻回照豁隂翳會當不逺復藉以風有位仁心待袁公豈止理獄事秋日登大悲庵後亭石幢重到訪遺經秋色蒼然落此亭鴻雁影低連古堞蒹葭聲冷繞回汀如絲氣上龍泓白滿月光搖佛髻青願證諸天菩薩戒自今刀几謝羶腥亭今為宴飲地胡南苕少宗伯繼至中路相左遣人相要作此代簡間來半榻借僧房消得風櫺一炷香自在天中初放眼祗陀林外别開堂已教寂歷移長日悔未遲留待侍郎今夜松門最明月故應對酒憶求羊謂豫與仿亭中秋同南苕少宗伯集阮氏林亭未覺從公懶先來待月生泥休拋酒碗間自愜詩情樓逈光先得輪孤影倍清更教攜鐵笛吹徹九秋聲座有范生善吹笛將移居為庭前老槐作一首十年種一木制器亦速朽不如楚冥靈彭殤閲夭夀空庭有老樹常伴衰病叟去年冰雪中結此嵗寒友今來春復夏美蔭交窗牖時橫穿膝榻每屈學書肘僦居半為此不惜添劵負往從顧翰林山容初來踏門鈕舍人在衡復繼至數此接杯酒當時嘉樹下獨立嗟賞久豈知三十年清隂落吾手人亡物故在時往事復偶秋聲忽夜發萬竅爭號吼洶疑海濤翻砉似蒼龍走披衣起危坐默感先零柳感此亦何為借問樹知不恆河曽不異我自成老醜兹來得三宿去意復八九移家住巷南攜持到雞狗胡為獨去汝惆悵辰逮酉萬牛挽不前一夕徙何有誰當慰老夫戀戀屢回首題寶崖西溪梅雪圖沿山十八里家家種梅樹春來梅花發繞屋不知數回風似絮起掃石疑雪聚空外聞暗香莫識經由路其中有清溪屈曲相貫注居人通往來但用略彴渡因之車馬絶惟見桑竹互我少即嬉逰舴艋先羣鷺朝隨樵唱逺暮與僧鐘遇每緣乘興往不待佳招赴何異桃花源十步九回顧蹉跎盛年改悵望良辰騖雲中指雞犬物外走烏兔何來披此圖曠若發新悟心猶依故處逰尚記前度連村冰雪晨漠漠散香霧幾時三􅒪宅真向此中住漢廷馬相如方誦美人賦吾歌紫芝曲一笑煩顧誤黑龍潭太始有劫灰淪在虛無底黑江流不盡上作波瀰瀰何年截潭洞淡濘忽而止有時腥風來蒼鱗􅕚不起幽沈墨瀋色神物蟠其裏嵗旱禱祠官牢醴走祝史靈旗紛偃蹇百祥爭來委明朝舞商羊父老賀邑里今年苦霪潦彌望沼與沚龍宫何奔忙符下疲役使秋深始澄霽遊衍逮暇晷泓上久裴徊照影風日美餘潤壯蓬葦微馨發蘋芷古井團圞天空明即此是吾聞龍至神幽潛清不滓以彼變化力巨海易事耳胡為居穢濁曾未窟宅徙老湫怒忽拔劈石勢未已便恐風雨來咫尺隨履屣憶安宜舊逰雜成十詠採菱剝芡繞湖潯萬頃波光鼓枻吟微月初生舊逰處五年塵土尚關心跳丸日月送居諸靜裏深知意有餘樂志堂中三改火草荒行徑手鈔書人傳柱史有隂功玉屑諸郎愛阿戎拋却兔園村册子枉教白擲得師風間來舊夢記為新曼緑夭紅作冶春一曲城南新泚水漫天飛絮獨逰人驚鴻照出水盈盈霧夕霞朝别有情今日陶園太疏索只應添得讀書聲間布楸枰屬思遲癯仙風味少人知年來黑白瞢騰過慚負秋堂落子時書巢風義我師友海內論交託契真四百頃田隨老盡幾人還念鄭公貧文史笙竽各有徒王郎别後調還孤不知半影回衾夜老大心情合減無傍水周回百本梅中間曲閣間平臺角巾私第知無恨月底花前總看來當時競病記分題夢斷西廊月向低惟有耽書宋公子過牆濁酒數招攜排悶繞石花枝被徑莎一春能得幾經過苦因拘役間常少祗為衰羸病較多行藥欲來還懶散畏風將到又蹉跎何時會客西亭上撥盡朱絃卷白波荒祠古牆剝蝕碧苔滋肅肅靈風起薄帷雀鬬但聞簷墮瓦狐鳴不見火穿祠時來時去真徒爾諸布諸嚴未可知九牧有金堪鑄鼎大科文字更慿誰次韻奉酬何義門詩興揚州喚郤回如醫獨帶墨光來埋盆點檢春前景炊飯分張㸑下材一寸抱將寒夜永數枝橫似故山栽知君爐鞴隂陽手鼎實他年佇上台苑西佛寺中見楊花長廊吹雪復吹綿楊白花飛絶可憐緑葉暗來春老矣紅樓飄去夢依然每添棖觸緣孤驛放翁詩曰梨花堆雪栁吹綿常記梁州古驛前二十四年成昨夢每逢春晚即凄然豫少壯客逰與詩中意緒約略相似曾共兒童捉小年間對東風兩惆悵海棠零落佛堂前院中有海棠二株連日委地盡矣題胡永叔五湖歸去圖蝦菜歸心落五湖棹郎歌罷月輪孤正從松菊田園外别寫淵明歸去圖宣和畫譜李公麟畫陶潛歸去來兮圖不在於田園松菊乃在於臨清流處水雲那得便浮家閣道方看上漢槎人物他年問江左謝琨第一擅風華長夏間居一首公門少暇日解帶亭午餘勞煩失本性永懷靜者居兹焉及休浣偃仰聊吾廬林深寂無人密蔭青扶疏巖石角節露野卉縱橫舒夜來時雨過新馥扇紅蕖前有盈尊酒後有插架書浮念一以遣身世同曠如六月四日喜雨莫厭漏移牀莫驚響塌屋且將一尺雨洗此經月溽砰訇雷震耳旋繞電掣目三更始安眠不遣睡蛇觸明朝衝曉出人事雜歌哭束帶隨羣公流汗若新沐緬維山中士冰雪盈一掬朝看清泉流暮與停雲宿往從未有路安得騎鴻鵠復念久旱餘羽舞遍川瀆焦勞有明主感召天意速枯荄一朝起秋稼行成熟吾寧免營營得飽願已足病中簡蘿軒連墻無日不過從會散時聞寺打鐘老念據鞍猶壯士病餘欹枕只衰容能來看畫茶方熟肯共題詩墨正濃一院緑隂清晝寂待君履迹破塵封辛卯六月草二日蒙恩宣賜諸臣瓜魚二種以遲到不及堅齋少司馬分魚一頭口占志謝蹣跚步緩失瓜期門下空歌彈鋏魚後至我應甘薄責先嘗君特肯分餘蒸來翠釡金鱗細膾出銀刀雪片虛得一何心敢專饗便歸灑掃待高車蘿軒為栁舍漁莊圖見貽題云寓招隱之意悵然得四篇咫尺幽居味心知在筆先波喧浻湖雨葉暗宛溪煙摩詰詩中畫琴高水上仙會須看二老一葉占江天栁蔭村南宅漁添舍北莊端居只遙憶好景忽分將石徑參毫末雲根接混茫五湖秋浪碧移入讀書堂倣佛風煙路分明毫素中攀條東澗老狎浪太湖公斷惜沾泥絮低編曬網篷心欣隱淪諾白也古人風此地應曾到何時得重尋蹉跎長往計惆悵未歸心濠上知魚樂湖邊愛栁隂盧鴻草堂本貴重百兼金懷清堂集卷十三
