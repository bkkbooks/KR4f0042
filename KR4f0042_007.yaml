body:
  text: 懷清堂集卷七吏部侍郎湯右曾撰八月十五夜試院煎茶用東坡韻作二首鎖廳萬竅蛄蚓生石鼎三沸蒼蠅鳴清風過雨差一快卷幔忽揚茶煙輕閣門之井非第二煮水蠻陬此何意要將氷雪滌煩煎清清泠泠落夜泉石花蒙頂來自蜀顧渚萬芽如屑玉一車載茗不療飢猶勝觀瓶居井眉木蘭始芽瑶草茁一啜已有清香隨君不見露寒桂滿今宵好細泛風簾淅淅時門外立鵠慚諸生老夫投牀作雷鳴樓頭紙落如飛雪沈宋時名誰重輕休論揚一與益二險阻西來識天意淄澠别白勤烹煎由來相士如品泉相如子雲出西蜀昆吾寶刀于闐玉楚宫細腰常忍飢城中佳人矜廣眉各爭好尚異妝束輕裾利屣行追隨君不見牽蘿補屋誰氏子絶代風流羞入時黔陽絶句西南諸寨接牂牁風俗傳來火濟多紅犵狫連花犵狫白羅羅雜黑羅羅依稀九驛認龍場烏撒平開蜀道長莫怪西溪水嗚咽至今婦女説奢香白白紅紅繡袂花盤絲繪蠟儘堪誇自吹木葉銀環女者卜河邊問宋家清涼山下躡雲行飛越峯初振鬛鳴髙栁斜陽易蕭索百年陵谷養龍坑蓽撥陰繁呼蒟醬芙蓉色豔斸丹砂一叢露洗卬王竹六月風開鼓子花刺梨秋後正舒芒擘得黃柑齒頰香不是瘴昏青草候客柈也自進檳榔四十三盤關索嶺五千餘仞相見坡阿蒙阿孛休勞苦聽唱山前山後歌得晴三日即神仙諺曰烏撒天常披氊三日不雨是神仙谷暗雲埋是漏天却怪一旬山雨絶中秋分外月輪圓羊腸鳥毳路將窮如線鈎連六詔通一匹練遮滇海馬萬牛脊斷振山銅僰童蠻女競相將翠罽花鈴一兩行細雨黃絲驛前過叢祠香火竹三郎閻梅公中丞出觀家樂燒殘絳蠟月朧明百和香中吹玉笙一片綵雲飛不散曲欄干外豔歌聲探喉一串玉盤珠華屋神仙絶代無惱亂中丞筵上見梨園弟子李仙奴審音荀令與周郎檀板銅槽共一牀山雨乍收簾月白聽風聽水按伊涼玉雪兒郎髮未齊嫩叢蘭蕙出香溪南朝瓊樹無人見嬌小宫鶯恰恰啼管咽絃停意淺深雲忩六扇漏初沈己迷秦客風花路休笑吳兒木石心東山與梅溪長老巉絶發曇寺樵人細徑分路黃秋後葉山黑雨餘雲馴鴿投空下疏鐘入定聞蚤耽清淨義花界宿氤氲聞道峩嵋老心空日坐禪鬢絲蠻嶺雪鄉味蜀山泉飛錫來千里哦詩剩幾篇黃花兼翠竹節物兩悠然自百盈泉至黔靈山寺憶昔冒雨東山行山寺粥鼓傳新晴雲中黛色幾千尺兩腳已靸芒鞋輕寒花修竹自間麗赤髭白足相邀迎孤亭崔崒出林罅下睇萬瓦浮連甍黔靈一峯隔嶺背但見紫翠煙巒并歸來合眼想娟妙坐覺天宇開崢嶸今晨欵門少賓客襟帶蕭散帷齋清公厨三日會當去十里肯惜遊山程疏風細雨引前路小蝶豔豔繁秋英道逢樵客看碁罷亦有田父衝煙耕雞鳴竹裏淡日色犬吠塢外喧溪聲屚趵亭中一泓水晝夜百度無虧盈清甘未得借瓢飲空負桑苧煎茶情草中覔路轉蒙密巖頂踏徑頻回縈琳宫突兀佛塔湧古木上與欄干平祗園弟子越千指盡學寂滅談無生青山門外幾風雨一縷坐看香煙橫維摩方丈清晝掩天女一笑花為榮尋詩問法兩無礙空手欲控橫江鯨法華魚肉何足啖自煮蔬䔩炊香粳萬錢詎抵一飽樂盤案巳洗秋營營蠻花洞草足瀟灑斗大未可輕山城他年林端發薝蔔道人記我曾留名龍里別錢蒼浮兼寄王介夫楊青村汪道百驛館燈初炧天邊雁失羣溪聲寒潄玉嶺樹細參雲别酒一宵罷孤懷萬里分憐君好才調蠻府作參軍風流王武子邊徼十年遲州縣官曹屈聲名人主知蕭條間歲月意氣好男兒漏鼓山城夕明燈想後期楊侯出宰日遺老贈圖經官舍如庵小荒山入縣青離杯宛猶昨夜雨忽同聽愛爾溪風句清音共窅冥煙沈青草瘴月上鐵溪魚執手時未幾淒風歲欲除苔痕漬雨後楓葉得霜初好共嬌兒語琅琅聞讀書重經髙真觀羽化亦云久靈扉長不扄石池雲暗靄簷桂雪蔥青月白起鸞吹天寒梳鶴翎丹經遺訣在吾欲寄頽齡倒馬坡望張三丰仙影岧岧青雲梯泛泛紫煙路似聞駕鴻人凌虛從此去真人塞其內外像非所務大哉宇宙間神遊無不寓西馳追金鴉東走逐玉兔揮戈縱可回運化等塵露不見崑崙頂精魄得長駐鎮逺寄道百投分固膠漆託契共芝蘭弱歲為兄弟憂樂每相關如何中分飛參差各羽翰風雨一乖暌驚嗟合并難合并安可期倐忽成對面念子蠻中居五年不相見睢盱視殊俗憔悴領異縣每得懷袖書書來增繾綣繾綣臨蕭晨歡笑旋酸辛行輈倚門左餞道出城闉離言豈為繁悲至不得陳但語各努力門户寄一身一身不自由念我與子同來如浮水萍去若衝風蓬憫憫日月逝析析蘭蕙叢二頃種秫田懷哉歸老農老農詎易學艱難少生理敝屣纍妻孥斗米戀祿仕坐君臨池閣倚君讀書几沈吟身世間憂來誰舉似鐡溪一水弄清暉沿流屢回轉山光坐超忽明媚翠微淺穿沙湍瀨激絶壁屏障展緣溪徑逶迤置足石頻選漁樵分野席一笑謝軒冕長潭數遊倏懷古寄餘緬巖端花雨落翠色自舒卷苔滑仙人橋竒懷阻遊衍松根隱修蛇雲外聞吠犬陰崖寒鐡色千尺髙偃蹇蠻荒人迹稀荆棘密不翦古來佳山水梳剔人所顯欲鑱巖巒幽小筆愧雕篆徘徊悵將歸寒露夕己泫中河山佛閣懷道百霜重水澄碧清江淡淡波故人天末逺佛閣晚來過雁齒萬檣列蛾眉羣岫多幽期成獨往惆悵對山阿登舟馬歇休筋力舟行任起居喜隨鷗去逺憶共雁來初鄉思縈間日郵籖報睡餘殷勤託雙鯉萬里夜郎書自平溪至便水五更江起霧暗裏蕩雙槳洶洶無停聲浩浩信長往推篷暫窺臨艓子浪花上川光互明滅山影迷俯仰纜船呼晨炊風日漸晃朗澄澄碧波映皎鏡平似掌回湍成圓淵觸石怒濤響灘行屢紆直石骨轉森爽天寒竒姿露刻畫勞萬象千林散青紅絶境見無兩晨霞互彬駮雲錦亂泱漭緣流恍舊山水盡憶弭榜永懷滄洲趣暫此清尊賞楓木塘如此江山卧不起兀兀篷窗云睡美坐令拊掌笑兒童飛槳聲中靧面水起看嶺雲斷復續更誇霜葉紅間紫佳時九月十月中孤棹千山萬山裏青螺髻綰石簇簇白玉盤堆水瀰瀰褵褷羽落沙鳥喧䆉稏田紅野老喜村中嫁女捉鵝鴨船上呼兒數魴鯉幾疊屏風碎錦斑一奩明鏡香雲委漁燈隱隱襯霞上塔火沈沈出水底湖南風物足留連不獨騷人詠芳芷橫江紅樓白舫家家好翠壁丹崖面面稠佳處真思市門隱生來愛作賈胡留三江雨氣連沅口九疊山光望靖州枉史亭前懷古客西風荆棘野塘秋漵溪值驟風雨邅回信所如漵溪日云暮淰淰四山雨冥冥一江霧驚風吹弱纜勢挾短篷去舟人走相呼童僕眩屢顧有客方歌嘯矯首義陵路華蓋千仞山桃花萬年樹辰陽舟中善卷古先生閉户養芝术年年丹砂水清淺洞門出福地閟幽棲煙蘿望中失南山孰云移感此風雨暮一峯如靜女㛹娟水北住相向淡無言飛雲日來去清浪灘寄查浦子昔談此如秋河梢濆撇漩險莫過中宵不寐念今日一葉果落千盤渦驚霆過耳電閃目乍劈急箭投飛梭雷洄清浪三十里虎牙石怒聲相磨灘師為言伏秋漲駕天白浪髙嵬峩橫江大艑不敢下袖手但聽漁郎歌只今天寒潦水縮香火尚乞神撝呵下灘波平水灩灩秀色諸嶺紛坡陀盛衰苦樂互更迭物理如此人誰何念君秋風不得意席帽尚沒黃塵窩種成不惜五石瓠網去己失千尋柯古來才大有時用四十未可悲蹉跎既不能手把鋤又不能肩負戈兔毫千尖掃皆秃文章小技用則那人間主客盡逼仄與子安得辭風波繫纜水之湄晚飯山之阿江天風月等間有添箇雨笠兼煙蓑唾壺擊缺人不憐老驥誰秣瓊山禾勸君莫學王處仲須學神仙張志和江上晚泊飛霰悽以零重陰沍還止靡靡寒威積浩浩夕風起落帆逗前浦竹葦數家市畏虎思蚤眠炊煙尚墟里懷歸逝川逺日夜向東駛風燈夜凌亂水國天渺瀰悵望離緒多悽斷誰復理發益陽行艫將安窮南溟阻瀾汗交流滙沅澧川路俄己半風波話辛勤寢興錯昏旦蕭條意不愜淒厲歲云晏伊余初祗役苕華正堪玩百卉今已腓奄忽衣裘换蒹葭天水永鳬鶩汀洲亂落日長沙人微風洞庭岸遙岑眄欲盡近慮淡巳散鼓枻聊一吟悟賞非情歎見月地霽氣逾肅天髙寒更爽頽陽既西傾皓魄復東上餘霞澄瀲瀲張樂楚天廣孤光初出匣素景俄映幌號籟葉辭條流哀雁沈響念當窮陰節共此清商賞遙帷滅燈燭冥坐寄遐想眄睇西南星爛爛見三兩投浦逺煙暝淪照夕波往杳杳依行帆悠悠送歸槳驚魚時撥刺鄰船響夜榜湘陰清江如玦環落日瀲金碧帝子遊不返瀟湘水沈夕薺樹逺含青水花寒吐白行艦隱回洲礧礧泝淺流旅泊淹遷次動息異沈浮天長沒歸雁江逺疾去舟去舟曾幾時雪消春草滋西南風信惡心急行轉遲留將送歸楫美滿髙桅吹望長沙作湘流若浮空列岫出遙漵水逺不可極的的煙帆舉蘭茝悽己衰風波杳何許日暮弔湘君微雲斂平楚泊長沙西門追念舊遊有感玉礫金沙儼畫圖水清了了見樗蒲湖南賓客今憔悴暮雨湘西聽鷓鴣同劉青岑遊嶽麓寺孤棹隨輕風江波淡容與歡言故人駕共此霜洲渡遵岸草徑微層陰嶺雲沍去雁飛且鳴驚麏走還顧威紆陟崖廠隱見蔽煙樹入院聞佛香悠然得微悟石門寒葉積竹筧暗泉度窗中洞庭野木末瀟湘路松關映殘雪時新物已故諾公詩家流雕琢有秀句相將共遊衍往復愜歡趣曖曖日隱村沈沈水生霧歸橈雜燈火山氣上煙露人生流電驚雙鬢易衰素期君簿書暇有約勤來赴登雲麓峯望南嶽歌我聞三神山逺在東海東神山恍惚路難到世上五嶽蟠胸中憶臨滄溟倚日觀九萬曾踏扶搖風昨辭蓬萊建羽節陽景一翳迷髙嵩西南萬里入羅鬼似墮幽井窺圓穹東還雲夢吞八九張樂己在軒轅宫七十二峯青聨屬蒼梧天外雲濛濛清湘水流環九面南嶽神鎮齊三公靈妖物怪藪藏納丹㽔赤幕光曈曨峯峯低昂宛相次獨有紫蓋爭祝融雷泓風穴互開闔玉書金簡留穹窿岣嶁山尖蝌蚪字人迹欲到路巳窮使者虛亭花藥繞山人仙骨煙霞通似聞緑髮有毛女不少翠羽來青童離宫福地入縹眇目所眺矚攀躋同衡陽縣前昔騁望壓陳􅑬嵼雲排空仙山咫尺俗緣誤況今百病中交訌升髙視逺腰腳軟左右扶掖如衰翁道人鐵瓦緬遺構拜嶽之石髙巃嵸九疑清猿怨遙夜洞庭落日浮孤篷漢女幽蘭冉冉翠楚妃淚竹斑斑紅振衣周覽窮上下忽與意思增清雄人間擾擾等蠛蠓愼勿變化隨沙蟲君不見回雁峯來八百里揮手欲駕冥飛鴻至舟中復得一絶句渡頭碧縷郊門栁扇底紅鱗野寺魚一種間情兩惆悵風簾殘燭照翻書黃陵廟初日黃陵廟微茫楚塞分煙中塵漠漠祠下水沄沄叢冷葳㽔竹湖荒散漫雲何人酌椒醑寂寞酹湘君江夏寄朱悔人王孟穀長安舊儔侣遊好在斯文往者己陳迹髯兮尤逸羣荆門寒翳雪夢澤晚連雲悽斷郢中唱孤懷正憶君贈别玉河栁煙條春景初頭陀寺前雪復此感離居漢上數歸棹湘中闕報書殷憂結之子消息比何如赤壁謁蘇公祠東逝隨流波孤舟日沿越晚經齊安郭振迅夕飈發水惡不可渡連山浮溟渤繫纜陟臺基登闉矚岑樾蒙茸翦己久軒敞樹華闕名賢迹偶經萬古斗柄揭楚澤叢香草餘芳殊未歇當時馮夷宫幽怪鑒毛髮江沙漲坼岸漸逺波匼窟拾級連巖髙天長鳥飛沒垣墉起迢遞林麓傍隆窣縞衣揖羽流緑髓鍊金骨憂來思洗盞浩蕩酹江月逰寒溪西山劉郎洑下波隱天楊葉洲邊初扣舷清江如畫浪伏息武昌樊口山依然峩峩幾尺開煙鬟吳宫美人顔如蓮千年臺殿沈野水石上空有金牛眠寒溪氷雪凍始堅涸絶不復流涓涓溪橋一線度微徑孤寺泠落生炊煙九曲亭中荒草菅西山佛閣危峯顛仰穿蒙密入木杪下俯曠放羅山前老僧飢癯不能饘階下唳鶴清吭圓回廊塔院舊香火一指猶説南宗禪松風閣下松參天斤斧斬伐根株連神光夜發認何處千牛乳潑菩薩泉東坡居士久得仙髙安酒官詩幾篇秦張雅遊等蟬蛻涪翁妙墨今誰傳窊樽石上醒醉顔風霜退谷如春妍漫郎文采磨不盡江水日夜鳴濺濺南湖一片浮漪漣渚日欲沒孤霞鮮菱茭菰蒲歲晚盡莽莽楚藪如平田一邱一壑性所便雲腴澗實隨因緣風波流泊今偶爾江山主客長年年武昌經吳故城黃旗颭東南漢坻此深阻襟帶越江沔管鑰重樊楚炎靈運四百劍璽遺區宇龍戰爭分崩鹿犄失守府老瞞思竊國天子不都許獅兒起江東名字劇乳虎英雄蓋世略叱吒輕項羽堂堂紫髯公早繼父兄武英賢備帷帟士馬交鼖鼓疾雷破山紅驂驔空北户濡須出艫舳整暇孰敢侮天塹長悠悠國險民安堵犬牙崇雉堞鳯集建樓櫓裘冕祀東郊圭幣薦后土袁山廣獵場豹尾神大姥時平離殿起豔質歌且舞至今節度石連娟想眉憮釣臺灑酒面荒哉賴仲父霸圗迹己陳江聲晚餘怒茫茫五􅑑水逆浪打次浦將至九江見廬山陰風清旦歇江影明灣澴煙中潯陽郭雲外匡廬山汀葭離披盡沙鳥飛鳴還宿意冀申寫靈境何由攀阻風九江舟中雪後寒甚羈愁旅況輒見於篇急沫軋崎岸吹漂斷通津帆席分歸風邈矣廬宫神冰雪意蕭摵羈旅事艱辛寄言褚咨議空此平生親夙昔山澤遊柴桑緬髙節清風古猶今化遷名不滅眷言舊墟里翳翳原上雪從公千載餘約心自流恱湓城帶縈紆湓水渺茫至長懷沈冥子北亭老遺世沙雨潯陽門霜鐘二林寺清醑能見訪一酌徑須醉樂天江州詩有尋李十一云可憐衝雨客來訪阻風人小榼沽清醑行厨煮白鱗逐客未賜環酒官亦淪謫當時攜妻孥曾此江上宅驚濤慈湖峽逺夢齊安驛悵矣感滯留庶慰風波夕上鐘山天寒水涸沙一痕石鐘之山下見根夏秋百川滙彭蠡遙觸赤岸浮青湓是時石鐘始有聲噌吰鏜鞳風吐吞南音函胡北清越非絲非竹搖精魂翏翏一噫吹萬有真宰無朕妙語言眉州老仙去已久後者無繼知誰論長松千尺窺月卧嫩篠萬箇交風喧山僧雅具看山眼布金此地開祗園巖藏詰曲户向背下或如墮髙如軒去來今在一彈指老鶴已瘞巢空存茶香一啜夢清逺江駛萬里流胚渾既佳光景忍言去願結淨社依香門放舟至下鐘山空濛一片雲滿湖西南風起吹檣烏淵淵且止發船鼓秀絶下鐘山色無褰裳直上捷猿狖樂哉一幅寒林圖絶頂飄颻目四豁左右江湖渺空濶煙波盡處洲渚微髣佛扶桑見窮髮天旋地轉不少留回看星氣忽己周扁舟歲晚夢吳越匡廬五老空船頭銜艫如山萬商集使者纓旌騎吹入行人擾擾競錐刀落日悠悠下城邑前臨巨石紛盤陀仰看絶壁青嵯峩玲瓏窈窕萬竅出安得瀄汨生流波風聲水聲奈爾何只今埋沒塵沙多無弦之琴張素壁歲久抑鬱恐不和一歌如扣鐔再歌哀知音洞庭木脫水深深天髙月白風入林或鼓或考聲欽欽嶺猿江雁同夜吟潛蛟出聽老龍泣漁父滄浪知此心彭澤宿雲初卷雨斑斑迎棹神鴉杳靄間煙裏栁遮彭澤縣夜來潮落小孤山青螺峯色寒應斂錦瑟年華客未還欲折梅花寄歸信尚憐蹤迹滯江關馬當山喉吻從來説吕梁古今夷險已茫茫君看白日青天在弄水乘潮過馬當除夕泊蕪湖一年臘盡可憐宵樺燭椒盤總寂寥荏苒歲時淹旅宿青紅兒女又明朝玉堂故事書春帖茒屋豐年望斗杓間與村翁話疇昔漸看燈火上江橋元日登梁山絶頂看山萬里行未足蠟屐復此凌天門五丁鑿開巖谷走兩戒截出江流奔垂天之鵬羽翮奮橫海有鯨鬐鬛翻東西屹立如有意吳頭楚尾為藩垣辛盤上日帆落蚤白沙一道清江村欹斜得路躡飛鞚下看落日如朝暾疏林木葉寒不脫已變凛冽回春溫琳房金碧插天漢舉手似可星辰捫謝公青山紛在眼漸與夕照嵐陰昏扁舟徑欲下牛渚怪魅不數魚與黿十年以來逢此日仗下廣樂陳臨軒享王鞮􅝿殿廷舞纓緌簪履華星繁歸對妻孥日已旰人事請謁猶煩喧山中清淨今何有道人與我皆忘言水底潛鱗適浩蕩雲邊逸翮辭籠樊一年回首風雹過又與桃李書朱幡惜哉花開我己去酌酒且滿屠蘇尊采石磯入春二日風和柔來尋采石追前遊騎鯨人去三千秋縹眇尚結空中樓登臨曠然銷百憂江波澄澄靜微流髙艫如積連汀洲天雞晨鵠戲圓漚下訪古碣斷不收四壁光彩丹青留蕭郎落筆秀且遒名山嵬崫洪濤浮恍陟玉室凌丹邱嘯傲五嶽輕公侯清風亭下思小休長松落落羅道周如古君子蒼髯修道人三四彭聃儔下臨洞穴巖窗幽神鑱鬼斧工雕鎪俯仰今古同悠悠云胡不樂吾己偷一聲欵乃隨棹謳飄然不繫乘虛舟雪後望鍾山建春門外鬱岧嶤紫氣曾傳接絳霄飄灑鍾山夜來雪盤盤雲際玉龍腰晚出長千里青溪還傍莫愁湖一片斜陽夕草鋪玉樹歌殘驚鐡馬寶衣燒盡失金鳬樓空烽火山猶繞冰斷秦淮水半枯惆悵長干小兒女夜深啼殺繚牆烏夜半發青山曉抵京口蕩潏生洪濤揚舲逺天際鯨魚掉其尾一縱千里逝微茫曉鐘聲遙落金山寺琉璃河題壁緑樹陰濃露未晞槐根青翠濕人衣平橋野店日初上隔水乳鴉零亂飛懷清堂集卷七
