body:
  text: 懐清堂集目録别集類六國朝巻一古今體五十四首巻二古今體六十四首巻三古今體七十六首巻四古今體五十四首巻五古今體四十九首巻六古今體九十四首巻七古今體七十三首巻八古今體九十一首巻九古今體六十五首巻十古今體六十五首巻十一古今體九十七首巻十二古今體六十首巻十三古今體五十八首巻十四古今體六十三首巻十五古今體六十五首巻十六古今體七十四首巻十七古今體五十首巻十八古今體五十六首巻十九古今體一百一首巻二十古今體六十首臣等謹案懐清堂集二十巻國朝湯右曽撰右曽字西厓仁和人康熈戊辰進士改庶吉士官至吏部右侍郎兼翰林院掌院學士浙江詩𣲖自西泠十子之後競以藻繪相髙而氣骨漸弱右曽以清鮮朗潤一洗其習初從學扵王士禎稱入室弟子後以使事入黔體製一變詩格益進大抵鍜鍊澄汰而出之以神韻當時士論翕然推之其名與查慎行相埒而慎行贈詩有蓬萊領袖得詩仙之句所以傾服扵右曽者尤至沈徳潛亦謂浙詩前推竹垞後推西厓兩家之間莫有能越之者今觀二家之集朱彛尊學問有餘而才力又足以運掉故能鎔鑄變化惟意所如右曽才足肩隨而根柢深厚則未免稍遜齊驅並駕似未易言然亦近人之卓然挺出者也乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:62a1b5c89bb242fc5ec74b9f167771616fedfe7b5d8c7aeef2d5e6d28b5960e4
