body:
  text: 懐清堂集巻八吏部侍郎湯右曾撰丁丑三月二十一日晩過韜光禪院澗橋徙倚老松根肅肅巖扉自不喧坐覺清風生石壁行窮脩竹見山門依依烟郭江光繞點點林鴉海氣昏却怪白沙春漲濶㳺人指㸃說潮痕晩至湖上出郭塵事絶晩來幽興滋緑尊明月下紅雨桃花時烟水忽己暝櫂歌安所之南屏夜鐘發昨與山僧期過吳門某氏别業鳴禽變春聲首夏開閑園置酒度髙閣掃石臨前軒疎花蔫日長衆卉交風暄孤桐翠新引密竹陰已繁嘉賓盛壺觴兀兀雜笑言適意各異趣寧知寂與喧題宋牧仲中丞西陂魚麥圖漫叟江湖句翛然獨會心將家時未可許國意方深池館澄波曲襟顔嘉樹陰西陂烟景好展巻得幽尋𣺌𣺌蒹蒲岸蕭蕭水竹居圖中人自逺濠上興何如散帙從漂麥臨池學種魚謝公邱壑性雅與世情疎雪苑今詞伯平生分最親横流思大老古意見綿津水影漾己緑烟條發更新蕭閑有何事魚鳥照風神題宋山言授詩圖人間詩句鬬豪雄誰解蕭閑語更工文采爭如宋公子五言冰雪是家風山谷詩翰林尚書宋公子文采風流今尚爾自有門庭一瓣香金鍼度與繡鴛鴦承家徐庾多新體文字錙銖細覆量佛香入院一篇詩河曲分吟記徃時今日披圖見顔色江湖落月十年遲清水灣遇喬無功落日生層陰屯雲抱湖尾風波客程阻淮海夕流駛隄迴隱行帆邂逅見之子絮語明燈初離悰宵夢裏堆盤飣蔬果散帙爛文史清吟憫瘡痍霪潦去年水深思理人術感歎夜中起五月十七夜㳺縱櫂園停雲淡欲無清川相與閑臨泛自成趣何必江湖間落日漾彩翠微風散襟顔紛衍草木叢坐久宛深山暮禽共烟暝孤月隨棹還沿洄遂忘歸水際門不闗洞簫起層闥清響結幽潺波心騎赤鯉亭上放白鷴何當乞刀圭仙藥解我頑縱櫂園四首幽居適野性況此青林間小閣夜來雨夕陽池上山風蒲翠影亂水鳥滄洲閑釣艇射陂曲烟波時徃還主人蘭臺客昔侍未央宫抗議赤墀側拂衣滄海東風波去不息流泊始無窮寂寂著書地悽悽寒露叢安步穿橋緩銜杯入座遲水清盤石上風起夕涼時栁下收魚笱蘆根立鶴兒鄰人暮吹笛長憶竹林期流水撫遺軫鍾期失賞音逶迤泉壑地零落死生心罥水池花夕連城海氣陰孤懐待明月有歎必盈襟贈喬雲漸昔㳺淮海濱嘉會君子同别袂一以判十年阻西東讀書秋堂清漉酒春醅紅志士秉髙節寧知道方窮出處理匪齊離心抱忡忡連年相思札緘彼南飛鴻頗憂目近𤯝輕雲翳虚空端居結遥念何由豁羣蒙君有東臯田近在射湖曲漫漫秋塍黄猗猗夏畦緑公家井稅畢伏臘資亦足河伯昨告灾千里等沈陸肅肅哀鴻征啾啾飢烏宿髙人甘藜莧儉歲供饘粥時吟瓊琚篇眩晃古光蓄松門微月上茶乳汎新馥澹爾靜者心寧為萬物逐喬柯有卑蔭清源無濁流束髮追羣彦與子心綢繆懐玉被布褐遐哉今白頭叩門知緩急稻粱非身謀昔者鄭公業衣食常不周又聞徐常侍傾家賣車牛懐君髙世行太息前賢儔紆轡指京邑投鞅蹔淮壖四序紛迴薄感歎非朱顔堂上尊酒陳欵曲平生歡深愧雞黍約凶年艱盤飱欲分俸錢薄踟蹰未敢言兒郎皎瓊樹世業書一編小築松石下深心豪素間勤當注玉液餘念且勿闗題喬無功梅花書屋圖泠蕊幽香自到門一鈎寒月近黄昏賦心合在横斜處知是淮南第幾村淮陰舟中别喬介夫泝流乘風濤落帆淮鎭泊蕭蕭原上雨分灑入林薄茅簷燈火微隄纜菅蒯弱長河風浩浩竟夕夢猶噩明晨攬衣裳屯雲翳遥郭愁心依故處有酒不能酌況我同懐人須臾成離索秋堂讀書夜風雨事如昨十年各飛沈所至異苦樂方將共㳺處心跡本寂寞買田未敢期農事慕東作題介夫小照屋後藏書萬巻新門前野水碧粼粼盧郎如此丰神好不是牛欄雞柵人送旵山和尚歸徐州缾鉢自兹去支公眞勝流帆低泊淮鎭花落到徐州余亦慕栖隱年來感薄㳺羽衣明月下他日記黄樓桃源曉發寄方若及無功介夫兄弟雞鳴首北路不見淮南樹相望己相思别來曾幾時黄河流天外行子飛征葢飛葢路己逺黄河去不返願逐河上舟渡河入淮流河淮水同注到君門前住倘君烹河魚煩視腹中書雨宿紅花鋪夕陽明復翳蒼烟黯不收暮山沈楚色涼雨入齊州細草裛餘潤荒陂赴亂流夜燈檐淅瀝孤館颯先秋農家農家此墟落無事掩門扉草際餉田去烟中驅犢歸槿籬聞犬吠茅屋有鷄飛薄税輸官早應知吏到稀郯城道中殘枝宿雨滴初日蚤霞明原上横霧氣林中喧鳥聲行人渡野水驛騎轉荒城寂寞勞歌者因之感旅情道上出門隨動息際曉漸蔥蘢葭菼媚幽色水雲澄逺空緑槐山店雨紅蓼野塘風滿眼自留翫休嗟途路中渡沂水一葦問舟子淪漪復此間澄襟照流水暄景弄湲潺沙逺川光滅人稀渡口閑悠然津濟樂誰信浪如山沂州懐古南山之南北山北無田何由可得食正復何用得食為古人髙節三歎息少年雅慕東岡陂朝事詩書暮釣弋如今老大轉自笑養雞牧豕無心力瑯琊城頭啼饑烏羸驂劫劫朝復晡不須更覓謝仁祖得米但就陶胡奴再渡沂水憩林中作屢問漁人渡若為林叟期微波沙瀬激茂樹午陰移花影宿蝴蝶川光隱鷺鷥遥遥白雲嶺心憶入山遲槿花鮮鮮木槿花青枝間紅蕚不待怨秋風朝開暮還落將至豐城集廢隴深泥沒平蕪斷岸侵悠悠古時路草草異鄉心汲井茅茨下解鞍榆栁陰卧聞牛下鐸是物有知音沙亭峪始入山嶽勢己垂盡客來心乍欣渠鳴沙上雨雷起峪中雲從此巖巒接遥知烟靄分東臨滄海上一道翠氤氲望雨時在蒙陰道上横風自西來飛雨行東峯峯峯雨氣接合㳫陰雲重下有隱君子含景佩蒼龍歌嘯方自得閉門聴夜舂雨中曉發遥山殷雷聲衾枕忽己曙出門轉驂騑慘顔怨徒御蔽翳陽景虧淹宿陰雲互激激澗聲厲齒齒山骨露人衝烟光出鳥驚暝色赴霽日林半明迴風雨還度蒙山杳何許茫昧郊門樹析麻向中原剝棗懐徃路清風吹襟袂一過澹百慮夷塗良獨難安得辭跼步雨霽既霽氣色佳日照前山明宿雲尚迴合稍稍南風生南風一披拂倐使陰曀清隔林送蟬響夾岸亂蛙聲昨來山雨過水溢遂繞城兹焉己歸壑猶怯褰裳行叢生蓬與蒿欣欣自兹榮下田蓺嘉禾禾偃流縱横愛憎一以别遂傷造物平吾生亦一物營己詎非情雨中㳺歴下亭分賦紛埃各有營佳㳺偶然遂漾舟清川上颯㳫風雨至路窮屢屈曲橈迴引幽翠泠泠葭葦叢濛濛水雲地兹亭廢己久風雅心所識經營方在今照壁碑版字潭烟沈暝色浦樹激寒吹采采湖中花芳洲欲誰遺伊余同懐客壺觴邈髙致碧筩還小飲香盡人己醉酒酣步前楹跳波看魚戲湖聲萬荷葉的皪亂珠墜鵲華隱不見鍾動山南寺緬彼千載人窈然滄洲意九日琉璃厰登髙同劉若千作冬官摶埴歲有程千夫許許雷發聲蓬萊宫中陶萬瓦歲久土積山崢嶸登山一笑此何有却與今年作重九天邊斜日暎孤雲望裏西風帯衰栁憶昔慈仁飛閣中四虚突兀撑青空昨歲蠻江驟風雨雲幙周遮豔歌舞豈知萬里從天涯帝城復采黄金花悠悠感事黙惆悵茫茫望古空咨嗟君不見宋公戲馬臺英雄格鬬餘蒿萊又不見杜老雲安宴詞客哀時淚如霰我曹幸際太平日瀚海烽銷新罷戰佳節猶堪繼觴咏書郎莫漫憂貧賤河冰昨夜凍桑乾積雪隱見浮雲端蒼茫臨眺日欲落激激衣上風吹寒日飲無何愛犀首且歸與子同杯酒送查浦之蘭州君去過洮水闗門落木空黄河繞天外白草滿榆中悲壯寒城角蕭梢大漠風書生有燕頷辛苦笑雕蟲萬里通西極王師獻凱旋三河遺孽少列郡戌兵閑幕府風雲上才人文酒間霜中明獵火小隊出蕭闗送别青門側相思隴水頭因風候音㫖雨雪向邊州苜蓿連天逺琵琶出塞愁金城方畧在暫爾借前籌二月十三日趙蒙泉孫松坪查􅆏亭王令詒查聲山王赤抒吳西齋史蕉飲小集寓齋憂端來無時忽爾曠沈寂平生慕棲隱早歲鄰緇錫朝梵香入林夜鐘寒卧壁蹉跎世縁誤老大飽更歴懐人路杳杳撫舊事的的凄斷五條絃中心有離析披帷來朋知勸我泛清觴云此忘憂物聊以寛中腸一酌慮暫遣沈思緒彌長滿堂各歡娱向隅黙自傷幽幽日沈夕䔩䔩花辭房蕭條感離室半燄餘燈光故人海曲歸令詒新自粤還握手共花底寒暄五流易一官偶然耳諷諭髙州謡澄明盤谷水牛刀雖一割弦歌囅然喜乃知才且賢匪直風物美嗟嗟同袍者寂寞校三豕與令詒話舊五嶺清猿外相思雲海間故人還執手尊酒為開顔吏議三年誤離憂半鬢斑逢春易惆悵花落憶還山為令詒題寫眞二圖梅花村晏坐前年君過大庾嶺清夢每到羅浮巔梅花開時雪萬樹蠻鄉地僻心悠然歸尋圖畫記疇昔萬里迴看如咫尺想見參横月白時酌酒對花誰主客竹溪聴雨焚香永日坐蕭灑散煩襟可是清泠子翛然江海心幽藂喧過雨淺水戲㳺禽他日山陰興應縁修竹林晩登􅆏亭寓樓風日登臨好乘閒還重尋春泉靜逾碧嵐翠晩來深三月烟花節中年哀樂心檐陰黯將夕窗外有羈禽題梅桐崖抱琴圖先生冰雪心夙諧山水趣泠泠十指下古意窅然遇門前敬亭山色閑穀溪屋後鳴潺潺神仙中人圖畫裏瀑布松風試一彈出右安門㳺諸園亭至座主宛平公豐臺别墅看花盡日作八絶句傷花淚草我何堪三月幽居閉一龕忽憶尋春春己去又隨飛絮出城南幽禽出谷似闗情野水分畦漫漫平一道丰茸芳草路緑楊影裏桔槔聲淮王載酒少經過門館蕭條挂薜蘿閒覺清風入廊檻緑鱗鱗起水微波橋迴漠漠野田青荷葉菱花接逺汀多少懐人傷逝意一時併上水邊亭曉色􅀈曨錦障開殿春花事數豐臺天公雨露園公力等是批紅判白來休嗟狼藉市門前繞郭栽多萬畛連當日洛陽全盛日一枝姚魏直千錢太傅林亭初到時銀箏絃撥玉簫吹花光二十年如昨老大心情付鬢絲遺山詩老驚仙語下筆王郎含古春亷趙風流總消歇釣魚臺下養花人大雨中出廣渠門滑滑深泥沒膝初長安街市欲生魚艱難去馬來牛跡蕭瑟盲風涷雨餘但覺人間盡虞坂不知何處是髙車隔林燈火冥濛起恐有幽人閑讀書新寺萬歴時中宫建歲久圮廢寺僧募貲重修一徑陰濃薜荔牆偶隨放梵贊公房松梢細滴長廊雨佛院微明小炷香空自布金思長者至今紈扇剰昭陽舊宫扇尚存百年興廢須臾事意樹心花入道場過汪東川祭酒所園新居髙卧園林日掩扉先生眞與俗情違舊因看竹人曾到新見巢梁燕又飛香灺始知清晝永庭閑細數落花稀何來剥啄門前客十丈紅埃未拂衣次韻西齋毒熱見寄清冷何路駕飛車奈此焦沙鑠石餘暑熾無縁重命酒日長聊喜得繙書握環人似蕭閑甚熨局門知造請疎數畝江鄉菱芡地爾時眞羨結茅居短廡深知美蔭難叢生況望繞珠玕一甌香茗因留客兩部鳴蛙不屬官頗愛稱身冰簟滑每思應指玉琴寒何郎苦熱休題句大火西流取次看何遜苦熱篇云願以三伏晨催促九秋換效樂天體和赤抒下簾見寄憶君六扇湘簾下吟出新詩冰齒寒當檻花宜垂處見近秋月待巻來看小加障蔽流塵少似覺虚明拓地寛瓜飲時時兼茗飲人間閒殺是枝官和赤抒鷺雛好事誰分雪色雛羽毛未滿態先殊一闌花下看魚戲八月秋深共鶴孤恰與野航添物色引教幽夢落江湖更慿妙絶丹青手寫入蓮塘蓼岸圖唐邊鸞有鷺下蓮塘圖周滉有蓼岸鷺鷥圖送令詒之銅仁任之官鳥道外叢木子規啼人物餘三户雲山入五溪秋風沅水上明月夜郎西旅雁稀消息全家好共攜昔恨播州逺今來逺更加銅人空沒水金穴枉披沙才子烏羅長山城白葛花祗餘官舍好雲木似仙家苖猺俗未革教化爾能為酌酒聴蠻語焚香讀楚辭方書防瘴癘禄米給親知詎免為貧仕歸田且後期軺車昔于役回首楚天長山靜鳴銅鼓林深拜竹王故人從此去逺道若相將别後能遥憶音書未可忘送趙明府之合浦嶺海清泉酌更寒牛刀小試取琴彈采珠不用千餘日一宿爭還為長官晩同聲山原衡飲􅆏亭寓樓花鳥春來己舊㳺窗中落葉倐驚秋故人好在重攜手原衡新自檇李至明月生時更上樓青嶂晩從烟際出玉河寒傍檻前流與君長簟西風夜不待啼烏也白頭再用前韻和原衡三年與子阻同逰帝里風光及杪秋歸計尚虚黄菊宅愁懐多傍夕陽樓悲歡事與浮雲去富貴心如逝水流他日相思肯相訪應從栁市更南頭送蒙泉之定陶任十載金閨籍蹉跎甫一官未應悲老大己自飽艱難跼步驊騮厄驚濤溟渤寛浮雲俄頃事一笑為加餐陶唐有遺俗樸野幾人家天逺三朡國春饒一縣花訟堂餘鳥雀農譜課桑麻雉乳漸漸麥知應勞使車散綬彤墀側疎槐蔭直廬疇咨民瘼切召見主恩初問俗懐甎逺談經壞壁餘君看一升飯何似五車書徃者文章契諸賢骨肉親謂乙亥冬丙子春文酒舊㳺風流隨逝水張飲復蕭晨鴻雁清秋節林泉我軰人他年雞黍約肯就越江濱夜雨昨夜窗中月今夕林外雨庭軒落木聲兒女殘燈語忽聞秋管引彌覺離思苦清川日東流懐人𣺌何許送内人䘮至潞河營齋十萬不闗渠況復長貧願總虚零落郊門送歸日兩行白旐一輀車也解浮塵萬事休誰能華屋不山邱愛河畢竟何時涸老淚無端只暗流一尋徃事一傷神風雨漂摇共苦辛料得夜臺回首處尚憐廡下伯鸞貧三年睡起失驪珠慟哭愁雲下直沽乙亥秋孺人以兒官䘮歸亦由潞河南下今日重來嗚咽水夜風蕭瑟颭檣烏小兒學語似初鶯掌上憐如玉刻成小兒屺孺人尤愛憐之遣向燈前誦論語令君聴取讀書聲凄涼横笛不須吹宛轉哀思未是悲一夜孤舟嬌女哭峽猿啼到斷腸時一語重泉聞不聞平沙獨鶴呌秋羣紙錢飛盡殘缸滅有夢如何不夢君君歸埋骨舊青山逝矣余行老衲還經巻藥罏相伴住結茅已就屋三間八月十五夜澄明望秋月惆悵入遥帷白露霑衣袂青苔沒履綦鳥驚飄砌葉風動隔牆枝獨有傷心者偏經摇落時九日同西溟赤抒西齋蕉飲登慈仁寺毘盧閣以亭􅆏木葉下五字為韻閒居當重九凄若病葉零稍思謝塵勞偶來叩禪扄升髙展逺眺傑閣起亭亭㳺氛歛己無豁達天字青飄風颯然至響戞殿角鈴顧此浮念遣恍惚逢仙靈蔥蘢春陽敷景物麗青􅆏奄忽被霜露側耳寒蛩號四運行復周狂馳無乃勞不如一杯酒為歡尋我曹泥塗未云卑嵩華何必髙方寸起滅間萬里爭秋毫危欄俯萬井蒼然見喬木藹藹帝王州朱甍接華屋髙門豔羅綺清吹激絲竹美人方宴終蘭房扇餘馥寧知雲端士蕩蕩散㳺目仰觀青冥逺俯視白日速涼颸征雁起落日輕霞接悠悠天末雲䔩䔩林中葉授衣及凛秋縫素有閨妾忽念泉下人衰淚俄映睫霜天枯百草夜火山南獵安得迴壯心走馬逐㳺俠榮瘁各有時黄花又堪把舉俗愛佳節美酒斟滿斚層軒凭窮秋西流弱水瀉飛塵横綺道車馬在其下人生無賢愚意得即瀟灑時哉引頽齡晩節冀休假懐清堂集巻八
