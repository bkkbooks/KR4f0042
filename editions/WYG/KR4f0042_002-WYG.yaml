body:
  text: 懐清堂集巻二吏部侍郎湯右曽撰題新城王清逺園居十三首石帆亭渺渺雲中帆茫茫煙際水何年一片影吹入户庭裏静聽波濤喧卧看嵐翠起樵唱軒石脈轉嶺背樵歌出林隂詎有曠士懐自然太古音賞心與之遇杳杳不可尋半偈閣古之學道人往往躭禪悦青蓮窮妙相白足講入滅香清半偈餘便是阿難説大椿軒有目抵虓虎其精為青羊八千紀春秋䕃此君子堂人間斤斧聲嵗月安得長雙松書塢種松傍簷楹偃亞雙榦直抽㽔及春華六月結成實偓佺古仙人服之好顔色小華子岡崇岡俯逶迤寒山㡬縈複紅泉碧澗路永與清景逐弄月下潺湲麻源第三谷小善巻何年靈境闢蒼蘚洞門古冉冉封香雲毿毿落花雨我愛服玉方欲往訪鍾乳春草池芳草倐已春茸茸一池碧不知池上水清淺生㡬尺良㳺愜素襟幽夢寄遥夕三峯誰將三芙蓉削出太華頂巖巒穿窈窕冰雪照清迥攬衣此孤鶱灝氣排空㝠嘯臺琴瑟終假器笙竽止諧俗不如激清音發齒粲如玉迴風結流川髙臺寫遺曲石丈丈人巖巖姿貞期邈難對風霜識本性娟好謝俗態長與躭竒人晩節共棲退竹逕捎雲出萬竿漏月穿㡬个風來憂成韻幽響日相和掃逕延清隂彈琴夜深坐緑蘿書屋静知世網踈淡與古言㑹秋堂一散帙㸃勘丹墨外晝長寂無人㣲風動蘿帶題畫金爐三尺火㣲紅寳篆香銷錦帳空皓腕一抛珠鈿落囘身斜倚玉屏風鬢亂釵横不上樓夜來孤夣到并州分明認得蕭闗路白草黄沙一片秋仲秋釋奠海甸同文日橋門釋奠時牲牢遵舊典肸蠁肅神儀道統三才合儒宗百世師器猶存俎豆祀已重壇壝律應清商管齋先上戊期侵階開紫陛列仗擁黄麾韻欲流金石尊看潔象犧璆懸存虡業瑶篚薦堂基素壁留香久靈風巻幔遲僾如函丈接炳若日星垂醴酌思遺版車攻有舊碑槐隂當殿合松葢拂雲欹仙草依幽砌文芹漾碧漪清時脩禮樂上相主盤匜調爕勲方大精虔意不疲丹楹浮翡翠碧瓦䕶琉璃瑞氣澄清靄祥光接曙曦淵源繼顔閔名徳重皋䕫璧水羣賢在蘭臺百籍披宗風傳絳帳家法守皋比吾道今安仰斯文總在兹青衿諸弟子聫袂獻聲詩和寄家兄廣厓七字詩來洗旅塵荆花齋閣句清新看雲白日憐狂弟聽雨閑宵憶古人夢裏獨歸江上路病餘最怯酒邉身何時真了村南約未用山堂更買隣秋霽出逰白馬湖兼到近村雜成十絶句出郭真成爛漫逰水村随處寄悠悠眼明初見湖邉路蒼莽風煙一片秋露凉咽咽草蟲鳴素練烟消出曉晴又是碧花紅穗了一年秋意可憐生欹斜㡬曲入僧蹊小闢松門不厭低意在有無思一語便從花下捉談犀陂湖遥隔埭西東蹋水呼來舫子通小試袷衣寒入早豆花雨過蓼花風㡬株水栁繞荒荘雙槳停來與乞漿獨纜虚舟人迹少鸕鷀兩兩上魚牀浩蕩馴鷗認得儂平生湖海豁心胸西南一派煙波裏絶憶當時甫里鐘湖心舊有甫里寺曉暮閴鐘聲今故址為湖水蕩盡自擘菰漿剥芡珠芳鮮到處足行厨鱠殘二寸銀絲滑可抵鱸魚入饌無􅆓籬豆老齊舒蕚貼水蘋多亂著花也自能紅復能白一枝笑插㡌簷斜門館蕭森䕶碧苔誰家亭子净氛埃斜陽抵死催人去紅板橋頭首重迴㸃㸃漁燈集網師半規纎月又生時河橋小市歸舟晩光景流連十絶詩㳺焦山十年夣焦山游志未一副今晨峭帆往快若逢交舊巃嵸蔽隂翳曲折見徑竇老僧山澤癯驚喜遇邂逅似訝客精䖍山靈黙相佑初來風㸃雨少過雲脱岫壓江臺閣傑年深新締搆江聲日夜壯萬馬戰場走聞之已驚詫㣲命况相凑八年十回往得非天所宥稍髙漸䝉宻更上益深秀林端鼠暗窺葉堕烏早救松風颯然至清若下寒溜野花亂青紅艶若春氣逗經霜石􅆃削劈斧皴不就巖扉想髙躅歎息龜鶴夀竒文古鼎篆茫昧失句讀千年瘞鶴銘㸃畫不可究江沙埋㡬尺漫滅人不守石竒露光怪如坐卧起仆風水相吐吞上下忽空透君臣分佐使各各位左右隂厓攀荆榛午鐘聞一扣隐隐睇林麓菅茅㡬間覆絶頂􅔤遐矚浩然塞宇宙江分一柱撑水觸兩厓鬭莫肖張耒詩亘古如龜伏兹山名浮玉萬金不可購投畀衆富兒一錢不肯授四時變態殊目未一經覯山僧言其然吾言非嘲詬金山塔勢矗對張機與彀海門昏不辨天水一浮漚銅坑東卸來北固始回首廣陵殘鐘沒𤓰步髙颿收斜陽又西傾朝昏異狀候霞漲倒景紅萬里堆纈繡波平閒榜人風定憩川后眺覽凡想滌佳境誰當酬僧厨摘野蔬晩飯始蒸餾照殿一燈昏負墻古佛瘦平生幽討興常將夜繼晝禪房竹露零甘液勝飲酎山清入定空不聞夜下漏月出五更初落落散列宿江平面如鏡靴文㣲作皺扶桑翻日車羲和轡馳驟欲上未上時金波㡬騰蹂圌山好屏障紅粧遮蒨袖驚巢鴉亂翻浴日雉朝雊兹遊􅘦厯厯貧兒忻驟富其如鬼揶揄司命不見祐明仍掉頭去髣髴難刻鏤猶然作詩言文蕪㫖亦陋舟中與惠硯溪阻風與君昨聫吟忍凍及遥夜􅂔壓叔􅙝陋驅争東野駕生未分二斗理合避三舎送籠身在笯服皁䭾難卸戲發楚人些不學夀陵唶風霜正窮沍天地方叱咤眠枕支未稳詩材巧相借開山要鑿空伐國必乘罅我踈衿露肘子宻帶連胯贈刀報豈無獻璧禍早嫁勉作三鼔竭其奈終日嗄聞聲笑扣缶咀味想啖蔗靡宻争充盤涓滴俱入斚疑有百城擁不輸一錢價柁死魚負蟄冰觸人徹瓦撥灰寒沈煙落燼夜添樺薄技更刀奏狂喙落紙怕湎思壑谷飲獵想雲夢射空然屠門嚼反似梁國嚇百戰鐡不持一處囚肯赦出膏真自煮擇地那禁㵼神來琢肝腎皮相説脅髂誇多獺未祭絶筆麟已獲浮空海氣幻瞥眼電光乍强弩穿已末堅城久難下祭如既灌餘酒似不驩罷謹當奉秦帝不敢望宋霸子吟慎毋然寸鰭看變化三月三日同錢幼鯤雨泛湖上兩峯如髻復如鬟雨後平湖空翠間脩褉難逢有今日放船正好看青山詩壇鵝鸛全軍斂野局漁樵一席閒惆悵輕橈容易去不曾洗足到禪闗真州詞二首估客髙桅收江頭浪如屋一笑輕千金來就青樓宿宻意真珠稠雙懸玳瑁鉤迴燈相笑語夜夜住真州雨㸃幔復侵簾更踈漏轉添稍聞凉氣入㣲怯曉風尖跳户蛙先喜翻簷鵲試占人間惆悵意只是晩亷纎江上感時物偶憶故鄉二首我昨别家日始見含桃風梅子方生仁薔薇漸抽叢一度月圓缺花事倐已空嬾宜堂名堂中坐照眼櫻珠紅登之白角槃䝉以青絲籠渇羌本知味愛此醍醐融翻從矮堕底怪許勻圓同金衣佳公子日夕窺簾櫳一飽吾不許最勝東呉東暘溪㡬萬樹謹䕶如守宫可憐好顔色樂府青樓中熱思逐彈丸不借漿寒攻但恐梅雨漬蠧或生蝱蟲江南夏淺時樂事粲可數悠揚花信風霑灑豆子雨隂隂桑覆壠脈脈膏流土呉蠶方上蔟繰絲知㡬縷蠶眠豆亦熟農書舊曽譜青葱偶摘塍輭美初出釡西來庵名有禪老分餉日卓午憐我征衫塵舊業荒老圃爐烟巻清晝坐久茶泛乳賴此宿酲醒口腹非小補我欲歸南山一頃種煙塢採擷充野庖灌溉煩地主惜哉不得往念此猶起舞逰夏氏五里亭别業同曹武歌友萊隣湘昆季五里亭迴得此莊萬鴉歸陣正斜陽清池蘸岸舊痕緑脩竹滿山新粉香谷口人家常寂寂洞中喬木轉蒼蒼三千去路愁炎毒願借風軒六月凉重五雜憶詩三首閒尋舊夢八年前水閣秦淮小有天風細月華人不到茜紅帬上倚筝絃寜兒掌上記初生㸃滴踈桐夜雨聲角黍筵將湯餅㑹恰教兩事一齊行憶昨江風作意狂青山山下倚危檣劇憐萬里歸舟客不得杯黏午日黄清流闗清流闗前巖月宿行人早行車轣轆年年一片青草痕沒盡南唐戰場鏃曉行信馬閒行有底忙詩人風味野人裝旅程梁宋初飄泊離思秦呉正渺茫四野欲沈明逺燒五更將絶趁㣲凉篋中苦訝衣裳薄壓體如霑九月霜汴京雜感四首清渠照出錦帆遲千載烟楊尚作絲一様傷心莫回首樊樓春酒最濃時烽火東門萬事非打毬誰復御場衣只應花鳥無拘管尚自年年汴水飛休將羯鼓憶昇平惆悵無人空月明拍按師師筵上曲馬行燈火夢東京連理芭蕉玉色芝故宫無復舊堂基憲王歿後風流絶誰冩哀音樂府詞延津道中悠悠疲馬出延津觸暑清羸旅病身正要薄雲成小雨好教官道壓逰塵漿思半呷村姬乞路失三义野老詢一輛太平車子裏全家安樂是何人題唐六如呉彩鸞寫唐韻圖蘂珠小謫又經年重叠書完九萬牋却笑仙家新活計也如人世賣文錢題周昉妃子出浴圖薫風殿角得㣲凉玳押冰簾困日長第一華清好梳掠晩來纔罷玉池湯道上蝶白汗憐方困青陵見似稀已遲春艶艶還逐夢依依弄影悠揚過分香晼晩歸迎風有紈扇切莫繞羅衣秋日登吹臺浩刼曽傳㡬兵火此臺百尺猶嵯峩誰其逰者杜髙李四顧封中淮濟河八月九月秋景澈今人古人遺恨多草黄騏驥爾且病木馬不食行如何陳昇庵招遊蘇門百泉五更月堕天西南殘星耿耿配兩三出門風輕馬蹄快衣上一帶侵山嵐蘇門縣前解鈴䭾困思小憩投茅庵賢侯東海我好友勸我劫劫姑留驂臺符吏牘劇衡石一笑不問先幽探西門七里林谷繞斜日半嶺烟雲含涓漣已到百泉上清暉傑閣凭眈眈水妃何年此㣲步明珠錯落遺風潭千鬟萬髻作顔色太行倒插緑玉篸清泠忽聽響琴筑駛激更不容螺蚶吾徒解衣聊快意健筆往往兼雄談昔者東遊過趵􅊳與此清泚同所妉水晶盤中瀉冰雪一勺便癭吾猶甘水性悍急飲之輒癭居人於十里外方汲桃竹園西得㣲路下者捫壁髙乘籃青山久無俗士駕白石尚有仙人函嘯臺鸞鳳杳何處遺訣或者留彭聃重遊後㑹誰與必歸路欲覔觴酒酣環山三帀夢應熟瞥眼一過心常貪便㨗休争百足蚿纒裹莫作三眠蠶人生婚嫁有時畢便合夜雨同㝠參來安道中閔蝗詩我聞政成蝗不災天意潛自㝠㝠回推原人事理可信不爾淮徐之民何有哉去年秋田苦蟊螣吁嗟有穀人得食冬來大雪三尺彊猶賸遺蝗蔽天黒宻不能使舉網齊遮邀熾不能使縱火俱燔燒農夫釋耒各歎息胼手胝足徒為勞舊傳此物旱之徴㴻雨一洗如秋蠅只今山川不神龍溺職上帝憫爾應遣油雲蒸矧今農功初良苗甫欎欎收穫及西成尚可五六月腹心雖煩憂物理有衰歇兩年遭旱復遭蝗此是何人任其闕勸農努力耕爾田清平官府才且賢上某中丞帝簡維良佐時清有大賢中丞雙印綰副相緑車聫冀北祥雲合天南福曜懸陛辭多感激宸眷獨勤拳鎖鑰蠻荒地開張節鉞權到時梅正發去後月長圓百越遮靈宅三瀧俯大川林翔五色雀水酌九龍泉掠㡌遮籐葉褰帷繞木綿兒童欣瑞日父老喜佳年善政經綸逺清操金石堅四知傳介守三畏接真傳瓊樹何由採丹砂不直錢嚴刑冰案減私税耏門蠲惠路沾千里仁風播八埏蒸黎資教育多士樂陶甄海舶鴻鱗集花村甲乙編麗樓更㸃㸃煙塢鼓闐闐撫字真宜亟瘡痍劇可憐讜言雙闕奏文誥六條宣飭紀風常肅匡時俗屢湔豺狼羣破膽梁棟早須肩汲引收㢘士疵瘢凜屬員時豐家室聚官好吏民便式訓招陳寔逰談逐魯連珊瑚寜撒網瑇瑁不開筵山館無停轍橋門絶放船十陳鹽莢論三復二南篇簾啓花間市門開月底㕓柔桑經廣陌瑞麥織新阡蜑户謳聲徧蠻鄉舞曲妍鈴齋排錦石㦸府卧雕鋋疇入陳琳室來看王儉蓮嚴徐殷仰止帬屐望周旋黄木灣頭路沈香浦外田韓碑朱篆刻尹誦緑書鐫令譽傳方外清名到日邉𢎞猷齊稷契淺學遜雲淵早嵗身辭越頻年客寄燕詩宗匡氏鼎禮述服家䖍落拓囊如葉蕭條業似禪林宗巾累墊東郭履頻穿孔坐談曽劇陳筵醉欲眠鵞谿裁十幅麟角秃三千把巻思枚馬燒丹訪偓佺呈材羞碌碌收籠愧戔戔謝府詩書積程門禮樂全執經稱弟子披霧豁拘攣官舎曩留屐雲亭待草𤣥玲瓏開綺饌安稳策花韀殘臘冰霜後迎春雨露先提攜邀譽久拂拭感恩偏苞鳳程方逺臺鶯詔特遷雙旌光照耀六纛影蹁躚嶺外人歡甚朝端論翕然鎮南聲最著分陜任尤專亮采先三事疇咨答九天臣心方似水元化正乗乾爕理調湯鼎賡歌入舜絃惟應桃李列丞相植門前題水村圖梅子雨過麥隴黄𤓰蔓水流菰葉香江南夏淺好時節水村處處分新秧新秧分時蠶上蔟呉蠶結繭瑩如玉繰絲得穀網得魚船頭醉歌船尾宿河豚欲上蘆芽生清江波寫鏡面平呉兒踏浪不踏土㸃㸃帆影浮空明十家五家矮茅屋門前烏桕樹濃緑林梢雨歇呼鵓鳩原上耕忙催布穀艑郎唱艣何處來青山如畫須當杯烟中㣲㣲見孤寺塘外隐隐聞輕雷長安三年飽塵土歸夢江鄉劇連弩今年久旱氣欎蒸白汗翻漿愁卓午陸生叩門貽此圖挂壁似有清風俱山兄漁弟莫相笑我亦識字耕田夫耳疾排悶五首年踰三十一衰翁百病侵尋急箭攻牛蟻不聞差自在更休方法想治聾移持雜卉傍軒楹零落真慚得地生剩有一枝紅芍藥半開應識主人情急雨俄驚瀉瓦溝恰從久旱豁煩憂夢中訝許清凉境蕭颯陂塘五月秋茆簷苫葢一弓强兩面虚明八扇窻箇是儂家新活計錦葵石竹膽瓶雙青綾㡬度玉堂眠歸夢江鄉輒惘然第一清詩吟望處萬株紅藥曲䦨前沈度汪諭徳招集丁香花下以耳病不赴書此作答從教寳網奏英韶病後音聞半寂寥酒伴只思春社盞藥畦屢夢故山苗蹉跎勝日看花約慚愧先生折簡招寄語温風好將䕶他時還擬一攀條憶昨分曹立韻時觴飛猶訝酒行遲座中强半多呉語江左由來重沈詩豪飲更為今日㑹繁花重發去年枝碧山學士何由見去歲錢越江學士同飲花下今下世矣地下尊前兩寄思送延津趙令嶽麓山昏黯黯天短篷風雪洞庭船澧蘭沅芷思公子官閣紅爐十二年太行遥壓廪延城㡌影鞭絲我舊經君去巻簾西閣望玲瓏削出半天青送友人南歸别酒重行簇馬蹄半年情好惜分攜春回塞北冰初坼人到江南栁漸齊一帶曉光迷鶴市㡬灣淺水繞香溪美人樓閣花橋路待我歸尋綵筆題懐清堂集巻二
