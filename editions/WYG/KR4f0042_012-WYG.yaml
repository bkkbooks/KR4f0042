body:
  text: 懐清堂集巻十二吏部侍郎湯右曾撰東便門外某氏園别山言授一聿脩峙公文章報國愧虚名詔下軺車指舊京待訪神淵龍起處應經絶塞雁歸程潮迴滄海浮家去日落青山罷酒行公等莫嗟垂老别未除豪氣尚縱横宿通州試院依然襆被宿寒㕔觸迕閒愁白髪星喚起嵩陽舊時夢三更風撼閣前鈴潞河雲物入清曠秋聲兩岸蟬含情西潞水也自解澄鮮京東州縣多被蝗害蔽天從西來聲若殷雷奔投東倐而下一下無千村萬萬攢黑蟻布野如雲屯遺蝗復生蝻下食盡草根欲秉畀炎火種多不勝燔積雨則掃除安得天瓢翻捕蝗載令甲州邑愁思繁撲滅少後期章劾肯見原擊鼔集衆力解鞍傷客魂古有不入境得非政理存我欲因事規小吏何足論薊州城北二十里僧舍身許雙峯未有涯耳聽門外響三車高人住世仍忘世窮子還家詎是家半缺月如懸破鏡一條水似漾長蛇思量入道今衰老旋得歡娛旋歎嗟望盤山深松隠上盤中盤杳何許白嵓嵐氣濕已作前林雨歸來采樵人衣上雲幾縷借枕僧廊眠東軒滿山翠淙淙桃花水散落桃花寺已似隨清風泠然引而至玉田仙人石一升石爛不堪煮持歸南山下種作好眉嫵已訝隻成雙復驚一得五熒熒絶代子未笑心先許雨宿沙河驛出塞一身逺將家八口同百年均是客多病乆成翁蟋蟀寒燈雨蠨蛸破驛風猶欣小兒子笑語寂寥中兒子學基方几嵗牽衣繞膝差慰旅懐盧龍道中山形谷勢何多端輪摧軸折車過難兩崖對束巨石礙一逕斜轉隂雲盤下復泥深行不得我馬哀嘶病無力愁霖積淖闗塞長始信人間路偪仄兔耳山放浪天教養不才四年踪跡亦竒哉題詩嵩少三花去走馬平營五頂來兔耳其一也眼見海神鞭後石手捫仙客奕時臺飄飄似把浮邱袖笑看滄溟水一杯榆闗驛懐先兄篆辛嗚咽桑乾水三年不忍經榆闗闗下路愁見暮山青小驛逢鴻雁西風痛鶺鴒感恩餘故吏榆闗驛吏先兄令樂亭時遇之有思欲語涕交零望海岡歌西踰連峯山東上望海岡海中滉瀁亦何有但見積水青茫茫忽然虚無中浮出蜃氣黄秦皇島邊一綫起欻見邐迤隨風長精靈下聚珠貝闕光影上駕虹霓梁傳聞此地海有市高秋澄澈疑可望五城十二樓隱現波中央人間那得峩嵋老神所勞矣争開張窮壖毫髪入大荒白虹蕩蕩浮龍驤海童邀路不敢過漁父一葉歌滄浪塵中憂患未可量頭白死生空爾忙舟中嘯咏謝安石臺上輕舉燕昭王環洲仙草菖蒲香鬱夷金霧含晶光成塵何處辨五嶽枯倒重見生扶桑不思驂麒麟亦莫翳鳯凰鯨魚掉尾幾萬里送我羽節朝東皇昔逰洞庭卧岳陽空明倒景摇瀟湘未騎碭水赤鯉去復看析木青鸞翔笑爾椿槿誰短長超然已入無何鄉揮手為謝安期生如瓜之棗不足嘗澄海樓大海東迴水波惡如山浪打長城脚千年萬年鬼夜哭冶鐵銷沈石崩落王公設險古制存屹立重闗嚴鎻鑰干戈相尋逺不數六十年前事如昨大盜移國明社墟澒洞烟塵昏六幕是時闗門臨賊壘白日旌竿莽蕭索奸兇滿盈人鬼怒世運艱屯神聖作飛龍首出在九天熊虎戎衣只一著石河西南破賊處父老猶言戰時樂後漢書今見其戰樂可言耶不聞人聲聞刃聲霹靂摧枯風掃蘀只今車書通萬里天下一家無厚薄名都貨貝街喧闐屬國賮琛驛交錯承平暇日展㳺眺賓客閒情寄觴酌兹樓我到亦偶爾萬古心胸忽開拓更喜天容海色清側身東望蓬萊閣土人言天氣晴明往往見登萊也山海闗東西誰界絶封此一泥丸地接長城險天浮渤海寛連山趨碣石積水見辰韓吹角闗門出邊風馬首寒前衞上下經重岡溪風亦多厲我行困登渉日暮前屯衞女牆被秋草廢壘今易世闗東嵗屢稔外户夜不閉物情貴所無價賤米狼戾輪蹄交道路入闗未迢遰來逢車連連賣糓供王稅時當三農隙市通百貨滯差幸闗内民蝗餘獲少濟我聞海絶島鯨鯢未盡殪時出犯風濤無地可樹藝餘糧括海舶間亦施小惠賈往三倍収法令不能制官司為耳目上下乆䝉蔽寄語横海軍首須袪此弊海口出粟禁豈但東南際民愚無所知國有萬年計望覺華桃花二島我循山行若弓勢脱手彈丸兩黑子鯨牙撐突波濤翻鰲背坡陀島嶼起龍宫浩劫不可問硉兀海雲何處是島中有龍宫海雲二寺聞道殘僧餘兩三買薪時復來城市寧逺州食蟹海濱物産珍錯交食指一動隨所遭飽聞稻香肥郭索白玉脂瑩去黄金膏蒸未出釡羣聲囂豈知手擘餘空螯大笑口腹負老饕人間名實多汝曹中秋寧遠道中雲帆粳稻存遺島謂覺華野戍烽烟斷古城出塞始知山逺大入秋彌覺海澄清樓臺何處蛟龍氣風雨空中草木聲誰遣琵琶弄明月醉餘添得放歌行小凌河松山行處戰場多殺氣連營夜枕戈今日斜陽照禾黍秋風孤雁小淩河入錦州界喜節孫通守至憶丁卯秋試時同館李文定公家忽忽二十三年矣談天翁在海東頭落筆千重抱蜃樓日召諸生試家法通守在州日以教授諸生為事誰如别乗最風流尊中竹葉歡今夕院裏槐花感昔逰廿載相公門下客幾人有淚灑西州十三山頂拔地忽起十三峯峯峯突兀如排空多年石花封白黑終古壁色填青紅捫蘿得路到巔頂大漠清秋散光炯烟螺一㸃浮空虚雲氣已接毉巫閭醫巫閭山虞封十二山毉巫閭鎮幽一重復一掩秀色横九州元化始煦嫗神功繼雕鎪巨靈右踏足斷鰲左昻頭百里盡東騖天際穿雲糺一一青蓮花萬手搴不留其下作巨鎮祠廟嵗增修内府出金錢寶翰蟠銀鈎焜燿萬萬古豐碑樹崇邱秩禮視三公圭幣薦百羞五風而十雨有禱神必酬登望義州北邊陲昔䖍劉長劍斬封豕壯士脱兠鍪于今隷王官婦子樂鋤耰時載十圍木出市布與裘夫犁弔舊營懐古風颼飀移屯耿校尉無慮搤其喉萬帳請受降兵氣如連牛餘威震東部砮矢貢挹婁前臨望海堂指顧發一漚閻浮百億界小水笑麟洲昔者東丹王校獵來清秋忽慕吳太伯舉帆越之罘隨身千巻書美人同綵舟丹青入圗畫秘府多藏收洛城血坡陀歸魂招得不猶聞影殿在嵗乆不可求前年地忽坼遺蹤出山陬朱門森隂沈髣髴垂前旒牧豎不敢入風雨聲啾啾昨者楊縣尹始掩土一抔我欲鐫之石大書立道周驅車涼風節青巖寺名雲木稠上尋瀑布泉下訪潛龍湫夙與禽慶期願接盧敖㳺行當見白鹿夾我巖前輈人生知幾何悠悠復悠悠遥從五岳外高視滄溟流途中兩臂疾甚戲作一篇老夫秋來骨欲折兩臂攣如痛不絶昏疑魂夢戰水火裹若支骸創金鐵少年萬事不自料縱意初凉好時節奴摇大扇卧不休被著輕綿手先掣隂寒中人到今發疾病隨身向誰說或言長孺老秃翁皆坐三年頻嘔血形枯髓竭應爾爾石戴秋花復車轍道逢健兒好身手歸去兩狼挂鞍首有力惟呼惡馬騎輕身慣接飛猱走臂鷹牽犬最稱能射雕扼虎尋常有相看意氣尚雄放何法醫治此衰朽屈伸不廢五禽戲提擕猶可三升酒古有折臂終作公客來舉此慰我窮壯士斷腕不可學高人曲肱將毋同寄謝黄金印如斗無緣得繋衰翁肘渡遼水勝衣誦明文何假七營士舞戈笑公孫計出中下耳六合城何處天涯無錦帆空憐麥鐵杖只博淺黄衫白衣渡遼隧果毅雲泉府當時凌烟人惆悵李景武雪堂同年見示近詩奉簡貢書早嵗忝同年西掖南臺佩接聨遮道每驚狐截尾出雲誰見鶻空拳騏驎地上行將老松柏霜中節更堅旦晩㑹承宣室召不須吟誦白頭篇食栗何來此佳果初飣客盤新覓自小年日投從隔坐人如拳空較大似蜜已先皴俯拾山寒路狙公莫浪嗔雜詩蓮泊在城西南十里外似聞風露香明珠剖蓮的滿滿無空房中有么荷拳味苦不可嘗味苦猶尚可甘恐腊毒傷誰云蒸羊腔乃不美蟹胥風味固差别一笑未要渠此邦無監州我官况晏如惟當勤撥甕東來載麴車仙苗劚三椏貢等天府琛市人一笑鬨薺苨作人參真偽乆雜揉清鑒窅然深鴮鸅彼凡鳥詎有威鳯音我有好頭赤得之西南隅秋城雲拂地復生叱撥駒三日走及母騰踏萬里姿雖慚麧與藖勿忘貧家為芻狗入我夢美食趣召客遼水魚上冰盤中卧三尺割鱗不割鬐小㸃𤓰薤跡頓頓飽老夫肥如瓠壺白纎纎不可整欲理如亂髪土名烏喇草是生有竒温䇿勲嵗寒月軟襯將穿履細衲纔製襪情話遥夜闌地爐謝榾柮城東小河崖去城五里出泉自觱沸日供萬室飲造物不知費連年濁水源凡骨滯靈氣淄澠今可辨更思味外味織者身常進耕者身常退進退兩不知天機各有在我非户限上就列力未逮辛苦邢惇夫嘔血方病肺病起洛涘歸來復兩京誰憐轣轆此勞薪一彈指頃皆陳迹三折肱餘是幸人蹋雪預儲䩕角早畏寒時喚帕頭頻書聲廡下慚兒子他日紛綸井大春兒子學殖隨來廨舍五經比能背誦矣寄答吳寶崖逺辱詩相憶深憐病未瘳孤雲天北角寒浪海東頭寂寞仙人藥䝉茸使者裘長懐阮公嘯逸響振林邱祭酒諸生耳承恩在紫宸月分紅粟貴嵗賜錦袍新已有名驚座何勞戲答賓明年看扈從綵筆頌東巡漫興八首支分藥竈與茶鐺一榻蕭然長道情皂㡌人誰念西笑赤蛇官果有東名海凌欲合風驚牖沙雨將來霧塞城漢室蘭臺周小史拾遺曾否記陪京吠厖不警樂年豐聖主恩深萬物同九譯梯航來海外二陵風雨䕶天東悠悠黑水無沈羽渺渺扶桑有挂弓塞上百年烽火息健兒吹笛戍樓中天長漸入婆娑府地散偏宜漫浪人求藥轉嗟成市少鑿坯何異在山貧郡中有客占藷蔗雲際無羅網鷃鶉誰似平生舊逰好經營消息不辭頻薄田故里乆荒蕪立稅遼東計更迂米賤祗應隨日糴酒香未缺不時須城訛烏尾邊風勁臂掣鷹鞲塞草枮聞見物情思妙理負暄聊可忘朝晡尺一何時喚我歸年来得失總忘機竒思屬國公沙穆老作遼天丁令威京兆未須嫌五日塞垣今已逼三微無人得似長岑長不樂之官便拂衣雅宜羸骨早裝綿塞墐應從北戸偏客共語時須勝日鶴知寒甚是今年冰原鼠入谽谺谷雪窖人埋黯黮天萬騎幽陵方㑹獵書生虚控射梟弦上林賦射逰梟註梟羊山精也何由杖履得追陪謂漁洋先生隔水雲颿去復迴嵗月峥嶸歴冰雪海山明滅見登萊鰲身跋浪千重沸蠶尾囘燈一巻開先生新刋蠶尾集想到尚書逰賞處琅琊初日最高臺貢包嵗嵗自平州驛道輪蹄雨雪稠五葉葠齊珍上藥千金貂煗識名裘人才瑰異應如此册府遺亡尚可求刀布他時隨計吏諸生好待八紘収題吳仲圭墨竹譜猗猗淇園千頃緑三年坐卧意未足歸來合眼想檀欒别有風流在卷軸海東叩門無所詣悠然看畫如看竹吳生静者藝絶倫落手天機謝拘束逸韻先封瀟灑侯清隂已入篔簹谷横斜自見風掃逕欹倒如聞雪壓屋窺窗掩冉摇碎金吹籟清泠戞寒玉梢頭片雨筆可追枝上輕烟墨能蓄連叢忽漏月流夜病葉將零霜脫木壯士幾輩直榦排劍拔十尋高節秃殷殷中宵雷雨過􅋾􅋾錦䙀頭角矗底須縱筆如筀大趙士安好作筀竹轉笑成形似䊸曲文與可每作竹况人朝士張潛迂疎脩謹文作䊸竹贈之淺深向背生意真朝暮隂晴清景逐湖州筆力儼猶在宣和院體嗟已俗金錯刀偕鍾隱能鐵鈎鎖許誠懸獨自言神明出規矩要令披猖有邊幅不學誰能心手應以小喻大當三復年來與世絶愛憎漸覺心源少棖觸偶然玩物有此癖何異小夫金守櫝通靈妙畫㑹當去羽化銀杯哂童僕巧偷豪奪兩未知聊喜烟雲一過目題節孫盛京竹枝詞後藻繢文成五色波採將風土入絃歌青田萬里聞仙語枉道星星不解多竹枝哀怨楚人聲移作猗那頌太平未必歌詩有何武試從東國選諸生糓賤行江南得米如得珠闗東下飤雞與豬我馬在櫪市束芻秸稾纍纍子粒俱問之市人笑盧胡家有遺穗無逋租酤酒賽神神降巫村場撃鼓連臂呼女有衣裳男袴襦樂哉此樂無嵗無今夏小旱豆莢枯皇皇閭井憂妻孥幸天出雨困乃蘇豐樂慎勿忘饑劬大瓮小甔粟謹儲今年要備明年須君不見堯湯水旱古來有勸農合在循良守馬厰行遼水東西一千里泉甘草豐地莫比休誇黄澤接黄池不數白沙如白水年年國馬一萬匹圉人牽來内廐裏三千嵗字額有常騏驎好兒天驥子馬官減豆馬不肥天寒瘦骨猶權竒空聞非子主汧渭逺念太僕領豳岐後來坊監法一變顧視逸足無新羈熙寧保社散諸路元豐茶馬為一司憶昨河湟通互市商賈班班車罕至聖主方哀漁奪私羣公且言辜𣙜利自從使者罷河西邊人老幼懽扶攜如今龍種生東海不用崑崙入馬蹄登角山寺寺在山海闗北角山頂石磴千盤上松濤絶頂聞四虚風縹緲大海氣氤氲黯黯蜃成市飄飄鶴出羣老僧茶話乆堦下已生雲洋河羣山合㳫烟翠迷決決冰雪鳴寒溪人家高下隱喬木最好夕陽洋水西蘆峯口山銜落日盡路入蘆峯口高柳小茅菴門前鴉在否禹鴻臚尚基為予作出闗圖裝背未及而行嵗杪重入國門展巻題四絶句白山黑水一閒身圖裏傳來已逼真縱少詩家好標格出闗也似入闗人海東萬仞雪嵯峨路入遼西氣便和重上闗門一延首盧龍塞繞白狼河勞勞車馬在塵中物外閑心寫最工宛似龍眠老居士陽闗著箇釣魚翁貽書誰問邴根矩問俗人知王彥方我賸杜陵遺恨在不曾飛檝薄扶桑僦居甫定怱忽改嵗矣慨然有作九死餘生似斷蓬得還那復問窮通管寧皂㡌有時浄范蠡扁舟何所終華表鶴驚新嵗月畫梁燕認舊房櫳烏頭馬角歸來日好在春杯灧灧紅詠齋中水仙己丑除夕作一重簾外即飛霜小墢幽花護曲房天與風光殘臘後人教位置早梅旁清姿自擢娟娟秀素艷時披脈脈香折贈春湖有逰女凌波先拜水仙王懐清堂集巻十二
