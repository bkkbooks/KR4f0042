body:
  text: 懷清堂集巻十七吏部侍郎湯右曾撰乙未中秋後三日恭和聖製奉送安溪相公蹔假歸里濟世功名葢代儒奉持堯日矢臯謨健隨天共三辰轉煦若春回萬卉敷嵗旱舊須霖雨佐時平今應泰階符欲知元老勛髙處度笮懸䋲悉坦途頗牧曾傳禁署儒蠟書間道贊神謨請殱妖鳥猷真壯嚴戮封狼命再敷王畧心勞明皎日兵機手畫授隂符孤忠最憶艱危際歴盡羊腸九折途孔周絶學繼醇儒金殿洋洋翊聖謨道合三才源奥衍筆開萬象景紛敷丹青姓氏前賢貴魚水君臣異代符千樹棠隂畿輔在壺漿父老拜前途祖道天章寵碩儒上台虚位竚嘉謨都亭暫别千官㑹政府重來五典敷國事較於身事急人心實與帝心符潞公九十朱顔好何限烟霄萬里途胡少宗伯抑齋招同羣公寓樓小飲時長至前五日南宫下直盍朋簪近臈盃添綠蟻深天宇空來餘脫葉夕陽明處數歸禽城隅車馬勞人態河畔冰霜晩嵗心雪後看山應更好他時重約此登臨嘉平九日仍用前韻奉簡抑齋先生前有雪後看山之約故篇中及之西嶺雲堆緑玉簪不知雪片夜來深衝寒未稅投林鞅忍凍難飛出谷禽病負一尊前日約卧思三白老農心敝居差有巖中趣指顧春風肯暫臨乙未除夕前一日次韻張漢瞻見貽之作立馬江濱記别筵看羊海上數離年昔與漢瞻䢴江言别十九年矣毎因出谷思求友差喜連章得薦賢紅頰相看猶好在白鬚一笑正飄然明朝待進春端帖憑仗詩催淑景先再疉前韻送陳季方貧家蔬䔩愧賓筵柏葉椒花已判年落紙煙雲人共貴到門羔雁子真賢通經致用名髙甚將母懷歸意灑然綠暗江南萬楊栁放舟猶及絮飛先人日漢瞻文子思敏季方大畇峙公寓齋小集仍用前韻傳杯今夕是初筵良友相於可判年剛喜入春方七日況逢畢至有羣賢林中蕙草曾生未江上梅花尚宛然有盆梅一本老榦疎花絶可愛爛漫星橋三夜月後期更約試燈先藤花㕔寄唐東江司勲楊栁江潭手重分幾回書札話殷勤極知說士甘於肉毎惜論交散若雲松菊未荒餘舊業風流不墜寄斯文紫藤花下隂濃處二十年來轉憶君丙申四月三日奏事苑西䝉恩宣賜大學士以下黎溪石硯一方歸示兒子學殖殘書老眼兩三行伏獵猶存此侍郎東觀殺青何日是余承脩書局葢五年矣緑雲一片媿分將小兒困卧强書鷖苦念彭殤理未齊今日祥光生墨海永年兩字自天題硯背有以靜為用是以永年八字銘葢御筆也五月二十二日澶淵道中喜雨有作昨暮雲興似翻墨雨脚垂天萬條直綠槍􅑷􅑷作猛聲銀竹森森帶寒色野庭商羊舞一足鮮水鳴蛇斂四翼流從舍東繞舍西雷自山南轉山北天將甘霤慰聖意民以豐年感帝徳且欣此夕有安眠更喜今秋得飽食長安故人應念我滑滑泥深行不得豈知瀟洒入山程為賦新詩報相憶送裴香山副使時有修濬西湖之約故賦此篇使君未到官三載湖中居鷗邉渡水槳花下平肩輿時叩野人門或尋開士廬佳辰恣搜討妙意紛巻舒朅來十餘年風月情相於忽傳尺一詔隼畫翩翩旟昔游多所欣今徃復何如官曹領鹽鐡典掌兼傳車别我炎氛中涼颸生衣裾首言安人術次問當官譽我笑謂使君子器貴璠璵風清萬廣厦弊絶百吏胥公事了湖中塵累何足袪惟聞古良牧水利先堰瀦六井鑿鄴侯決決鳴清渠築隄白與蘇長虹跨天墟一寸資灌溉百里潤耕畬只今湖西南日夜沙填淤老葑更蔽翳滋蔓不可除譬如明鏡圓已蝕半蟾蜍使君能規度較易元祐初増庳以為髙加廣數尺餘金錢費差省畚鍤力亦紓美哉復舊觀快若親爬梳𣺌瀰天水色蕩蕩涵空虚我歸期明年言從漁父漁無煩兩黄鵠已騰父老書何以獻使君春醖雜冬菹何以夀使君木𤓰報瓊琚平湖共臨汎十頃風芙蕖何者知最樂南屏金鯽魚重過萬栁堂小紅橋上立移時四十年來再到遲一片蒼葭迷野水幾行疎栁帶荒祠笙歌不記回燈舫魚鳥誰能認鬢絲剰有懷人惆悵意春明舊夢省郎詩題沈心齋閣學蓮塘小影先生水石興猶偏荷葉荷花淨可憐但得環城三十里不須更問霅溪田楊廷秀過霅川詩菰蒲際天青無邉只堪蓮蕩不堪田東坡守郡日亦云環城三十里處處皆竒絶蒲蓮浩如海時見舟一葉萬家笑語藕花洲林子中吳興詩萬家笑語荷花裏何日相攜一葉舟玉鑑光中人照影水晶宫外月横秋十一月廿二日夜嘔血至升幾死後數日稍平隨意所至輙成一首丹竈紅鉛未奪胎忽從水底起龍雷龜蛇松下尋難得和扁門前望不來親舊相看還歎息吏人走報各驚猜須知幽闕重扃裏㑹有青銅鏁自開歉嵗流移失拊循可憐雀䑕指空囷病無力奮垂天翼老只心驚下阪輪嵩少買田思舊隠首陽埋骨愧前人燭邉細字文書在倦眼昏花讀未真默從泉路數交期逝水流年已可知蠻府尚餘碑下淚㝢昭吳都猶唱巻中詩元朗三生聚㑹應何日六客存亡又一時昨夢通明殿頭過依然玉立在瑤墀定制毎九卿乾清門奏事給事中八人班殿下予與兩君先後同官嘗同入直從此真須勇退耕稻畦桑塢足間行子孫私計誰推荷東坡歐公致仕啟妻子之計推荷之於後疾病餘年小太平梳頭浴脚長生事臨睡之時小太平出宋張端義貴耳錄雞黍有時招近局漁樵重話似前生貽書先報山中友已覺風生兩腋輕汎湖船上一袈裟家兄廣厓自乙亥即棄諸生出世宿植超然詎有涯兄弟蚤年同奉佛宦遊今日竟忘家對牀苦憶蕭蕭雨入室空求冉冉花缾缽歸尋清淨飲不須更吐飯中沙為徐勉齋侍御題日南種菜圖由來循吏是髙人繞舍秋風小摘新尚有雨餘行菜地食鮭誰信庾郎貧放衙藥裹並詩囊苦霧三年在瘴鄉猶是書生虀百甕可須消食進檳榔自昔風流南路徐羊羮鵞炙乞殘餘一從歛版山城後菜把園公謝不如幽期抱甕古猶今茄菜蜂蟬小筆尋徐崇嗣有蜂蟬茄菜圖秋末晩菘春蚤韭一畦烟甲五湖心送黄補齋之胙城任每從淇汲寫遺聲白水青山入洞庭他日㑹書循吏傳絃歌好為采風聽雨中柬介夫妙光閣煩襟苦側塞曠思城西遊五更夢回時葉上雨㸃稠朝來勢轉劇懸河注瓦溝起行忽平階一一散浮漚阻此步履尋黙憎呼婦鳩徐思病新差合遣筋力休門前泥活活去馬迷來牛輻脫軸亦折一日閒且偷秋雨山中居百道清泉流我今試合眼得似山中不城西有招提佳處置小閣閣外三兩峯西山蒼翠削其下有孤亭四面繞花藥尚書經營初賓詠時間作相公繼遊屐毎放林間鶴庚辰辛巳間文靖公所留雙白鶴尚在閣後回頭三十年空憶風撼鐸老僧無舊侶香火冷佛脚東隣秋樹根疇昔下簾幙與子讀書處經行恍如昨但念今者苦誰省曩時樂苦樂行兩忘何知風雨惡舍旁新拓書齋倣樂天體六十過頭是幸人如何不樂損天真但令有石皆應拜縱使無花也當春堆案圖書堪送老滿林風月未全貧更營煖室莎臺上調䕶冰霜嵗晩身經過步屧卜鄰初景物園林南路徐地初經營於山隂徐氏壬申癸酉間予僦屋鄰並常遊扵此人去已同流水逝燕來還認故巢居連峯紫翠看皆好喬木風烟畫不如塵事少休來獨坐恍疑仙爪為爬梳孟門虞阪路艱難扄户知無異患干幸以疎狂逢聖世況兼蕭㪚本儒官間中掃掠新蘿徑病後扶持舊藥䦨裝㸃青紅任兒女欣然一笑得加餐見山便已似還家偃仰幽情十倍加隙地更思勤放竹明年凖擬徧栽花故人來共留終日名酒求還載滿車長憶風流謝康樂不曽邱壑廢京華謝詩昔余㳺京華未嘗廢邱壑南齋遣興落落心逾冷冥冥眼欲迷五株桃樹厎一角草亭西石逕從教窄柴門不厭低舊諳卑冗趣轅下笑雞栖料峭寒猶甚窗扉幙重遮凍含連日雪風散一城花宿火勤煨芋清泉細品茶尚餘閒氣味依約似山家洛濵經嵗憶京邑蚤春期勸客三杯醸留僧一局棋雪川長老善碁時將歸香山心悲如滿塔巻賸惠休詩謂影堂詩何處飛空錫咨嗟病起時春日春盤後華燈滿禁城烟花南部夢鐘鼓北平聲宦拙如朝隠交疎見物情莫嫌人共棄且得免逢迎吉語喧都下軍書日夕多平安傳堠火兵甲洗天河白馬經新入青牛客屢過幾回雞樹下衰老重婆娑右軍誓墓後志欲老江東築室依封樹浮家狎釣筒栁隨低岸沒葑巻半湖空舊觀何當復蘇公繼白公弟兄皆奉佛給事有西莊蘿薜門常合烟霞興不忘四松依石瘦一水帶溪香子季還吳日靈禽集講堂藥物求何益醫門覔更難撥書愁夜永擁被怯春寒挑菜逢新節移花壓舊欄從花窖買十餘本明朝正祈榖爟火接郊壇病後月餘不能出卧室悶甚聊作數篇解嘲丁酉五月十九日間看乳鵲飜林日靜見新菰冐水時一榻風簾欹角枕合歡花影正參差嵌空剔出舊莓苔小小雲根翠壁開借問三峯誰判與可曽載自太湖來水活漣漪徹底清跳波戲藻小魚行更穿屋下仇池穴卧聽風泉㵼壑聲戲作連筒引水從堦下石罅注池淙淙有聲空堦永日緑隂鋪炎毒人間定有無莫笑吾廬猶火宅仙家珠樹恰三株茉莉花繁抵素馨自開自落在中庭誰家月下褰簾女一朶香銷宿酒醒忍冬幾本雪霜加去年小雪後編籬移種寒甚移來好事家今日沿籬總生意不須更待蚤秋花由來貴種出天工夾竹桃開有兩叢誰遣畫師來貌得淇園綠映武陵紅寸根栽向曲籬旁培䕶還同百草長他日西風寒露裏一枝獨秀雁來黄已上皆室前所有十二月十二日晩天門枉駕見存予方在疚病涕淚中不覺其言之悲也數巻恒河萬刦沙幾行衰淚落悲笳故人白水言猶在歸夢青山路正賖剰有髙吟排雪浪小留輭語綴燈花他時中禁思才子先問元和宰相家懷清堂集巻十七
