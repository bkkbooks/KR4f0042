body:
  text: 懷清堂集巻十九吏部侍郎湯右曾撰詠齋中草木五十二首同雪子作松去年霜後枯今嵗雨中蘇不是蒼髯叟誰當慰老夫桂分將月中種自我山中寺天竺也山中人不歸月中香可致槐翠作老龍蟠隂濃六月寒清心了無夢不入大槐安椿童童覆如葢南堂綠隂滿仙人八百年來共靈椿館桐清隂凋急雪無復䕃我室欲斵枯桐枝恐不中琴瑟榆我家老榆樹枝榦蛟龍纒題詩厭常語不道沈郎錢竹碧篠數十竿徙栽疎復密莫訝叢喧卑漸喜鞭横逸楸布葉如雲屯蒼然入夏冷西風障落日晩下茅亭影合歡合歡夕常合葉葉自成行金堂七十二莫作野鴛鴦丁香嶺南雞舌香似非此丁子君看細黄花豈有白與紫栁寄生良已孤成隂或可舍春來一條條垂在西廊下西府海棠蔓草羅裠色芙蓉臉際紅文君有故里簾幕海棠風杏披草徑纎纎暎籬門窄窄恍如鳴鳩時村邉幾枝白梅物以希為貴盆梅發寒沍何必江南村横斜千萬樹茉莉雙姝出南海玊質臨風竝都人簪奈花不識那悉茗紫薇移來紫薇花本出紫薇省誰與青瑣郎綵筆照花影牡丹種自曹州寄名仍洛下來東風相入欺得芍藥出豐臺蘭猗猗庭中蘭國香此國士不得貢玉堂言念在君子玊蘭辛夷開未開迎春好時節邈爾姑射人肌膚若冰雪榴榴花拆紅襟花落房多子時聞墮堦聲淋浪秋雨裏山桃山桃花盛時香霧晩冪冪客散月朧明三更遣吹笛菊花不資服餌用何取品目殊但念東籬花九日不可無洋菊八月有黄花坡公謂可怪詎知海外種觸暑園翁賣荷紅芳三十里采采意未厭今來花甚稀柄柄青荷葉蓼汀洲采白蘋道逺不得致對此紅一叢江湖𣺌幽思剪秋羅佳人理刀尺中夜起太息紅剪羅衣裳年年作秋色鳯仙娟好女兒花秋風乍入簾最宜紅透甲先上玉纎纎秋海棠花妥嬌無那莖承翠交委墜露小䦨邉西風危石底百合根作百菡萏葉作青琅玕斑斑赤豹文倒垂花際看郁李常晩尚餘花條繁多倚砌悵然獨懷人戚戚逺兄弟夾竹桃似桃還倚翠似竹更依紅海外仙山物温台落手中夜落金錢金錢夜夜落不抵一錢看借問張公子何如逐彈九萱金質挺炎辰薫風日披拂袪痗苟末由萱蘇爾何物藤得時各葱蒨託根迺參差穿籬復絡石不得挂髙枝葵耀日如摛錦傾陽毎上堦時來和露折佛日有清齋秋葵獨摇金盞側淡著鞠衣黄洗盡風流態宫人入道裝芭蕉簷端心不展窗下隂常寂莫待夜霜侵慣經秋雨滴杜若花疎風下上枝弱雨離披杜若芳洲畔名曽入楚辭牽牛碧花罥籬落秀色紛偃蹇歛時日欲烘開處露猶泫玉簪脩纎白玉簪美人理雲髮散為六出花遥映三秋月雞冠軒然岸雞幘聳聳長身直笑爾鶴頭丹焉能備五色萍盆池萍忽合緑水自生肥時復驚魚闖由來有絮飛薜荔移根甫徑尺枝蔓忽縷縷不記上牆生莓苔足秋雨月季四季有藂花風前月下俱寫生南劍老添入錦堂圖虞美人今作原上花昔為垓下土似聞楚帳歌猶作虞兮舞刺蘼粲粲黄荼蘼隨風毎低昻似念攀折苦棘刺以自防扶桑憶昔日南花猩血染如一愛此扶桑紅一紅經百日夜來香白日車馬喧朱門酒肉臭所以暗香來多在夜涼後雁來紅掩冉曲籬旁深紅間淺黄殷勤語來雁慎莫帶㣲霜忍冬藤纒跨巖谷不與衆草伍保爾嵗寒心忍兹霜雪苦南天燭八尺紅珊瑚如意一聲碎化作匀圓珠風雪小山背蠟梅香浮金蓓蕾色謝玉肌膚破蠟迎春日江梅先得無左闕門外雨中清池一道漾漪漣左闕門東太廟壖碧葉始生初夏節紅衣今落晩秋天采蓮歌斷佳人唱踏藕船餘稚子牽行到迴塘聞雨滴西風衰髮正愁邊中秋是日閒貴人之䘮金波澄處玉輪圓只少些些脆管弦涼冷影初沈皓魄鏗鍧樂已罷鈞天隂晴帝里同鄉里哀樂衰年異壯年佳節尚憑公等在醉吟直到燭花偏時九沙南指兩翰編西亭水部峙公雪子兩文學在座送劉咸珍歸里子病憐新愈吾衰送此行九年為客意一月到家程旅雁秋來影寒潮夜落聲知添他日淚泉路渭陽情薄聿脩學士使還言山左李中丞酒間忽聞濼口商人將醵金上壽即於席上作教禁之方對客揮毫時歌者音律稍乖必為駁正周公瑾之流其才不可及也作一篇為寄笙歌幾部沸華堂條教親裁燭兩行心念民疲如杜母耳知曲誤是周郎千夫帳下麾幢繞七字毫端翰墨香中丞號能詩聞道翁歸備文武再承天語在明光歎上嘗嘉中丞為文武全才者再重九前一日文湘侍講艾堂宫贊蒼孚農部西亭水部思敏侍御聿脩大令元溪員外峙公雪子文學枉過小飲足盭妨閒步朋來慰索居庖厨未嫌薄文酒自相於雪片分魚膾金膏溢蟹胥敢云同俊味聊當摘畦蔬細細雲初破悠悠月已中嘉辰明日是欵語故情同可有登髙約應憐避俗翁杜詩陶潜避俗翁呼童種黄菊肯遣沒蒿蓬客散後又成客去仍無睡書抛復寡歡一燈聞雨滴半臂怯風寒青女行除架黄花漸入䦨衰遲逢令節感歎此身單重九聞道傳杯不放杯重陽令節菊花開霜清佛閣人頻到水淨龍潭嵗必來十年前每重九率于慈仁青毘盧閣及黒龍潭登髙老大登臨少筋力賔㳺觴詠嬾追陪綘囊佩得還隨俗好為衰年更壓灾丁巳春至旃檀寺忽忽四十二年迨今己亥冬偶重過此感思舊事如在夢中鈿車香騎寺門前白晳當時好少年誰省王城春似海一枝壓得玉花偏送翁聿脩大令南歸兼寄尊甫蘿軒同年酒香臘甕歳方徂去若登仙子甚都鳧舄春來仍入洛蓴羮秋後毎思吳四山迴合雲藏寺一葦空濛雪滿湖寄語蘿軒老居士不妨潑墨畫成圖元日次盧舜徒光禄除夕見貽原韻太官初識膳膏香三署兼司陛楯郎帝念清卿官特拜人知勁節薦交章冠軍舊徳曾燔契光祿新銜合築堂光祿堂見歐公記政事趙張誰可繼更誇文采似班揚蒸壺約素自家風居損持盈道更冲心薄浮雲時態異義鍾老柏歳寒同韻無適俗思元亮力不因人笑子公正旦九衢車馬散冷烟濕雪寂寥中燈夜與文湘西亭介夫峙公雪子小飲餘寒猶自閉簾櫳手撥深爐熾炭紅門外䙰褷三日雪竹邉掩冉一䦨風嵗時挑菜佳辰過燈火傳柑舊事空賸剪青蒿與黄韭天涯差喜故人同曉起夢回特地紙窗明三日風篩雪未晴賸有烏鳶蹲凍樹了無燈火閙春城詩人㶚岸朝酣酒猛士闗門夜斫營我老但餘癡鈍坐玊山空照眼崢嶸海棠六絶句窺簾無那醉嬌何北地臙脂寳靨多猶自穠華帶鄉井浣花牋色錦江波不須施粉更施朱宋玉東家態不如乞與春隂好將䕶長紅小白半開初兩株紅艷十分匀先後開時各鬬新底事春風不相見邢夫人對尹夫人天姿富貴許誰同粉態珠光一片融任遣詩人笑麄俗小桃㸃注出繁紅今年花發昨年枝光景流連又一時未必綵雲飛便去也應玉笛晩休吹祝釐日日上經壇常恐花時倐已䦨夜半明燈圍院落更留好客勸勤看明日又作一篇爛漫春城看似無碧雞坊裏敵千株憑誰貯汝歸金谷可用移家就石湖曉日烘開紅蓓蕾晩風褪出雪肌膚未教綺語删除盡禪榻茶烟笑老夫花下晩將淨眼覻無方偶逐天花即道場判與色香新世界劃開鶯燕舊封疆濯枝雨喜連朝潤颺幕風驚昨夜狂石上落英紛不掃㳺蜂冶蝶漫奔忙王帶河少司空餉餅四十枚作歌蒼龍昏見時正陽涼風如秋塍隴黄千村碌碡鎌鎩忙霏霏落磑天雨霜爛然瓊爢照筥篚佳人洗手朝入房雕盤細瀉銀缾湯女丁婦壬互劑量小團月出户東廂春綿秋練方法良漬疑鶴髓貴莫償薄如蟬翼輕欲颺炊裂十字進髙堂近賔宻友懽未央老饕念我還分將磊落四十如截肪華山玉屑細有香梁甫銀泥白更光豈敢汙汝羅酒漿清風茗椀聊試嘗重樓十二弛㦸防委輸華葢掩太倉絳宫真人壽而康下有童子舞黄裳紫洲小姑莫漫狂白石潄琢無堅剛靈根顧視猶未亡温淳此味詎敢忘誰其遺者瑯琊王飽聞設食齊殊芳鄒平況自有憲章平生說經笑公羊軟美便思老是鄉口腹累公豈可常請從秘苑求其方藤㕔花時偶作文書堆案眼從遮不記藤隂日又斜滿架丰茸綴纓絡兩株詰曲走龍蛇似聞西省新栽竹劉貢父事空憶東堂舊種花東坡詩玉堂隂合手栽花六七年來幾閒日風爐雪乳一甌茶題李曲江少司馬戎裝出塞圖先生知國等知兵擐甲龍沙萬里行冦子翼真宰相器輦車驪駕歴詩營庚癸從無一士呼平安火直接神都英姿颯爽如褒鄂曽在凌烟貌得無庚子五月初三日復過法華庵仍用前韻驚嗟歳月去如流三度風潭景物幽古佛寳坊臨水尾相公樂府換歌頭李文正公樂府最傳扵世庵即文正别業地也百年刦火燒應盡十里肩輿倦且休㸃㸃綠錢南浦上雨來蕭颯便成秋五月十四日夜露坐髙林晩露寂不喧短籬疎花幽自翻何當羽衣入舞砌豈有啄木來敲門穿池華月光下上㧞地蒼石隂朝昏松風茗鼎横一榻道人於此真忘言雨亭制府郵示元夕駐師金沙口上詩作一篇奉寄先生廊廟英器資備文武西南天萬里前席授玊斧百濮心綏懷諸蠻手摩撫陽闗絶徼外一夕響鉦鼓犯我屬國疆至尊赫斯怒親分賢王鉞特開元帥府日入崑崙西拓此河湼土沿邉列戰格滇池實門户拜表即出師師行若時雨軍無呼庚癸士毎共甘苦刁斗厖不驚幕井民安堵慷慨取金印從容揮白羽儒者有此人如方叔召虎兵家貴間道我聞諸前古縋蜀自隂平叩闗由子午騎或一敵萬技料三當五鈎撞百道攻鼓角九地取書生好説劍文吏恥負弩雖借帷幄籌恐無尺寸補先生真國士才與管蕭伍㑹須斬樓蘭未用招贊普金沙暮江口燈火繁星聚葡萄塞上杯勅勒軍中舞是時上元夜喜氣融諸部煌煌南極光煜爚眼親覩雪山界天末列障翠可數新詩競傳寫清風頌吉甫豈惟壯士歌行見樂人譜庚子立秋炎毒何當休纎絺汗猶浹西風颯然至涼意欲動篋滋味覺鮮新衣裳初熨貼是時秋之孟四見蓂生莢五行迭休王勢若驟凌躐蓐收令始肅龍火氣已懾伊余抱煩痾一體互莊蝶憂虞理應遣暇豫生可攝憶昔槐弄黄鄉選甫懷牒蹉跎四十載衰白遂滿鑷懷新情依依感舊歳劫劫偶然設茶𤓰思與賔侣接髙林變蟬嘒長廊響行屧雅言賦新詩逸興求醉帖昨夕哉生明一鈎挂壁頰未嫌歡意減已覺秋懷愜中庭落梧桐深巷賣楸葉鄉心逐兒女那得渡江楫雨中喜扆再自潞河歸見訪颯颯雨侵軒沈沈樹隠門棗垂烟外重荷集晩來喧潤始霑衣桁涼宜近酒尊欣逢故人至一夕共清言送徐亮直編脩奉使册封琉球黿鼉梁已駕東瀕寳册光華寵命新受吏逺來滄海使宣風暫借玉堂人神魚跋浪迎旌纛仙草環洲集鳯麟一品錦衣歸獻夀此行最喜是娛親憫忠寺後院霽景髙林外幽房曲逕過雙扉開晩照百尺見懸蘿葉葉含風細枝枝得雨多翠帷紛在眼彷彿到山阿十月四日樸村晩過菊下小飲又逢雲物晩秋澄去歳黄花今歳仍小墢疎􅎉香冉冉髙枝密葉影層層那能留眼看朝暮空自縈懷到寢興向夕一弓明月下故人偶至為燒燈十月五日由徳勝門往湯山接駕雲樹迎仙蹕人家近斗魁晩烟横疊翠落日漲飛埃蹔逐羣公出行穿萬馬回廿年思扈從無復舊鄒枚清河野望夢回兀兀復騰騰洗眼青山看幾層指㸃興亡飛鳥外西風衰草十三陵仙女堡行威弧幾時落旄頭松州雪嶺猶防秋仙女堡當轉粟道仰窺千仞俯九幽㟢嶔一綫險莫儔雨淋石滑行人愁馬蹄忽蹶徐縣尹下與萬里長江流妻兒淚應猿聲落苦怨天髙鬼神惡漢家嫖姚方少年蹋踘軍中正為樂湯山接駕羣玊山頭雪未殘丹砂泉上不知寒載鳶已見前旌過捕虎遥從後乗看星亘五營天列仗龍騰八尺帝回鞍睿容有穆臣寮喜伏謁鑾旂第一竿十月十日自湯山迎駕歸夜宿清河閒雲一片本來輕野鶴孤飛不算程原上歸人斜日影枕中鳴轂曉鐘聲濁醪屢酌煩村叟嚴鼔稀聞近禁城三十四年流電速屬車塵後老書生清河橋上偃月形斯壯垂虹地本靈禹功通澮洫漢苑接郊坰風漾寒波白山銜落日青酒壚頻歳到衰髮感星星送成絅齋出使安南使星先入日南天朶殿新看詔㫖傳九譯葢幢來白雉百重樓櫓望朱鳶林風箐雨山稠疉峒獠溪蠻路接連萬里何人諭威徳此行端藉玊堂仙題李文正慈恩㳺詩巻後即次原韻有序予同年白君彦京以茶陵李文正公慈恩㳺詩卷自陽城寓書寄余余視詩末題署正徳九年甲戌作為公致政之二年而詩中流連景光沈吟老大詞㫖悽婉文衡山為之圖題曰西涯圖喬莊簡跋云寺之後曰西涯考公懷麓堂集有西涯雜咏十二首第四篇即慈恩寺其他如楊栁灣鐘鼔樓四詩中亦互見則慈恩寺在西涯東西涯之名所由來久公因以自號今亦不復能識其處公詩首篇云幾人城市此曾逰又云城中尚有山林在集中重經西涯有云城中風景夢中路又云禁城隂裏御河西慈恩寺偶成云城中第一佳山水則西涯之在城中無疑日下舊聞載淥水亭雜識云西涯有李長沙别業考其地在今徳勝門西予近年徃來湯泉數得經過見風漪彌望直接徳勝橋而東水物可愛有法華庵在其上意其為當時之西涯所云積水潭海子亦即此地但相去二百餘年不特琳宮佛屋灰刼無存而圖中所有喬木蒼巖長橋斷岸亦不復能彷彿矣莊簡又云西涯公嶽降地公詩有淚㾗應共水俱流句又云撫今念舊為之愴然集中如禫後述哀云應謝西涯舊時栁泣風愁雨共依依又重經西涯云淚滿宻縫衣上線又云愛日慚非稚子歡又云慟哭兒童釣㳺地白頭重到為何人則莊簡所言信有徵矣至淥水亭雜識所云公有别業在北安門外或是生時所居非别業也集中有李白洲侍郎督復西涯舊業詩云三間矮屋一重樓則非莊墅可比其他若重經西涯云綠野無堂正憶裴又候馬北安門外㳺慈恩寺詩云十年一到竟何能又重經西涯云重來又隔幾寒暄又宿海子西涯舊隣云東陵舊路元相接若果别業尚存何至隔幾寒暄經十年不一到即令止宿何用舊隣推此而言不但無别業並生時故居亦久廢矣文衡山載公遺事罷相後設客至不能具魚菜風操如此豈能更為平泉木石計集所云督復舊業者始終未之復也流覽感歎次韻一章池邉老鳯肯回頭㳺在正徳甲戌公已致仕樹裏驚烏感昔㳺劉謝並時同國論李何别沠異詩流蒼茫野水圖猶在散落遺文集未收慈恩㳺詩五篇懷麓堂集不載今日更憑誰指似三間矮屋一重樓詩成意猶未盡又作四絶句兒時㳺釣頻經處幾度垂楊信馬行玊果可曽分四座金環似省識前生裴家宅裏秋天鶴房相池頭雪色鵞誰似幽居無一物門前贏得好烟波成𢎞館閣數茶陵一代詩家無幾人可惜當時集賢院不曾寫得樂天真宏長風流在鼎台一時門館盡英才諸生尚有東南秀未到平津閣裏來文徵仲圖上署諸生庚子十月二十八日盧光祿舜徒六十夀小詩一章以叙朋友契合之情非世俗頌禱語也論交不在早但取意氣真君看青松枝何必桃李晨金石性不易芝蘭香宜紉我晩得益友頭上白髮新邂逅杯酒間情等骨肉親澄明抱霽月豁達排秋旻承家與報國恃此清白身子仕州郡日名已動縉紳酌泉新安江大好山水隣父老愛劉寵里閭思冦恂司刑來三吳泣玉明且仁滇海脂膏地俸不贍親賓歸來太常齋甑中欲生塵忌者不謂爾䜛口信狺狺帝庭十二閑騢駱驪駵駰傾家營一豆不救武子貧至尊洵亶聰拔擢驚無因名卿重清節豈曰算錢緡念子耿介姿在物無緇磷飄瓦擊不恨虚舟觸不嗔疾惡雖如風無心恩怨冺緇衣好賢什兹意常周諄三哺必佳士一飯無俗人退食插架書浩然渺涯津鏗鏘發宫徴筆落疑有神居貞心匪石守道節貫筠六十今始滿堂上夀酒陳富貴取大槊功名畫麒麟二塗宜何從一笑無邉春立春日忍病舁至書齋縛箇籃輿茗椀隨南齋又到覔春時栁條未弄悠揚態桃蕊初含蓓蕾姿雪陣江天茅店酒梅花人日草堂詩病中只有思鄉夢官職聲名兩不知院中齋宿紞如街鼔夜將䦨樺燭烟銷夢向殘衰病久知曹事廢優容真荷國恩寛太常曾視芬芳具漢書五畤無牢孰具芬芳不備予辛卯為太常卿壬辰改翰林學士法駕頻叨侍從官聖主為民祈穀意屬天爟火在郊壇懷清堂集巻十九
