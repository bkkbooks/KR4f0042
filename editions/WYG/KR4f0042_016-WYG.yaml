body:
  text: 懷清堂集巻十六吏部侍郎湯右曾撰槐與作西清故事傳槐龍舞翠後堂前隂濃布葉五六月㭬杙空腔幾百年樹古幸無人剪伐地偏不受物糾纒晩涼風露齋居夜影在中庭月在天以一尊送獅峯先生釀出中泠水分張揚子城百壺殘嵗買千里小船迎紫蟹霜添味黄花夕綴英送君明月夜不負景山鎗輓履公履公昔少年意氣多感激追逐幽并兒馳騁游俠窟常跨追風騎時穿沒羽石一朝忽大笑脫去頭上幘言從釋門老屢登角巾席談義入空空遇事猶咄咄曾同孫叔處三上賈譲䇿參問北寺囚擁䕶南冠客至今稱義士方外棄可惜我憶初識師江上月初魄畫灰仙洞古煨芋山樓夕雲水自此分懐抱終不隔前年到京國告我將逺適我謂師已衰是處可飛錫龍門蕪沒久寳地我所闢請留香火社冀踐支許跡靈山草亦香仙源水更碧三年彈指耳禪老倐已寂秋林剰遺蛻雲海無留翮前生憶君房後㑹話圓澤餘此露電身衰淚猶一滴癸巳重九前六日送吳紫莓南還清遊山水間日念從故人故人翻就我豗蹴十丈塵此來問何事廿載觀國賓泮宫芹可採弟子行侁侁可憐苜蓿盤不救博士貧矧聞中臺選比嵗多積薪明朝告我歸秣馬膏車輪霜天雁行逺籬落黄花新恨不從子歸說歸已苦頻譬如畫地餅欲噉知無因薄田亦可耕釣竿亦可緡所惜江海上未易著此身飄飄白鬚翁歸與靜者鄰兒郎立門户文筆已足珍西湖天下景妙絶無冬春應共王與章游賞昏及晨上為衝風翼下為潛水鱗飛沈定何如此義難具陳送朱旦平南歸客中送客逈添愁歸及江村事事幽經嵗旅程嘗並馬往時仙侣憶同舟謂乙酉扈見蹕楊州始相時湖聲蓮葉堪銷夏鄉思鱸魚不待秋應念梁園詞賦地白蘋風起更重游蚤春書齋趿履行仍輭褰衣坐毎偏梅花初臘月栁色半春天冉冉旋移籥悠悠忽到年漸看芳意動物態各欣然題蔡雙瞻勸耕課讀圖田歌未必便知田才地烏衣覽舉先歸及清溪花繞屋稻香十頃在門前六詩三筆駕諸劉腕脫兒郎未肯休他日讀書花嶼上老夫還為阿戎留三月二十三日入藤花􅆹花事將闌矣一年容易及花時待到花開㸔較遲旬餘在壇萬夀經槐栁隂中春已老燕鶯聲外蝶先知綠雲片片將成幄紫玉條條尚綴枝三百年來遺事盡花為吳文定公手植風流留得在曹司遂寧冢宰有作因次其韻緐英宻葉自年年常在朱䦨碧檻前罨畫溪從新竹繞罨畫溪兩岸多朱藤許渾詠紫藤云家近江南罨畫溪平泉潭共綠蘿懸李徳裕有思平泉潭上紫藤詩龍蛇屈曲盤空上罽珥丰茸壓架偏豈敢對公終不飲用包孝肅羣牧司賞花事惜花較似醉差賢冢宰又有綵衣亭藤花詩再次其韻曾聽三霄鳯響清翛然鶴骨本來輕天教國老顔長駐太公年九十餘康健如少時去年春曽來此人對花枝眼倍明簾外似添香百和鬢邉能掃雪千莖常春藤使白髪還鬒見唐書劍闗西望頻回首忠孝知公萬古情甲午首夏送楊且園之江西司馬任竹林前㑹共裵回謂于役懐州時京國重逢酒一盃自昔荀陳傳地望於今覽舉識門才詩題嘉祐江亭好官佐鄱陽秋月來李白送弟赴鄱陽司馬詩期此秋月滿石藏山頭茶泛乳千峯翠色越窑開浴佛日拂地簾垂淨几塵髙槐影落鳥聲頻偶思浴佛方今日自愛清齋亦舊因湖上放生誰入㑹山中燒筍欲嘗新諸天更乞曼陀雨為洗紅埃熱惱人時久旱故云題宋喜起晴川望雨圖使君昔登黄鶴樓晴川極望空悠悠使君復上晴川閣重向樓中招黄鶴江漢交流清復清髙桅大艑漢陽城蒼然暮雨洪山路猶識使君吟眺處又題晴川望雨圖手挽二石弓目識一丁字大笑兩不如刈禾田家子田家望嵗嵗屢豐菖蒲葉綠桃花紅村南煙舍許我同亦擬村南買煙舍子孫相約事耕耘義山句歸當與子成兩翁送髙則原之永寧同磵房作連山古洛陽勢盡西南傾熊耳更巉絶削出永固城邑承詩禮遺見范文正公志俗少錐刀爭年來嵗苦旱十室九不耕頗聞窮谷中時有枹鼓鳴問誰職撫字而令盜弄兵詔下得賢侯抃舞走孤㷀袴襦足我衣芋豆飽我羮從今得休息豐嵗餘笑聲子有國士風竒節自夙成讀書十行下不取博士名䇿中甲乙科詎曰鄉里榮廿載游俠窟鞍馬從幽并南浮踰江淮海風彯縵纓手定溝洫志身載樏輴行幕府資俊賢鑒洞心更精旁搜百家術獨徃萬古情我小同里閈結愛弟與兄中間幾聚散如月有虧盈去留雖殊趨喧寂無異營兹焉重送子暑雨方淙琤前望洪河寛取途舊汴京單車轘轅道嵩少紫翠横子雖未到官父老歡相迎瑩爭明鏡徹潔愛寒泉清期子數年中手當把麾旌男兒濟時了官爵脫屣輕歸來尋二老茗飲同柴荆謂予與磵房惠休耽佳句昭畧非狂生題阮于岳少司空羅浮香夢圖先生夢到羅浮村萬株玊雪摇清芬蓬萊宫中綠衣使一片化作朝飛雲勝情髙寄今安有蠻榼三升花下酒雙羊路入讀書堂借問南枝著花否梅都官詩風雪雙羊路梅花山下村在宣城西南題廖長林少司農小照華纓寳帶鎮隨身白石清泉夢想頻那得蕭閒遽如許未妨自寫集賢真參差玉樹已連叢豈獨黄門有父風添我圖中老賓客尚思酒食溷秦公查浦移居作一篇代柬宅南雅與栁郎親去作青楊巷裏人命駕便如千里逺望衡猶記兩家春朝昏步屧前真懶風月談諧後要頻祭竈有期應召我不論新舊總比隣過查浦新居疉前韻欣然掃徑得情親坐覺清風逺趂人竹葉一叢還聽雨荷花六月可留春暫休簿牘歸差蚤未厭茶𤓰到肯頻咫尺雖嗟門巷隔他年終作五湖隣送方文輈之官豐潤時六月朔百里郎官永濟鄉六街同聽雨浪浪不論䆉稏秋田熟已喜臺符免捕蝗醴泉一酌夏應寒圖經醴泉鎮其北豆飯蒸壺愛長官我笑汧陽未知味定無餘想到猪肝地産猪肉至美故戲之立秋後一日愷功都憲苑西别業觀荷偶得六絶句同查浦侍講作依舊城南韋曲遊芰荷香裏入汀洲水邉已有泠然意今日西風昨日秋平泉草木手親栽十頃風荷爛漫開閒倚水晶宫館立待公那得便歸來優曇妙句析塵空都憲有園中白蓮花詩至工轉語還思舉問公等是千華避顔色未須愛白更嫌紅嫌紅種白蓮見長慶集蓬池並賜鱠芳鮮隔嵗槎浮近斗邉最是閬風西閣上下看萬葉盡田田去年閏五月十九日在塞垣請偕旨歸京師特命再留一日次蚤都憲西召入行宫湖中觀新荷時嶺晨霞閣登望最盛分吟猶記繞池行去年六月花時與悔餘來㳺竟日各賦詩二十一篇采采江南贈逺情今日平津池上客好詩誰繼白先生樂天有裴晉公集賢林亭即事詩來看一度一華年浪作琴髙水上仙直待波心千葉碧出麻姑壇記㑹應蹋藕也如船初秋蔗山給諫招同查浦侍講退谷宫允勉齋侍御小集石幢庵巋然削出此香臺恰在蒹葭野水隈一夕肯抛明月去廿年猶共故人來因緣舊夢銷禪榻觸迕閒情付酒盃九陌歸途正燈火少留未用僕夫催題呉孝先垂釣圖冰雪丰神巻裏㸔綠楊絲外暎青欄五湖儘有閒風月留取松陵一釣竿八月十三夜相湖招同天門學士緘庵侍讀聿脩宫贊蔗山蓼亭兩都諫小飲王文靖公怡園偶話舊事感歎有作朱門幽寂似巖阿璧月圓來兩度過前月十六夜亦集此今日城南韋杜少舊時池上管絃多花經晼晩驚秋未人顧娉婷奈老何頺郤玉山抛寳盞不須重唱百年歌題酉君侍講梅竹圖偶攜東觀仙人筆閒寫西湖處士花猶恐此花偏寂寞數枝添得竹横斜幽光艷艷猶含凍勁節森森未放春愛爾歳寒雙益友要從冰雪鬬精神為介夫題文徵仲西湖圖即以道别水雲光影接樓臺淨拭菱花鏡面開笑我州人如寄客十年一度此中來予自丁卯去湖上丁丑一過乙酉再過今人十一年矣幾隊笙歌載酒行白頭無復少年情時時夢到湖心寺浴佛前期為放生二十年應無此湖東坡奏狀中語沙填葑合水將枯何人更似峩眉老添得長虹一綫無年來湖西南葑草彌望沙又日漲較宋元祐時更甚若扵舊隄増庳為髙加廣數尺人不勞而費省子歸先合到吾鄉五月風漪菡萏香定有新詩嘲杜甫西湖涼較鑑湖涼注水小池煙翠三峯石清泠一勺池映巢窺雀鷇出水戲魚兒細引泉分筧新牽荇作絲輕冰終夜合待暖曉還澌數尺俄成沼三峯欲出雲斜能涵月影細亦蕩風紋漾漾苔磯沒淙淙竹筧分紅魚穿碧藻來徃若為羣苑西聿脩學士新齋幽棲如小隠把巻有餘歡閒寂人三徑丰茸藥一䦨幕褰風掠户瓶汲井飛瀾定有郊居賦何人始解看藤㕔花事較去年殊減紫藤隂裏重婆娑花事匆匆倐又過白侍郎來嗟老矣杜樊川至奈春何赤衣貴仕塵中夢青鬢流年水上波等是容華易銷歇轉思開少勝開多安溪相公養疴蒙恩日賜玉泉山水二器葢異數也為賦八章螭頭清寫足蠲煩中使頻宣詔旨温天下水泉三億萬更無人得酌仙源閒徵故事古來無萬口流傳滿上都爭道相公清似水故教日送兩宫壺流膏普潤徧桑麻開府畿南澤未涯今日民心合天意固應宣賜到公家仙盤欲浥金莖露夏簟思分玉井冰何似昇平黄閣老一泓靈液掃炎蒸瀛山甘醴帝臺漿異數長留政事堂一片清襟照冰雪泛來花乳古匳香連筒逺引山家趣置逓遥分水驛程公自無心隨萬物琉璃一鏡本虚明異恩殊渥迥無倫康濟應先報國身東海平分千斛水憶曾宣勅到波臣徃嵗取上嘗命􅀈傳曰海水賜公淄澠分别定誰賢一線休爭水脚先萬頃何從測涯涘似公涵得性中天三茅觀舊作禇書曾共鼎鐘藏六甲天符忽取將宰相憂時有何事金籠蟋蟀半閑堂家望衡太守七十生日毎憑問訊尺書傳鴻雁分飛幾嵗年小憩棠隂㽜海外舊栽松樹老江邉婆娑春社三杯酒䆉稏秋風十頃田且把官曹付兒輩令子懋綱需次員外郎先生真作地行仙雨行城下豈敢稽公事泥塗畏此行綸書排日下朝鼓應雞鳴苔長侵牆色河添放牐聲今年霪潦晩天復幾時晴夕涼夕涼移榻近風櫺籬下秋蟲露下聽月落西廊人靜後小池螢火逗疎星題三竹圖凌雲千丈勢小筆疑可掬遥寄北堂人森森䕶慈竹乙未六月二十二日偶成吾廬自好畫隂隂況有清風時出林滿院朝烟涼氣襲平堦夜雨水痕生乍開舊帙除殘蠧未散餘香戀故衾賸得些些惆悵處五湖三畝欲歸心秋來塵中昨夢黯然消海燕暄涼意欲超展罷小屏香冉冉坐來大樹影蕭蕭毎思抽筍添林竹苦愛看花種藥苗三嵗秋風團扇裏不須惆悵自今朝次韻總憲李公雨後慈悲閣觀水不妨冐雨復嬉晴㶑㶑當階水漸平為問西風知幾日草蟲籬落已秋聲蒼陂面面足延襟白袷輕寒雨氣侵忽憶跳珠萬荷葉一篷遥泊太湖心抛來浩刦失前塵予戊辰秋僦居黒龍潭下魚鳥依然識故人仍到龍潭看飛雨一年惟此最佳辰香門百尺䕃疎槐新築蘆塘荻岸隈他日山翁肯同醉蹋泥衝雨試重來小池上竹作屏風花作藩一泓剛對綠蘿門水涼池面新秋影苔漬磯頭舊雨痕疉石㑹應藏曲折引泉正愛聽潺湲曉來唼喋菰蒲上二寸紅魚是小園眼疾坐想金箆刮膜難生憎玊屑眯雙丸經旬酒盞疎勤把累日書牀廢靜觀障礙風燈吹不滅清涼月露洗教看待窮目力三千界變幻湏㬰一指彈題王儼齋大司農横雲山莊圖勛名直與古為徒邱壑從知道不孤瞥眼由拳郊外墅平泉木石輞川圖蚤分霖雨到人間棟宇煙雲日徃還指㸃玊屏金柱好共言申甫此家山生綃一幅武陵源曲浦迴塘欵乃村明月三更淞上笛芙蓉九朶恰當門秋來紅粒夏青秧十里平疇秔稲香也是午橋裴令意要將餘興㸔農桑誦法平生孔與周講堂㣲義足研搜蚤聞别沠驅楊墨一疏江河萬古流清言問答寄樵漁博物髙文味道餘池上詩情許誰似一船雙鶴白尚書煙波㸃㸃出帆檣咫尺仙家浮玉堂好手為公摹寫得太湖三萬頃波光經游謝墅十年中惆悵横雲目未窮今日江南好樓閣紅菱雨過白蘋風啟心造膝荷殊知特詔温公書局隨獨樂園中最相憶合先鱸膾次蓴絲泖橋波細澱山春他日追陪杖履親只恐調元黄閣老五湖未許乞閒身聞退谷中允園出清泉奉訪有作幽居人似在青山窄窄松扉靜不闗鋤菜已欣新甲長種花聊趂晩秋閒心依豐草長林下家住廉泉譲水間澄碧一泓深見底尚留蒼翠古錢斑懷清堂集巻十六
