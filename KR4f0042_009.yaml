body:
  text: 懷清堂集卷九吏部侍郎湯右曾撰次韻答焦飲百年不待羊胛熟浮世風輪空轣轆與君得間即相覓何用陳遵留尺牘憶昨春官共上時杏花寒食炊餳粥蘭臺職司亦何有十載堆盤飽蔬䔩精神虛費空自笑螻蚓蛟螭雜篇幅酒人未散燕市中荆卿悲歌漸離築夜闌燭跋軟語接往往屏風觸倦僕前年君過南海南五嶺清猿繞雲木蠻江風雨我歸楫自著短衣歌獨速爾時相望不相親空有離懷常在腹帝城聨袂杪秋節采采黃花不盈掬方期尊酒同歡娛豈意驚颷變歌哭勞生自歎扣莊缶愛弟何心賦賈鵩相看憔悴銷壯心誰念虎頭飛食肉浮雲變滅根塵淨香火名山願己宿連天風雪常閉門不礙打頭低置屋佟鍾山副使將之鳯陽出所畫見貽賦此道别凌凌懸秋光秋聲撼我屋忽驚尺素到秋色俄滿目霜中萬木脫一叢抱寒竹離離危石旁幽花媚黃菊使君貽贈我厚意勤所朂要令歲寒姿臭味同草木豈惟妙墨少兼有新詩辱綢繆契分深文雅襟情獨西風迫重九清曠邈川陸離杯出城南數别日己促鍾離建吳會壽春枕淮瀆中丞持節時十載風轉燭羊公碑石在士女雜歌哭今來得使君遺愛繼前躅人才備文武出郡志民力恤杼軸自兹為政間轉令幽興熟清香餘燕寢白日稀吏牘過江六朝山方寸紙可縮冶城超世想染翰風謖謖應憐埃壒底逺夢繞林麓清遊未可同勤當寄尺幅先太孺人忌日四十年來淚眼枯斜陽望望斷殘蕪筵前每羡探懷橘林下常悲反哺烏馬鬛封卑憐宦薄虎兒才少覺身孤傷心遺墨巾箱久零落藝香半有無先太孺人手書詩集久存笥中微傷蠧蝕近復籖整對芋年時自慘悽遇鮭當食更酸嘶半叢苦竹寒泉潄一樹冬生故壠低鞠􅛏追隨傷愛子珍新料簡失賢妻每當露泠霜清日猶似兒時失母啼次韻赤抒題西齋新居兼柬戴占弼買宅應須更買鄰南園北曲一時新支分茶竈清間地位置書牀淡蕩人客到每吟嘉樹好醉歸何用長官嗔就中斗室香濃處合有桃花玉洞春赤抒枉約城南之逰會雨不果悵然有作曉霧冥濛雨漸晴幾回惆悵繞廊行己辜韋曲看花約空憶章臺走馬聲風磴隔年醒宿酒水亭他日聽殘鶯思君簾閣間慿處不少傷春懷舊情題朱文盎月波吹笛圖不知何處最髙寒萬頃光中白玉盤倚出秋風一聲笛青天碧海總漫漫可惜征衫依舊青仍攜鐵笛過江亭潯陽西上方空濶定有蛟龍夜出聽早春過碧山堂蓓蕾花枝凍未抽暖風行壓百花頭魚龍戲裏看燈影鵝鸛軍中鬬酒籌入座迥含今古意懷人别有管絃愁不須惆悵東闌雪始歎年來似水流宴坐宴坐焚香亦自佳山靈物色到幽齋一峯秀割剛當户老樹根穿欲迸階農圃心情間甲子壺觴風月舊朋儕緑莎行徑籬門裏好語吳中寄筍鞋聖駕幸闕里恭紀古有崇儒禮今方論道年文明光上下聲教被垓埏理契軒圖始功參姒範先無為皇建極有縱聖希天絶學思洙泗遺風尚管弦纍朝勤爼豆六代備宫懸至德涵無始元符叶自然靈襟三殿裏寶思五雲邊遙接翔鸞步親分繡鳯韉風雷環宿衛鄒魯睇山川入徑圭簪肅登堂金石宣晬儀回葆吹展事益瓊籩酒挹金盤露香分玉闕煙羮牆宸思切雨露主恩偏特下期門蓋頻頒太府錢殊榮分後裔曠典及先賢鳬嶧新封雪滄浪未改泉市添槐更密手植檜還圎睿藻星辰麗天題琬琰鐫百王歸凖則萬象入陶甄相圃觀風俗雲臺錫土田共欣時履泰方際位乘乾盛事輝今古髙詞載簡編賡歌逢景運短筆更裁篇恭覽御書篤志經學四字賜韓侍郎為作歌金壺瑶札貞觀年神豪飛灑如雲煙清風美德近臣賜寶貴何啻青瑶鐫雍熙淳化變朝體摛染所及神明全攀車受貺繼前典儒臣蘇李恩猶偏明良際會魚水合翰墨照耀星辰懸方今聖人軼三五文思至德苞坤乾九州焜煌八表格倬彼雲漢賡詩篇墨花泮渙邈天上人間風月何由傳春官宗伯起吳會退之永叔知誰先九經縱橫森武庫百家傾瀉流奔泉猗與國楨鬱梁棟寂與文士窮丹鉛遺文如見伏生語奧義欲廢康成箋公卿大夫重經術文儒致用非徒然殊恩自得稽古力異數不問官曹遷忽頒四字燦奎斗嘉乃六籍勤排穿天章雲錦爛五色乍蔭髙棟扶修椽通都歎息傳盛事求觀車馬爭喧闐爐錘萬象羲頡上并包八體鍾王前噓噓雲霧氣騰地蕩蕩日月光流天豈惟筆精更墨妙遙識主聖兼臣賢廟堂從容論道暇坐倚瑶瑟鳴朱弦文章黼黻光册府皋謨益贊簪裾聨慶雲葩郁甘露結時有瑞氣縈珠躔燾冒子孫綿世世永與玉軸琅函編送薑友棠遊東兗即還四明秋氣入東郡感君羈旅心杜陵昔遊地髙李共登臨落日空裘馬寒蕪自古今渡江冰雪後好寄越中吟題黃尊古上都秋色圖落日牛羊下逺村平沙萬馬别開屯君看沒鶻盤雕處莽莽青山是塞垣八月窮邊雪片粗角弓鳴處草全枯上都一片清秋色却是寒林大小圖送九如表叔之太和任花外潘輿望若仙飛來天柱縣門前知君不愛西昌尉愛去間參玉版禪吉安産玉版笋聞道章江接貢江十年幽夢付篷窗洄沿山谷祠前水好寄鯉魚時一雙蕉乍喜靈苗一葉生煙中新翠出簷楹小來己愛橫窗色老去應憐聽雨聲入夜最宜清露洗幾時真見緑陰成寄言點筆題詩客半展斜開信此情病起遣懷四首俗慮從知了不關絺衣芒屩稱疏頑居如潘嶽城三面人笑王微屋一間牆角秋陰黃葉早門前野水白鷗間也知亦有欣然處拄頰西南點點山何妨弊席且教溫味道耽書業力存偶以剪蔬叨地主不曾食肉慕屠門草荒場圃蟲鳴急秋入菰蒲雨打喧從道王城歌吹海一身却傍老農村疾甚清羸暑更加重簾曲曲為周遮病昏目力拋書籍客妙清言冰齒牙兩卷檀弓尋物始一篇秋水送年華日長髙著青油幔好護階除手種花離騷美酒好風神常憶盧郎最可人萬事那容多皂白一生所得是因循亭皋景物秋無主子墨生涯甑有塵暑意漸消涼入早黑龍潭下雨來頻題耕煙老人畫東風一萌芽楚澤幾芳草離離雜石映茸茸出波好洞庭連天見鶩羣子規冥冥啼不聞霏微臺下神女雨縹眇水上江妃雲一幅生綃剪不得春來沅水桃花色碧杜紅蘅亦有情玉簫金管空相憶滿載潭州百斛酒春帆直下麋湖口赤沙青草欲合時雲夢軒然吞八九此時客意殊茫茫驂龍帝子遊瀟湘浮空近見戲鮪影接日逺沒飛鴻行我念前遊恍如失重見耕煙老人筆倣佛君山螺髻青月明幽咽湘靈瑟傳聞石穴潛通吳神仙窟宅誠有無包山雲物閟清都煩翁潑墨還作圖送髙兩詩南歸懸榻故人去論文前會稀驚風還遞響征雁不同飛白夾寒將卷青山久念歸因君寄朋好會采舊山薇休嗟不得意辛苦為浮名落日古原上間門秋草生晚菘和露摘時稼面場平一悟靜中樂深知達者情畫蘭三千年覷玉壺空阿母留將幾葉紅今日人間太零落兔葵燕麥任春風香草爭書入楚詞漫搴沅芷扈江籬握蘭每待春相問空谷無人自不知簡野航晨興入公門歸休午陰寂疏簾靜不卷髙林雨餘滴解帶北牖眠煩暑欣已滌沈憂曠無所冥念淡自適欵户輪鞅稀間坊選幽僻摘芳苔暗徑搆石雲生壁昨宵風雨中杯酒轉愁惕念我同懷者何由展良覿立秋前一日陳六謙民部見過焚香小院氣氤氲寂寞誰過訪子雲忽訝清光映鷖尾又添佳句咏鵝羣新城司冦贈詩有鵝羣句林中解帶消秋暑石上翻書愛夕曛明日西風飄一葉井梧䇿䇿似先聞立秋日顧九恆查悔餘同集翁蘿軒寓齋分賦以立秋二字為韻炎氛何時休火雲􅑬嵼立涼颸忽暗動爽氣己先入一春復一秋年年客京邑惟驚客鬢改催歸日夜急憂生情未免學道時猶及蕭條晚來雨颯颯林表集如共陰蟲悲恍聞孤士泣不樂今何為四序倐復周百川水東注誰能挽西流且持玉巵醪歡言酌朋儔兹日非昨日脫葉初知秋故心一以移兩腋風颼飀親知訪我至許作半日留明燈巷南陌蹤迹真雲浮雨中六首一雨良復佳久雨何時霽欣厭已異心物情故多蔽卜居深巷僻荏苒此再歲入秋暗愁霖屋漏避無計惟餘窗前樹助作風雨勢紈扇委篋中秋衣行當製殘燈耿照壁忽感下泉逝昔在藝閣居日髙猶晏眠今來披簡牘束帶隨衆賢職事敢云疲塵勞遂己牽況此泥活活聽鼓行朝天逼仄九衢中寸步成險艱既歸任偃仰得性復陶然階除蒔衆花不待清池注娟娟洗幽竹羃羃生濕霧新英擢修莖蔥蒨孤桐樹隙地蕃草木間心寄場圃長廊自周行雨點詎知數小兒誦論語琅琅自成趣陰曀何由開聊此慰朝暮生不識杯鐺無緣更論酒區區身後名大笑復何有膏蘭徒自焚金石詎為壽神方鍊上藥欲駐頽年久寸田養黃芽不救白骨朽年年秋井塌望古一搔首抱瘵雖積歲繕性常恬如幽居多暇日朋好亦未疏何來困拳局沒髁街生魚故人數叩門悔餘獨自繞我廬捫竹愛新粉映窗尋故書主人出何事舊雨空愁豫我友尚書郎西齋比屋在西鄰每共文字遊愛踰骨肉親驚嗟會面稀霪潦亦浹旬誰知巷南北邈若江海人公家出入勞私舍升斗貧豈無世患干臨風一愁辛乾沒有時己不負秋與春蘿軒為李寅谷寫秋成圖賦一詩其上負郭二頃田太倉一囊粟二者竟誰可炯炯念自蓄朝叩故人門高堂散蒸溽忽驚秋景滿西成紛在目依依面場圃曖曖見墟曲時稼久己登新酒行可漉年豐無吠犬歲晚休叱犢田父何所云雞黍同近局披圖還太息此是腹中欲王儉語潁上思薄田杜陵覬微祿悠悠秉耒意千載恆相屬秋風有時起歸駕何當促借君風雅筆洗此煩腦毒李侯金閨人雅尚拔流俗平生髙逺性常恐古人獨田園不可期山資幾時足不如南山下種豆及時熟傍舍生煙霏連村入雲木惟應尋二老披草往來數送杜大宗伯歸秀水夕夢青山朝抗章吳絲新點鬢邊霜鼎鍾勛業光前史魚稻心情憶故鄉祕殿從知稀履迹上台猶自辨衣香兩朝耆舊風流在歸日先開會老堂遺榮髙節古無儔深重君恩許賜休剩有書名滿臺閣依然傳癖在春秋先生好左氏傳手自注釋九門祖帳來天上一曲湖光繞秀州徑欲從公輕舸去招呼海鶴狎江鷗過可園簡王敏行郎中寂歷虛齋境更幽不妨無事日間逰窗中密竹風驚夜檻外叢花雨打秋每見草書留几上時來濁酒過牆頭與君雞黍為鄰並暇即招尋懶便休送令詒歸松江去國名何減還山意有餘未成三畝隱且傍九峯居鄉物傳鱸鱠門生議蟹胥他時小兒子看讀五車書不信時清日長令老故園貞筠如挺拔俊鶻必騰鶱物望歸封事天心重直言會從閶闔裏還認舊巢痕新月效義山體風露晚來清如鈎新月生未嗟輪盡掩似吐鏡微明扇側黃金殿眉纎白玉京殷勤待三五莫漫悵虧盈柬西齋時入直武英殿仍用前韻文雅今誰似蕭間不願餘忽聞青瑣客還上玉堂居檢校防幽蠧傳鈔令小胥茂先多未見别有洞天書每嘆松成蓋猶思杏滿園孤鳴憐鶴警謂西亭分路試鸞鶱職事兼書府官曹本正言西莊謂了溪同下直頻視日斜痕九月四日奉陪韓宗伯碧山堂桂花下作淮南消息比何如喜見連叢破蕚初海曲移來秋馥郁月中分出影扶疏偶隨杖履成髙會不少琴尊在廣除聞道杼山詩句好一枝端合寄尚書顔尚書有謝陸處士杼山寄桂花詩桐城相國致政歸里賦呈四首第一人須第一官乾光遙護綵雲端清標嶽立嵩衡峻雅量春浮澥渤寬魚水君臣前代少冰霜風節古人難忽思弄艇煙江去夢把樅陽舊釣竿三十餘年禁苑來平臨紫閣領丹臺九陔天際司霖雨五色杓南望上台啓沃心真符聖主陶鈞力為養羣材文章一代懸詞律御製詩酬日幾回漣漪太液水西東賜第恩教近紫宫報國每添雙鬢雪浮家新借半帆風蕭然襆被常如客去矣鶯花穩付公三月江南芳草緑謝家池館畫圖中傾都張飲接重城政事堂開國老行六萬錢漢制丞相俸錢月六萬從賓閣散五千卷壓相車輕青春作伴承殊渥公以冬月命豫告上特春月行白社投間稱逺情他日頻勞中使問會思金鼎再和羮送曹峨嵋先生南歸橋門未絶記韋編座裏春風十八年今日重持一杯酒舊來雙鬢各蒼然右曾甲子乙丑間在太學先生時為本堂師不須千騎出東方一曲菰蘆幾泊桑尺五城南韋杜客全家煙雨入吳鄉髙情真與俗情違花外紅堂客到稀江月低時沙路闊只應愁見鶺鴒飛浮名何止一稊輕懷挾風流萬古情夢去海棠春一國江南燕燕與鶯鶯頭顱𢎞景尚嫌遲六十狂生笑食其種豆山南亦行樂丹徒長憶布衣時飛仙蹤迹定何年蟻穴蜂衙絶可憐他日茅山問丹訣菖蒲潭在草堂前買宅無勞更買鄰江山風月等間親青溪九曲題詩處誰省龍標此後身春明雅會罷餳餐後約浮舟計日難好瀹溪茶待桑苧更分麴米餉雲安移居嘗笑酣中客甕底呼不醒又嗤法士愚規規動引經寓意於酒非酒人天倪和如暄景春移居何者是最樂得與數子成比鄰北風漂沙寒日白層冰嵯峨厚地坼坐思廟堂勤政理恐有咿嚘未安宅太平縱使無闕事駑下終慚負言責歸來閉門學雕蟲時過勤苦無成功翰林彩筆明光宫專木查浦故人長楊文薦雄悔餘今夕何夕歡此飲焰焰蠟燭銅盤紅莫嫌酒苦薄莫愁尊易空年年舟載碧甕百洞庭春色來江東只今冬菹酸更緑恰稱腐儒飯脫粟晨鳬夜鯉足屠門鵝炙牛心任華屋人生會少别離多清漳共宅時幾何我當舉酒君當歌三更起立霜月苦河漢驚風吹逝波除夕用少陵飛騰暮景斜五字為韻同悔餘查浦作五首仕宦十五年日夜苦思歸思歸竟無成一笑知我非寸祿盜太倉憫此八口飢不念獨行士窮山懷采薇世纍良己牽初心乃多違凄厲歲云晏倦鳥還退飛潛虬神淵底如絲氣或騰雕鶚望赤霄逺擊有威稜我今默自思進退兩無慿惟見齒髮改轉訝年歲增齒落不足歎髮白不必憎所苦百年內憂患還相仍拂我挂壁弦爇我照字燈天寒百蟲絶癡鈍餘凍蠅往者不可追滔滔水東注來者詎幾時雖新行復故往來無容已古今猶旦暮兹焉共守歲歲豈為我駐一觴泛屠蘇朋來暖寒沍歡悰甫欲集哀念潛已赴回頭十年中骨肉死亡屢惟餘老大身撫節增錯􅘅晨雞未喔咿夜燭光猶炳四鄰喧爆竹伴我空齋冷是時月既晦蕩蕩無留景登樓啓窗扉殘雪在西嶺餖飣盤筵雜綷縩兒女靚吾衰不挂眼寂寞安晚境差喜文字間上下得馳騁九陌入朝火照耀驚林鴉醉困方欲眠奈此童僕譁門前髙車馳街鼓己五撾促起理衣裳仰看北斗斜歲華還復春吾生亦有涯幸生聖人世九域方一家明年返敝廬生事勤桑麻還將元會儀歸與野老誇懷清堂集卷九
