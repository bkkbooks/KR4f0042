body:
  text: 懷清堂集巻二十吏部侍郎湯右曾撰送朱可亭總憲賑饑山西憲府官彌重河東歳大荒地當千里赤麥失二年黄風俗多商估人家少葢藏恐憑和糴議未足慰流亡送盧舜徒光祿賑饑陜西使者如甘雨隨車入雍州遺黎方望活天子待分憂漕去聲粟前籌急屯田後效收期君布嘉恵直到海西頭酬蒼孚農部元夜見詒原韻匆匆節物上元過肯念漳濵久抱疴著句暗中知沈謝苦心灰裏撥隂何九衢燈火繁華盛七秩年光感慨多予開七秩今已六年矣猶憶當時舊風月得鄰堂上夜徵歌早春試筆紅未抽芽緑已含風光流轉我潛諳老無興味心常嬾地想優閒夢尚貪一片晴雲依闕下幾陂春水隔江南歸田毎説人皆笑竊祿年多合自慚萬年寳厯詩有序欽惟皇帝陛下膺駿命恢丕基粤自即阼迄於今兹聰明睿智神聖廣淵之徳孚於上下覃於八表凡食毛含齒萌生蠕動之物莫不煦嫗至化漸濡大澤欣欣各遂其私繼昭夏軼三五皇哉夐乎莫得而京矣歳在辛丑皇帝御極之六十年甲子一週顥穹示慶奥祉㳫至垂萬世之基卜無疆之厯將復肇於今日循環之周而復始槖籥之鼔而日出景運昌數實符其期於時諸王大臣庶司百職事曁轂下耆老太學生徒僉謂歴代未有伏闕叩顙請行慶賀典禮羣情喁喁呼籲懇廹皇帝曰吁報本饗親之弗先其曷可已迺命禮官諏辰庀物肆類上帝薦馨列祖親謁園陵肅將祀事登鉶盥洗罔或弗䖍仁孝誠篤肸蠁布濩大禮斯畢玉鑾容與歸自郊圻維億兆人咸歡呼踴躍奔走摩霄漏泉氤氲蓊鬱之氣乃遂畢達既大和㑹萬萬一心復有山陬海隅黄髮鮐背之老跋履遐逺越數千里雲集京師與羣公卿士百姓伏謁端闈奉萬嵗觴請上鴻號皇帝撝謙至徳有而不居親降徳音飭政經䘏人瘼跽聆悚惕莫不欽歎時則瑞日騰曜卿雲流藹士女童叟駕肩挂轊喧闐抃舞於衢巷之内羽旂金節旛花贊唄鐘鼓絲竹鏗鏘之音延屬乎郊門之外太平之象既洽仁壽之俗彌劭非甚盛徳曷克臻此乎臣攷稽簡册帝王之興多推本符命於是鳯凰龍馬朱文緑字流星刻玉之異徃徃具載於篇其中哲后誼辟功徳及人民欲得神望塞報以嘉應享國長久顧自漢唐以迄元明世系皆可考越數千百年如皇帝至聖上徳履飛龍在天之位備康寧夀考之福綿太極上元之歴古無有二靈貺殊造慶成錫羨延頸企踵者舌敝於謳吟懷鉛握槧者詞窮於比儗臣竊推迹詩書所紀如成周極盛之時周公召公畢公君陳之儔協心同道底於至治所以願望其君者曰欲至於萬年可謂至矣而必陳述於天之基命定命二雅所賡善頌善禱天保之什首焉其詞非出於一人故曰何福不除又曰罄無不宜又曰維日不足辭之重言之複至於山阜岡陵月恒日升南山之夀松柏之茂而必冠之曰天保定爾葢言此皆天之厚有徳而致諸福也皇帝受祿於天嚴恭寅畏無一時一事不奉若天道照臨如日月奮迅如雷霆濡潤如雨露孚信如四時清明在躬與天同體天乃眷之顧之佑之命之又反覆申重之畀以殊祥錫以純嘏仁風扇協氣游甘露降醴泉涌雨暘時若豐年穣穣景應響答未見侔比皇帝建中和之極啟㫒平之運盛徳大業富有日新猶且堯兢兢舜業業夙夜宥宻罔不祇肅敬之至也又臨朝涖政接下諴民惻怛勤懇咸本誠意夫敬禮之輿也誠聖人之本也宋吕祖謙謂惟敬故夀主靜則博厚悠久自强則堅固精明敬之方壽之本也中庸言至誠無息至配天地極於無疆漢董仲舒亦言天瑞應誠而至理皆自然可信皇帝誠敬作所篤袩純佑職此之由自今以往天休滋至億載萬年永永無極雖復握六觚備五數迎日布䇿推諸無窮皆未足方此遐福洪算矣臣持槖禁廷竊以歌詠神聖功徳為職雖弇鄙弗獲自已謹効管蠡闚測敬呈萬年寳厯詩十章章十二句其詞曰皇帝至徳包乾毓坤法宫之中安安存存函我萬國如歳之春昭事上帝祇戒明禋禎符乃來曰歸於仁於萬斯年以撫兆人皇帝大孝立愛親始率祖攸行陟降庭止兩宫寢膳必躬問視更歴嵗年追慕不已天至之性逮於麟趾於萬斯年永錫繁祉皇帝儉勤萬幾在宥土事不文木事不鏤法天地節為爾民富未明求衣視百司奏太官尚食或稽晝漏於萬斯年功崇徳懋皇帝知人峻徳克明咨岳詢牧俾佐太平下及百吏胥簡於廷追之琢之出玉之英薪之槱之得國之楨於萬斯年羣材蒸蒸皇帝愛民迺煦迺育天地中間液洽滲漉賜萬萬租復出廩粟不竭而獲與聚所欲仁増益髙澤久逾渥於萬斯年惟帝之祝皇帝好生上與天通仁愛矜恕靡物不容一夫非辜爰厪帝衷敬爾由獄無俾滋豐蒸為甘雨散為和風於萬斯年慶刑之中皇帝功烈首導河渠羨溢弗治民其為魚淮泗湯湯既播既疏億萬之口有那其居灌浸通利陂澤江湖於萬斯年豐我黍稌皇帝性學該貫三極窮天之紀周地之脉合樂和聲造化胸臆乙夜披覽六經百籍煥乎文章垂億代則於萬斯年焜煌寳厯皇帝神武電掣霆摧誅三叛人稟帝指麾削平沙漠申命六師苞有遺蘖萌芽於西其渠乃殲其庭乃犁於萬斯年殊方來威皇帝景福濡被九有大哉乾元為物之首環四瀛外獻見奔走百昌熙熙以蕃以阜民之捧戴元后父母於萬斯年與天齊夀白石橋來徃朝煙與夕霏寒衣脫盡賸春衣波清曲渚魚游樂草綠平疇雉乳肥屢涴衰顔塵冉冉尚牽芳思栁依依廿年白石橋邉路華表難尋老令威山行㣲雨旋止邨落多勤雨風雷肯破山沮洳泉更細焦灼石俱頑芳草一時歇行雲何處還霏㣲飄數㸃賸取客衣斑望雨瀟灑過長日平安得小輿巖巒欣應接雲雨惜空虚扶老因加飯全生且撥書此情同逆旅決決想鳴渠距熱河三十里山頂有方石髙二丈許矗立中斷為二四旁有刻劃痕洵異觀也有石能自立無人為告勞鬼工曽密運仙掌得雙髙俊拔千夫特嶔崟萬刼牢鍾靈定何自一舍即神臯圖南編修送餅餌蘭若期三宿寓小菴中牢丸餉一柈出籠霜比潔入手月争圓方法傳中禁分張壓食單老夫食軟美不用勸加餐宿螺山薄雲霑灑不成泥暝色山光望已迷東崦人家最惆悵今朝雨在白檀西道中遣懷仲夏實炎月行人尚披裘怪此氣候殊或云雲石稠山中洵多寒問昔有此不隂盛致水潦暵乾豈其由顧視畦隴間詎知麥當秋一雨得破塊投種冀晩收至尊方焦勞羣公急良籌奔命禱祠廟香幣沈靈湫百請未一應㝠黙神應羞商羊㑹當舞旱魃行且休比聞秦晉饑赤地良可憂斗米貴於珠萬錢價不酬詔發洛倉穀三門首汎舟更頒内府金起此鵠與鳩比户先流亡轉徙之他州他州不見容扶挈死道周符節繄誰持坐視民咿嚘肉食古所鄙但知為身謀王師今方西逺過青海頭壯士務殺敵暑月猶兜鍪熱風來如燒瘴氣日夜浮轉粟青天上牽挽踣萬牛矧久缺甘澤何以富來麰安得膚寸雲崇朝浹九丘杜注九州也滂沱未可望浩蕩生邉愁南天門丹梯盡處敞雲樓形勝闗門最上頭一握天低隨鳥度兩邉山合夾川流琳宫燈月神光滿墨海蛟龍筆勢遒上有御書額此日憑髙展清眺恍疑汗漫與同游出城小睡平肩輿更穏於舩合眼華胥到最先螘穴蟁巢等相殺不如蝴蝶去翩翩三家店麥隴焦枯農廢耕已荒春作待秋成雲霾東北將蒸雨風轉西南又放晴樹下暗泉喧晩汲道旁孤店餉塵羮邉州糠籺無來處一飯真應判死生秦晉皆苦饑聞肅州以西數十金易斛米亦不可得潮河川言喚白河船復問潮河渡出山各分流入海㑹同注自牛欄山寺曉發晩到羊車喚小乘早隨鳧舄歴千塍是夕順義令亦禱雨宿寺中飛塵便旋多風候初日蒼凉豈雨徴四野幾時操耒出萬山何處望雲興神仙詎合分今古噀火翻瓢見未曽重入南天門傳烽不記蠶房谷乗障空聞司馬臺二十四闗休䕶塞通天只用一門開古北口王公有設險此地洵雄哉山似中原盡出蘇子由詩闗臨絶塞開五營軍令肅一疊角聲哀遺堞無憂掃時清罷戍臺由長山峪北行三十里偶成十年四度徃來頻世事翻雲覆雨新梧老待棲孤鳯下茅收欲賦衆狙嗔久知朱紱應抛我毎對青山覺泥人自是幼輿饒骨相非闗中散出風塵自石匣入山昨夕雷雨過縱横舒百卉朝來畦隴間父老喜相慰東峰已曙色西嶺尚雲氣得晴景亦佳望雨情未既良苗欣黍稷惡草壯蓬蔚萬物共生成耿耿知自貴人間偪側路豈得長無謂我起催僕夫及此炎毒未清風方徐來夏日詎可畏前凌嶔岑險後有豺狼沸且酌山澗流稍知谷飲味偶讀少陵望嶽詩朱崖碧海見秋毫月窟崑崙想像勞東望泰山西望華當時何惜一登髙王師入藏凱歌十二首有序臣聞布昭聖武斯王者之有征肅將天威惟仁人為無敵若夫户未登於版籍地不𨽻於職方自非廟略之遐宣詎易膚功之克奏欽惟我皇上綏懷萬邦照臨八表體春生秋肅之義丕著聲靈備文經武緯之模間行討伐彼澤旺阿拉布坦者罪人遺孽小醜稽誅當噶爾丹甫經削平之時維諸大臣即以剪除為請我皇上天地含𢎞之徳雨露長養之仁予以生全俾之孳息乃梟獍之性飽即辜恩虺蠆之心生而肆毒先之哈密俶擾繼則西藏䖍劉敢殘掠之恣行實神人所共憤六師其整九伐將申而廷議不無異同謂絶域實當險逺但丸泥以封函谷何事長征苐尺檄以閉玉門恐難深入皇上憫無辜之蒼赤既胥虐以胥戕決必勝之機宜由知己而知彼兇渠元惡法在不原除暴安民事非得已且沿邉各部䕶塞諸番儻踰嵗時寖被煽誘茍非及今殄滅何以永靖邉陲於是運獨斷之明炳先幾之哲親授諸将之方略咸奉成算以指麾復命賢王總司戎律桓桓之士如虎而如貔矯矯之臣一心而一徳九秋氣霽瞻太白之方髙五緯芒寒指欃槍之競落金鉦直進鐡馬長驅奮迅雷霆馳驟風雨分三道以襲擊左右不支督諸軍以攻圍飛走無所遂冰摧而霧廓爭解甲以投戈受降既多獲級無算器仗山積馬牛谷量而西路統制之兵建大將旗鼔而出軍分兩翼預防伏莽之姦計定七擒誓絶傳烽之警月壘環而頭懸面縛雲羅合而鳥散魚驚奏三㨗於軍中布大喜於天下靈旗所指聲騰葱嶺之西武節遥臨威憺濛池而外迺拉里折衝之將兼滇蜀掎角之師䇿遂決於搗虚時方掩其不備銜枚夜渡巻甲晨趨不頓一兵已收全藏準噶爾之狼貪豕突國典宜申唐古特之慕義歸仁民勞可念前旌甫入法炬重新貝葉千花沐王師之時雨蓮臺九品頌中國之聖人此葢曠代之所弗賔前人之所未至皆由我皇上排羣議斷宸衷定破竹之勢於禁中收聚米之形於掌上故能戰無不克謀必有成等六合於庭衢視萬里猶咫尺晷刻靡爽若寒暑之應期變化無方誠鬼神所莫測城鄰碎葉必殪都支路出崑陵還禽賀魯車書混合一澄瀚海之波氛祲肅清重勒髙昌之石臣職司侍從代際賡歌聞大捷之軍書祇深忭蹈獻無疆之壽斚幸在闕庭謹倣古者鐃吹遺意為凱歌十二章恭呈聖覽雖慙下里無文聊志普天同慶云爾恭行天罰逺徂征絶域雲霓望救情聖主萬方同一體用兵正是要銷兵列缺騰光耀太㣲睿謨玊帳授兵機禡牙勃律天西路鷙鳥轅門不敢飛雲臺列仗儼星羅洗甲條支海上波決勝九天分玉斧受期諸將縱金戈賢王秉鉞建殊勲喜氣朝來壓陣雲幕府共傳都統制凱歌爭唱上將軍疑從枕席過王師夜半長河飛渡時九地忽聞鳴鼔角不遺一矢定烏斯來迎簞食與壺漿歌唄聲中出寳坊稽首中原無量佛千花藏裏萬爐香殊方膜拜慶王春爭看東來日出人弱水長流三萬里也應貫斗上天津羽林精鋭領材官烏壘城邉上將壇未用尺書招贊普直須長劍斬樓蘭毘沙熱海路連延莫道陽闗已近天新置宜木都尉府北胥鞬外盡屯田西遐草木震霆雷萬古何人到此來自是九重親決䇿天闗闢處地垠開遥從葱雪望河源苜蓿葡萄近塞垣伐石天山紀功徳崑崙便是國西門龍蛇繞出陣堂堂掃穴犂庭撻伐張從此共球集王㑹太平天子萬年觴閏五月十日大雨後作小睡西堂喚不譍清風急雨掃炎蒸暫休格鬭階前蟻且免驅除案上蠅燕子暄凉時漸改雞人昏晝候難憑只餘病骨衰羸外優穏閑官亦自矜題陳斐公清江盪槳圖想見煙波白鳥雙披圖便似到家江參差紅樹青山外一葉漁舠七里瀧隠居學道此何人清淨登仙位業親只傍水精宫畔住不曾一㸃涴紅塵勝味屠門了不知緑葵紫蓼足山資盎然與物同生意嬾向江邉理釣絲蘆花淺水纜頻牽小小容渠兩板船占得四時風景好一錢不用買江天翠袖華袿衆樂停看君水戲出迴汀鰡鰞躍後鯆䱐引雲霧青天晝杳㝠菰蒲聲裏小舟通宿火魚梁蠏舍東江上秋來聽夜雨雅宜舩背庳安蓬放櫂空明縱所如休論陸處與舟居徃來西塞山前路千㸃桃花五色魚鼉作鯨吞倐改觀中流呼嘯舞濤瀾舟人莫要勤看客此老胸中溟漲寛次韻雪子月下見懷之作蟪蛄聲裏故山違蕩蕩空中明月輝入夜清光看更逈似君好客到應稀黄金印大從教取白玊巵温肯浪揮臺閣鵷鸞滿天路病餘老鶴尚孤飛風露蓬山永夕居水天凉影静禽魚料量藥物衰逾甚商較人材壯不如積雨歇時移月畢霽河斜處映星虚每思伴直呼君去吹火青藜夜校書林木幽森列矟攢吟情遥上玊盤盤弄雛新比元和桺畫馬肥嗤弟子韓未識盃鐺聊止酒苦耽書巻豈堪官清商一部酬風月莫聽哀絲慘不歡自贊門無知己求明珠忽枉暗中投郊居製賦要元禮雪夜迴船念子猷橘課千頭須檢校茶香八餅㑹勾留晩來事少闗心處身世飄然已共浮得家兄孫敏書自嗟家世本無年九十兄今在眼前料檢蠺漁猶俗累掃除荆棘或仙縁饑寒幸未同榮啟官職虛教望阿連樂天詩自愧阿連官職慢只教兄作使君兄何日邨南共煙舍此生容易說歸田南船寄至盆桂二叢招蔗山太僕南屏侍御南指舜揚翰編西亭繕部峙公文學雪子孝廉小飲有作兩叢容易入書堂風露初寒合蔽藏花葉紛敷來海曲根株攘剔自吳鄉分張與作中秋景擁䕶多留數日香傾倒更呼嘉客共撥醅下箬酒新嘗丙寅秋予客游江隂時主人則有邑令陸雲士賓客則有曹武歌鄰湘兄弟酒塲歌地登臨游讌之樂無日無之席間歌者時郎藝冠流輩毎一發聲座客嗟歎不覺其耳之傾側也明年丁夘春予北游復取道江上仍為裙屐之㑹時亦在焉曲終酒罷月落潮平作五絶句贈時解纜而去自此絶不相聞今年夏六月卧疴杜門時忽來京師以原詩裝潢巻軸俾獲重觀則忽忽三十五六年事矣偶然落筆了不省憶予既老病萬念零落時亦紅顔皓齒非復疇昔雲士鄰湘又久經下世追念舊游恍如夢寐感歎不已又作一篇云時辛丑中秋後十日纒頭屢費曹顔逺顧曲頻煩陸浚儀地下久經埋玊樹尊前何處認瓊枝樓臺鶯蝶春暄早歌舞江山月墮遲白髮蕭郎憔悴甚夢游仙是少年時病中即事時辛丑十二月六日負暄南牖小匡牀升斗呼兒糴太倉京尹豈能令粟賤唐李峴事今年都下米貴石至銀四兩五十年來所未有也江南未可謂錢荒司馬温公議社倉法云江淮之南民間乏錢謂之錢荒今五城御史糶倉米必責錢錢價驟貴銀一兩止得錢八百無絃陶令琴三弄食粥顔公帖數行嵗尾都人尤望雪狹鄉情更急寛鄉懷清堂集巻二十
