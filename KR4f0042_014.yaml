body:
  text: 懐清堂集巻十四吏部侍郎湯右曾撰題薄勺庭所藏韓幹放馬圖有鶴皆杜荀無牛不戴嵩耽佳好古自一癖韓幹之馬將毋同開元好畫手多貌青海驄幹也天廐師真龍落筆迥覺凡馬空今觀此三匹是何骨相傑且雄平沙淺草春丰茸晴天散牧雲錦叢偶然俯仰各適性意態磊落騰驤中奚奴碧色懸雙瞳狀獰服古寫更工何從得此秘書省舊傳賜出明光宫年深隱現粉墨蹤絹古黯黮烟塵䝉人間但見騕褭影腕底可有精靈通明牕展玩朝日烘目眡驚此叱撥紅不須真􅎓苦分别一念欣厭紛無窮錦囊玉軸緹褁重忽然散落隨天風此心已在解脫海世上休論亡是公君家静夜月貫虹几案尤物光熊熊神駿恐是于闐本幹曾圖于闐進黄馬一軸破裂絶勝龍眠翁米南宫云李公麟家韓馬破裂四足如立水中差排古迹得未逢不嘶不秣摇三騣他年如山水波立慎勿攜此過江東嘉祐中有使江南者渡采石風大作獻所藏幹馬風止乃渡題香山寺圖八節灘邊畫得無嶺雲沙月興還孤清風一舸棹歌去疑有水仙來弄珠一啜茶甘味未囘多羅千樹繞香臺祗因七百年前塔曾見龍門十寺來絮落萍飄西復東爪㾗誰省雪飛鴻憶從方丈三韓外一㸃青山指洛中幾時真作此山僧石壁千龕古佛燈更擬雪中尋慧可五峯仙骨秀崚嶒送履公往住香山寺此心宿火撥寒灰旛動鈴鳴日幾囘雪裏依然吳㑹别丙寅冬訪師半塘寺留止旬日夢中曽自洛陽來任飛白鶴先提錫欲飯青猿已築臺師到諸天合歡喜百千萬億閣門開香山寺予所重建也前詩未盡意復作一篇仍用原韻金碧何從問劫灰伊川勝概挽仍囘恍從襌老浮杯去可憶檀那獻座來留客堂寛臨石壁飯僧田薄倚香臺只應徧種菩提樹寺少樹故云寶藏千花次第開題汪退谷中允香山詩後嵩山邐迤來百里到伊闕巖巒忽中斷伊水漾清越山靈草木香百竇泉争發層龕金粟影嵌空出石窟東巖青蓮宇千仞俯硉矹美人何方來弄此川上月烟華夕堪采空水逺欲没自啟玉齒歌歌聲散林樾鳴鶴乆徘徊朱絃坐超忽搴芳時有贈懐舊情未歇感兹山澤逰喟焉謝朝謁退谷將歸吳中小詩道别子歸萬里自天西伊闕春風試馬蹄白傅墓前新月皎韋郎泉上晩烟迷六時洗鉢多華滿退谷嘗留金為香山寺僧買田千尺磨崖健筆題又書香山寺碑及白少傅墓碑各一今日迴看又陳迹一尊珍重此分攜次退谷原韻留得香山一巻詩退谷許歸吳中刋自唐以來香山詩都為一集寶坊真喜復開時大千界裏如來火寺成後山頂時有火光如斗大入寺逺近居人皆見之三百年餘内史碑退谷未至時寺先有一碑若預儲以待者新種竹枝風嫋嫋乍疎槐葉雨離離與君他日同歸鞅異代分司共左司題澤州先生午亭山莊圖天井闗頭太行路千峯萬峯半雲樹仙源迢逓杳不逢徑欲移家此中住門前嵐翠自朝暮屋下清泉幾瀠注沁水南流午壁亭此是尚書讀書處鵷鸞臺閣四十年金殿疏越朱絲絃明堂作棟倚大賢維名與功鐘鼎鐫澄心𦕈慮萬象先圖史左右羅丹鉛文章一律金石懸雅頌之手謨誥篇别有遙情寄巖谷水木清暉夢應熟自逐閒雲度析城常招野鶴歸王屋琅函幾巻窺洞裏仙草干年生澗曲平泉堂榭一百餘嵩少家山三十六我聞愛山者豈必山中人千村栁色摇芳春桃花蔫錦紅影新方塘布靄綠漲匀公方謁帝侍紫宸春山可望不可親合眼便與烟霞隣畫師好手亦莫遇誰為圖寫傳其真耕烟老人江海客粉墨荆關見遺跡為公揮灑無所惜春鳩已鳴杏花白列仙之癯在山澤公今經國豈辭劇洛下方當相司馬蒼生詎肯忘安石對公此圖為公歌請公勿復三摩挲摩挲此圖重惆悵想見蘿薜紛山阿送沈磵房之山右望望并州路情親此送君晩秋汾水雁斜日晉祠雲去住心多感衰遲手重分且將懐古意罷酒一論文哭李寅谷之子忽云逝書來涕泗流棋消寒夜永酒豁異鄉愁意氣千金贈行藏一第休遺踪在箱篋筆法暮年遒澤州相公再入内閣和亮功侍講韻如山比峻海量深東閣招賢集盍簪謝政甫投林下鞅濟時重灑手中霖松喬位業三生契屈宋風騷萬古心再見相公調鼎鼐都人歌舞古猶今過徳州與田子益話舊追送至二十里驛亭馬上口占酒場詩地草連空四十年來剰兩翁豈意三更明月下依然並馬古城東長河浩浩催高浪短髪蕭蕭任朔風猶記得隣堂上㑹玉笙吹徹燭銷紅過東林寺小憩聊延望爐峯秀色遮青山匡氏宅白社逺公家寺逐殘碑破泉依曲磴斜影堂松雪裏一樹老梅花楓香驛仙尉壇何在青城縣乆荒水争流稻積葉自傍楓香竹覆煎茶竈藤垂搗藥牀四山迴合處翠色晩蒼蒼望天柱山峩峩天柱峯可望不可梯蒼然紫翠内大有幽人棲岡前走白鹿洞口封香泥似聞紺瞳翁金鼎分刀圭千秋靈仙觀名與灊岳齊時有嘉蓮花千瓣流清溪仙源自何處路絶人已迷烟月弄嬋娟遥挂玉鏡西忽焉海色動夜半鳴金雞安坐鞭石牛為予起鋤犁寸田一成熟磊落棗與梨兹焉宿夕留王事未敢稽攀星摘日月行待醉墨題雲空焙藥巖水激風凄凄試呼左元放恐復羣老羝得張𢎞蘧書並寄覆笥集小謫猶應傍紫宸靈山别有碧桃春樓臺一一當蓬島風浪明明接漢津文采石渠留故事姓名玉牒記前因真仙通鑑云平固山頂有小石笥藏玉牒記名山福地及得道人姓名能言竒字時真少君是輸寥館内人上十八灘星隕如雨不在天化為怪石滄江邊章川貢川不知數摶沙撒菽誰使然一灘復一灘一灣復一灣南來贑石三百里恍在蜑風蠻雨間叅錯列齒齒屈曲鳴潺潺争流噴薄冰雪湧四面迴合巖巒環愛此萬古立積鐵濤波出沒堅且頑有時娟娟弄秀色髣髴明鏡横烟鬟既廉以劌神所刓不夷而險天真慳捎濆撇漩敢輕上長年最能用力艱我昨青洲過落瀨白雨飛灑衣裳斑打鼓發船百丈牽中流弱䌫斷蒯菅吾生㣲命如戯耳魚龍底用藏神姦眀朝飛㯭上天柱沽酒一笑開心顔苦樂更迭無不便江鷗沙鷺爾許閒他時放溜小艓子看我倚櫂乘風還䖍州福地昔所傳道人天眼開襌闗竒峯翠巘疑可到待與猿狖相追攀花開四照天女蓮居士之竹宻不刪不須更載鬱林石即此便買愚公山四月晦前一日雜成十斷句時在三水使館駢枝争放赤城霞㸃㸃猩紅未足誇郤怪千秋朱鳥影一時併上日南花似探玉韞剖珠胎小白輕紅越女腮忍病也須營一飽此行端為荔枝來小山幽處暗香同入夏連春發幾叢寄語月中新桂子自今更不要秋風咏月桂雲車風馬歘交馳破柱翻河又一時惟有此君無限喜夜來新長籜龍兒雨銷毒熱氣如秋滿院榕隂翠色流也自絺衣與芒履老夫何負嶺南逰等閒喜慍亦區區暮四朝三為衆狙辛苦忍教思竹實人間只有鳯凰雛生憎怪鳥響軥輈賦鵩當時有此不安得蓬萊緑衣使為予歌舞到金洲山名在縣江上佛桑焰焰說燒空浪得虚名爾許同今日一欄傾國色豐盈争敵綉毬紅貽書忽報吕安亡謂劉若千旅館殘燈影半牀從此看花兩行淚更無人見舊劉郎閣鈴書寂吏人稀病瘴經時減帶圍待乞三江一篙水淡雲輕雨送將歸庭前月季連旬為雨所敗昨忽於叢綠中出一枝紅鮮可愛偶得六言一篇夭紅浄緑不二偶然横出一枝佛法是何分别拈花㣲笑移時壬辰五月七日在三水使館上乾齋中丞斷句二首廿年盗竊太倉紅鮮鱠蓬池夢想中今日炎洲嵐瘴裏尚欣乞米得從公四壁已聞香出甑半甌乍喜滑流匙遥知帳下千夫膳未抵書郎一飽時病起到東軒書所見雨過江城換葛衣雲中殘㸃尚霏㣲佛桑初亞紅一朶已見滿庭蝴蝶飛乾齋中丞見和原韻意有未盡復為五章又追和之㦸府風清六月霜坐看談笑静蠻荒庾公樓與山公馬獨秀峯前八桂堂禁中頗牧許誰同簡畀西南出聖衷此日耽書傳杜預異時截鐙記姚崇文星萬里入牂牁斗極光芒氣象多公是濟時霖雨手五湖未可問漁蓑來詩有何如釣艇自披蓑句名賢用意自深長館閣猶餘荀令香慙愧疎慵繼公後五月廿六日聞有新命重入翰林禁鐘宫漏幾迴腸小淹可為荔支留妙句鏘金一散愁望盡羚羊峽中路海天涼雨氣如秋泊英徳城下山城斗絶一孤舟日看清江泯泯流不競此心真似水忘機隨地只如鷗風生先入涵暉谷元次山有銘浪起疑吞咤雪洲嶺嶠幽深羣盗在幾時五管得賢侯峽山寺海風東南來帆落江上寺誰云香界逺已逐疎鐘至朝隂延虚明林影入幽䆳舊讀茅君傳十九此福地我到不二門願聞無漏義禪堂梵唄寂野僧餘三四緣雲窮攀躋靈境所歴異蘇公有遺跡滅没巖上字橋迴瀑泉聲懸注百尺駛盪胸氷雪浄觸石琲璣委昨從廬阜過開先跡猶閟黄華水簾外得此足慰意山神亦何心飛雨隨履屣豈應嗤熱惱出此故㳺戲猿鳴山幽幽上下烟蘿翠佳人昔歸日彈指干嵗事長留碧玉環永鎮山門器喟焉空愛染何處著名利南山寺納凉庳編蓬篾窄安牕毒熱驅除豈有方瘴嶺雲生明似火蠻江日浴沸如湯偶尋修竹千竿翠蹔借清風一枕凉長記英州城下路南山孤寺老僧房聞羣盗營翁源曲江始興三邑連界火燒山下馳往相視山高路絶備經艱險信宿乃至作一篇連山百里翠氤氲洶洶奔雷洞壑聞鳥道但餘麋鹿跡龍圍龍圍石在絶頂去賊巢只數里已入虎狼羣仙靈縹緲諸天接雲雨虚無下界分莫怪一身臨險絶草堂猿鶴乆移文發三水戲作長年上瀨不須愁已挽三江水倒流一夕南風飽帆腹浪花如雪擁船頭風意如人往復還來時自北去時南明珠翠羽飄沈盡先一日颶風作泊岸官艘重載沈溺始信江神寶不貪輞川詩畫老兼工三載蠻鄉記土風草木亦如吾臭味荔枝紅並佛桑紅味外江瑶應一格荔支風味配江瑶見中州集詩中含笑合交光東坡詩娟娟泣露紫含笑焰焰燒空紅佛桑海南絶代雙邢尹老我春風笑乞漿重經大庾嶺梅花國裏憶初春丞相祠邊柳色新明日秋風天北路後一日立秋半年瘴雨嶺南人山巖落落羞凡骨雲海飄飄信此身第一塞遮東嶠口螺紋九磴本嶙峋江上對月清江夫如何暝色帶林樾娟娟衣上影瀲瀲波間月西躔秋已至南陸暑未歇新浴御纎絺迎涼􅌨衰髪半年熏瘴霧海氣侵肌骨詎意一扁舟仍來坐超忽昔經灘石險今為江漲沒即此空世患終焉謝天伐沈沈水精宫蕩蕩白銀闕幽賞情未已雞鳴榜人發與邱翽梧高安官且免糟缸㣲官終日守糟缸子由句也郡治蕭然卧竹牕民事由來等身事蜀江元只是家江瑞州舊有蜀江門即錦水所經翽梧令蜀温江八年有惠政民歌思之翽梧亦惓惓不忘故云同攜明月三更笛似到秋風七里瀧老去經營復何有荒蕪休問石田雙自過舒城環山流水密竹深林至黄梅復見九江即步黄梅店壁上韻龍城西畔太湖東步步看山了不同雲木週遭三百里此身常在翠㣲中自嶺外歸重經逆旅用壁間舊韻後一日即到東林矣七月十三日中元節漸近大㑹說無遮何㸃雖登席周顒未出家幽期二林隱逺勢九江斜優鉢曇應見風開菡萏花東林寺漸看雲散月流天那得沙崩岸出泉夢裏已空菩薩盖閒來聊問祖師禪名山乍到心差領佳句雖存法不傳夜話亭前重懐古也應學佛也求仙蓮花池上落還開荔子洲邊去復囘炊飯喜當紅稻熟到門肯遣白衣來氣含蔬笋樂莫樂味戰膏粱才不才暫與廬山作賔主香爐峯對講經臺十八臺萬里征衫洗瘴塵邊沙漠漠起寒雲橋迴野店孤燈出夜静空山脫葉聞十八臺空號卧虎兩三户冷走驚麏侍臣咫尺依天仗豹尾前頭萬馬軍壬辰九月十一日行在啓事愷功都憲以近詩見示循諷周咏因作小詩八章龍嘶萬騎曉駪駪赤羽旗邊立仗新一巻把公冰雪句不知何路有飛塵四山紅葉及秋遲郤與黄花九日期一鑰詩情誰㑹得應於馬上獨吟時潮河絶境自天開御製詩酬燕許才遥望乾光護東壁一時雲漢共昭囘三篋河東扈從餘永興博洽冠周廬文章韓杜真何憾須識胷中萬巻書玉壺買得春多態茅屋聽殘雨滴聲何似仙人步東斗直從九萬御風行殷紅刀尺自牀牀别有天孫雲錦張欲覔金針了無處空驚七十二鴛鴦舊巢已隔九重深老鶴孤飛忽禁林夜半玉堂還伴直七條絃上愛希音廿年文事得從公沆瀣秋旻一氣中今日味思禪悦味醍醐酥酪可還同懐清堂集巻十四
