body:
  text: 懷清堂集卷三吏部侍郎湯右曽撰寄侍讀喬石林六年清夢繞江濱閒却䕫龍許國身豹尾昔陳天上事漁竿今作水邉人儒宗經術歸康濟汗簡文章識雅馴遙憶東風挑菜節萬條烟栁射湖春出城西門今晨風日佳暗曖淡初旭空煙散林端淺水明城曲西郊路才指幽意紛相逐始悟塵中人嵗月常局促沈冥或鑿坯遊賞劇秉燭吾生迫世紛誰敢希髙躅聊復謝埃壒靈境尋信宿憩蘭若寒林棲鴿午鳴鐘步屧閒行冷梵宫十里蕭條黃葉路白楊吹盡墓田風過八里莊道中作始出門頭村郊路就平曠秋山忽滿眼翠色上屏障差差白塔影渺渺青蓮相幽討已可期諸峯入吟望至香山寺入林聞妙香臨流亂清影松風坐盤石孤意相與永花宫俯岧嶤雲物入秋冷鳥雀時一喧斜陽下髙嶺登香山絶頂因宿來青軒和合肥相公韻香山古寺危峯巔飛鞚欲躡無因緣今晨得到翠微頂傑閣千仞憑風煙四山圍合看厯厯長路放曠窮綿綿桑乾一線白窈渺太行萬里青鈎連八陘地脈考圖志勝槩直欲吞幽燕珠宫紺殿久零落老樹詰屈根株纒舊傳兩松怒龍攫雷雨失一歸重淵恆河七寶緬經始中丞故石今誰傳明昌大定全盛日獵火夜照長圍圓齊厨嵗供太倉米土木屢費司農錢祭星臺荒杳何處空復太乙祠神仙回頭逝水各陳迹風鈴簷鐸猶當年來青一軒瞰空濶女墻低亞藤蘿懸我來九月霜始殺萬株柿葉紅霞鮮泉聲淙淙響下界鳥語一一聞諸天須臾煙暝月出嶺一彎眉嫵窺嬋娟半嵓逺火出林杪中夜清磬鳴山前朝霞公今風雅主勝地往往留詩篇同逰樂宋兩佳士各以秀句驅爭先清言啜茗足幽賞底用劇飲飛觥船頻年塵土雜夢寐一夕喜就山房眠明朝遍踏四百寺雙屐未到心欣然十八盤梯級青冥未覺難始知人事異悲歡秋風正愛縈紆路枉笑羊腸百八盤水盡頭探山避犖確踏石畏磢錯定非善逰人濟勝兩芒屩我聞水源頭迢遞入榛薄居人導我前步步進還卻下如臨深淵上如梯髙閣水細流涓涓沙明石鑿鑿瑣碎隕繁星髙閎張廣幕繡若藻采披劃然斧斤削溪回路頻轉淙琤下略彴再過乃得之源深流不涸得非兹山根元氣有橐籥或者百川水各各通海若昔聞此兩源今者瀉一壑其下有伏流沸出玉泉腳水清可以鑑泉甘可以勺小憩登頓疲徐悟遊賞樂歸途穿䝉茸草樹紛枝格櫻桃花萬樹春來想灼灼寒林饒脫葉絶澗有墮雀濺濺水漸逺仙徑迷采藥回首煙霞姿粗能舉其略退谷斗米食不盡八騶竟何益不如山中人嵗嵗挂蘿薜侍郎搆茅亭緬想棲遁迹風流去已逺散髮待來客抗懷各飛沈幽意抱雲石流觴聊復爾更往理輕策早至碧雲寺羣山忽開豁煙波出秋曉漙露晞草根朝陽升霞表隂森槐徑入巖殿駕縹眇入門瀉幽泉紆直䦨檻繞廊深塵漠漠鐘逺聲杳杳詎知困登陟臨憩已木杪晚秋落桂子敗葉冷荷沼四虛起孤亭碎玉響風篠徘徊冲襟寫蕭散塵慮少萬籟同窅然遺跡絶飛鳥龍泉庵盧師千年崖石古大青小青久無主飛來此地穴龍湫日出青天作雲雨池中金鯽數上聲百餘中有五色非常魚細看恐此是神物夜半欲去雷風俱九日大風寒甚不得訪平坡祕魔諸勝投床倦不聞齊鼓選勝行須待曉鐘夜半風聲撼茅屋朝來冷氣逼雲峯頻添白夾衣仍薄再上青山興已慵慚愧老僧為後約可能踏雪到深冬登楊園小樓二首颯㳫驚颷乍入林倦來還此一登臨青山依舊看如畫昨夜入山如許深兩年曽共山翁醉修褉風花滿習池九日今朝太蕭摵可知榮悴不同時乙丑丙寅兩從崑山相公修褉於此答陳藹公閴寂懷朋交跫然喜足音况我與夫子投分蘭與金懷中三嵗字字滅不可尋堂上張徽絃離思滿玉琴昨來到京國有如磁引針相訪朝日暉嚶嚶鳴林禽幽人去何所履迹青苔隂剝啄貽尺書悲商叩中林上言離别意下感搖落心君才老始用藏器詎不深陵谷閲變遷孤懷抱崎嶔至言久乃信至寶衆所欽願復忍須臾勿怨鬢雪侵窮秋門巷冷落葉枝櫹槮遲君復來過清言戞璆琳喬侍讀造一舟名曰雲裝烟駕之舫貽詩索和次韻四首書庫琴亭白傅池青蘋微動獨來時只應細槳虛徐去未用髙帆美滿吹騰上乍驚龍化速退飛常笑鷁行遲晚來波靜川如練呼客清醪與共持鴨頭初漲緑漪生節序穠華取次更畫楫最宜三月出艷歌從繞百花行風光谷口遙相失煙水侯家淡不爭紅㨂櫻桃深處泊小浮舴艋一漚輕霜葉萬株屏外直沙禽一㸃鏡中開閒敲烏榜暮雲合自下碧塘初雪來夜半踏冰圍虎落天寒分火上龍堆何如庳著蓬窗了興到閒逰興盡回烟際輕橈破浪紋眠鷗宿鷺一羣羣穿橋微月半規上濯足清流幾派分物外髙寒成小築卷中冰雪得斯文蒹葭不盡懷人意持贈惟應寄嶺雲王亷一新居落成招諸同年宴集賦贈巷陌烏衣選勝偏吹笙曲洛有芝㕓名都花石春髙下上相堤沙路接連絇舄三千朱邸月䦨干十二碧城烟卿才公望如君少行馬門施未偶然簾外輕寒冷㦸枝霓裳三叠按歌時雲歸巫峽仙娥雨月艷秦淮樂府詞時演阮光祿春燈謎劇密席幾回低桂燼新聲連夜蔟蠻絲使君舊有銅鞮曲好付紅兒與雪兒送陳斑輿歸崑山揚州富瑶琨磊落入包貢欎為瑚璉姿寶氣出鴻洞陳郎江左來文采迥殊衆圖成青海馬繡出玉窗鳳就我論詩言妙義寄循諷上追猗那體屹立架榱棟次寫山水音清泠發嘲弄西崑亦何者溫李名伯仲一一窮其源顧我愧區霿幽州迫殘嵗行輈千里凍一詠南陔詩雲外繞歸夢閒曹冰雪冷别餞虛臘甕看子江鄉行翩然躡飛鞚良材盡用地甔石非屢空譬穿楊三葉所發必命中歸歟隱不腓長路此相送自黃村歸經草橋五首按鷹臺北接春郊信馬閒行未覺遙尺五城南好光景到天煙色栁條條消息隂陽得審觀蒔花未訝看花難此間别有芳菲節十月中旬進牡丹右安門外舊池亭别墅參謀堂右丞今日草橋清淺水還留一縷照衰興夭桃穠杏一時開上巳風光次第來尚有殿春紅芍藥連塍十里到豐臺玉溪髙唱繼金荃妙語何人解别傳最憶潁亭詞賦手騎風七尺紫涇仙題寫生豆莢圖二首種豆何須種一區藤墩瓜架儘疏蕪江南小筆徐崇嗣枉寫蜂蟬茄菜圖恰稱行園抱甕情披圖風嫋一枝橫秋來簾閣疏踈雨鴨腳籬邉蟋蟀聲寄喬石林侍讀二首先生拂袖到滄洲聞道雙橈日出逰種樹幾年知漸大傍湖一水更宜秋娟娟月吐窗中霧泛泛烟輕海上鷗自倚紅亭新笛子蚤凉天氣換歌頭銘鐘勒鼎且由他六載雙丸似擲梭絲竹閒情足陶寫海山回首失風波枯棊白黑輸贏慣故紙興衰感慨何我是淮南舊賓客每憑清夢到巖阿九月四日遊黑龍潭作吹夢不到城南坰衣袂忽舉風泠泠不知韁鞚落何所仙宫人寂晝不扄入門老鴉與人語丹粉剝落潛精靈隂森古柏閟三五碑石缺蝕誰所銘繚垣中有太古穴下根無地穿窮溟華陽黑水坼坤軸昆明劫火燒元形移來一片太隂色方池圓甃凝深青羊髯有珠得豈易象乘咒鉢行當聽頻年畿輔困旱魃祠宫牢醴留餘馨撞鐘考鼓樹葆羽白日往往聞驚霆只今時和雨暘若大有况絶秋田螟空潭寂寞九淵蟄我來臨眺憑軒櫺荒陂幾畝亂鳬鴨敗葦彌望疑洲汀人生適意無小大疏豁坐愛風中亭國西山翠在眉睫塵勞如醉吹還醒長安歌舞五侯宅此地誰挈沙頭瓶同遊欲散我亦去卻略檻外須臾停水葒自媚砌前色寒蝶未退花邉翎移時啜茗雪乳泛盞杓漫自勞鄰丁斜陽欲下理歸策回首尚帶龍涎腥寄喬雲漸二首逺道俄傳有報章斜封玉版認行行兩年幻出明珠翳半夜潛回若木光喜極屢呼賖酒券人還勸閉讀書堂一身老去真須惜鏡裏吳絲看鬢霜何處劉郎技入神照來秋水復雙清光從銀海波中覔影自金箆刮處生藥物開州張太祝方書陽里鄭康成思君九月黃花節作意看花分外明水廊絶句池枯荷葉井凋桐橙子舒黃柿吐紅水檻自行還自立作寒一陳撲簾風和沈南疑移家都下詩次韻老松十圍埋雪霰神龍咫尺蟠沙泥人生遇合詎可料四時擾擾空輪蹄嗟哉吳興沈夫子四十尚困鹽與虀往年同舉京兆試雪粒散落收稗稊衰蘆颯颯咽朔雁宵夢喔喔思吳雞君歸卜築五湖曲志士不厭山深棲重來說經過太學侏儒囊粟愁顔低我聞卷阿詠吉士朝陽瑞羽鳴菶萋由來難嫁必傾國美人夭采爭春荑君才於世合致用未怨赤腳嗟跛奚三塗八難纍豈免何肉往往同周妻君家兒郎三玉雪豐盈已露顔角犀瑶琨箘簵入包貢吾言左券非無稽秋窗獨樹弄明月句法一律提昌黎於莵文采萬人敵隻手便拉赤豹麛洛城數間足瀟灑渭濱千畝無町畦朱絲瑶瑟薦清廟閶闔傾聽釣天迷坐奏雲門戞韶石詎得玩世歌簡兮九日登慈仁寺毗盧閣大海一粟浮神鼇平地湧出無波濤鯫生早衰困筋力風駕兩腋嵬嵬髙危欄望到飛鳥沒細與鷹眼爭秋毫豁然四虛倚空濶下睇萬木環周遭車馳馬驟漲塵底始信物外容吾曹蓐收西行欲弭節坐覺嵗月流滔滔霜清日薄作重九來此佛寺持松醪先賢故事試續說五經逸字誰題糕晚過妙光閣披蘚香門入穿雲小閣登松間耿殘照天外刷秋鷹勝節清遊數流年百感增西風重九日吹灔酒三升送金道州令平山團團窺青冥漫漫覆后土武功太白去三百鄠杜城南離尺五手摩日月凌星辰下噓為風潤為雨人生宦迹風中蘀逺者憂虞近者樂往年萬里栁州祠瘴霧漫天愁插腳歸來騎馬古邠州仍持手版謁督郵邉居蕭條窮邑冷四年掣電驚回頭今秋得邑踰嶺海意外誰遣臺符留樂哉新垂畿縣綬馮翊扶風關左右邉沙慘淡㑹見無蠻雨沈冥猶記否故人置酒行送君君才磊落志軼羣豐車肥馬何足云往操鄭刀攜宋斤君不見滹沱之南恆嶽背一縷遙接垂天雲題敦好堂集後三首書郎家世盡凌烟更有才名萬口傳年少承恩知第一每從扈從奏甘泉卜築名園傍上林承宫連閣對千尋盡羅星宿看文雅别遣風雲入賦心渌水亭西脆管哀先生賓閣為重開座中應有邯鄲竺歎息天人未易才題徐電發檢討楓江漁父圖二首愛君雅頌猗那手閒向烟波理釣絲一片悠悠暮江色蓼紅蘋白月黃時泛泛眠鷗漾浴鳬華輈雖小稱菰蘆卻將秀嶺仙岩意併作秋江靜釣圖八月十二夜月下訪俞陳芳病起用吕山瀏韻東鄰有佳人機杼響空巷文頭巧圖繡妙手生姸狀朝來雙蛾顰忍病辭不放雁鴻初起勢風裏斷千丈旁觀皆歎息謂子衆人望詎識達者心一笑齊得喪古奩澀苔紋泫露冷花當吕侯千金字宫徴各諧暢譬如假髙衢逼仄見坦蕩君還作才語我已得詩樣詼嘲雜風月脫略忘禮讓平生述作意丘壑有微尚杯行再三論興已寄霞上明日陳芳以對月枉寄一首見貽依韻奉答年來飛雨散西東歌舞歡場似夢中才子蚤知眉最白佳人容易頰銷紅病餘氣尚飛騰在醉後詞猶顧盼雄領取平秋月三五故穿窈窕入簾櫳送翁康貽南歸金明池路杏花叢兄弟歡逰約略同零雨散時人欲别故山遮處夢還通百年騷雅晴軒筆六月虛涼水閣風一樣恩袍爛銀色羡君歸著北堂中寄懷陸履貞表弟别來三見嵗堂堂良訊封題日幾行薄病定知新健在雅詩未害逺分將香生藝苑藝為局價出連城玉有坊不墜風流端賴汝底須飲酌笑諸郎燭花二首忽漫花如笑真將愁作籠無情拋玉腕有恨帶金蟲焰吐熒熒碧光搖薄薄紅相看始遙夜莫怨曉曨􅀈作意開何事關情有隱憂隨風飄别館和雨暗空樓心肯煎熬滅啼因㸃滴休剪刀聲最苦凄絶是清秋送梁藥亭歸南海圖牒不到羅浮巔中有雲氣相鈎連瑶宫璇房七十二造幽屐齒無因緣愛君架屋此中住便作平地飛空仙烟霞瀟灑入骨相風雨離合來詩篇昨年走馬到京邑春官名字人爭傳楞伽一本學士院晚入不看前階甎宣武門西得小築手置花石爭春妍卷簾烟穗上裊裊倚杯月色流娟娟長安騶呼滿廣陌髙車大馬交喧闐相如謝病杜門卧時與文士窮丹鉛我生於世百無好默坐兀兀枯僧氊窮秋落葉記送子古藤老屋風霜穿燈青火冷共聫句颶風鯨浪遮南天五年回首等夢寐萬事過眼真雲烟春風一枝同砌植猥以蓬艾隨芳荃詩書臭味自夙昔文字嗜好猶當年豪吟始知筆有力痛飲那顧囊無錢人生蹤跡劇過雨一尊别酒仍花前太官未賜百索軸長路已捉蟠桃鞭到家五月六月節四山荔子紅無邉歸攜詞客陳與屈美人一曲尋花田故交隔越霄漢外欲往逺道愁連千唯當作書勤報我更寄仙蝶飛翩翩東王石谷岐薛諸王賓友俱右丞名迹貴傾都君從劫火傳家法願乞山居農作圗顧伊在侍郎巡撫河南寄贈四首喜傳尺一日華東道路歌呼逺近同關內流移方在洛天邉霖雨正思公淇園便下千竿竹少室還棲百尺桐憂國定須康濟手挽將八節應條風聞命才為宿夕留圗書一卷壓輕郵江湖衝雪浮單舸鼓角驅風笑八騶儒者有人方大用太平無事更何求冰心一片嵩陽月遙挂青冥萬里秋草載談經朵殿開尚留三禮在容臺主恩特賜旌旄出民困從蘇召杜來得士水南兼水北濟時公望復公才穿花豹尾清吟路憶到梁園日幾回文章楊葉記三穿才子承家最少年猥以通門隨麈尾每留小飲到花前浮沈自笑三千牘搖襞虛勞九萬箋只待公還秉元化中和有頌願雕鐫題黃硯芝中允黃山采芝圗夜槌靈鼓遊江邉四十七瀨波聒天平生常笑酈道元黃山勝絶脫不編搜剔異境誰最先夸娥巨靈知孰賢天都巉巉逼星躔雲海下幕變化嬗我夢欲往塵勞牽披圗恍惚置我前劃然翠壁千仭懸好山不斷來連連中有百道丹砂泉異花香草金碧聫枸杞夜吠龍蛇纒松根茯苓忘嵗年春陽濯濯萬色鮮濃緑畫出修眉娟髙原下隰暄且妍行歌樵客花駕肩中間忽置萬頃田桃花茅屋飄紅烟短轅車子小烏犍雞豚散出村東偏門外淺水浮漪漣內有至人談妙𤣥秀峯往往規巨然花竹間出宷與筌問誰作者形神全王郎妙擅秋豪顛江夏才子人中仙屬寫此圗暢幽悁永嘉開鑿意所便天台石梁跨蘂淵方瞳緑髮疑偓佺道衣瀟灑回風褰奴背古音囊五絃巾箱或貯金簡篇玉堂鈴索厭八甎愛此寂靜山中眠他年追逰許攀緣采藥便從葛稚川三月十八日過海棠院花將敗矣用東坡定惠院東海棠詩韻同山瀏讓水次厚作閒坊無事疏草木欲飯青精餌黃獨花時日日宜出遊敗意生憎阿戎俗慈仁海棠春似錦鈿車不減馳金谷我來幾日顛風吹玉雪兩株欹佛屋燕宫遨頭數往事遊騎清歌兼竹肉紅潮乍退粉態勻宿醉殘妝看未足一株已占春一國窈窕况逢雙女淑幽昏偶桂爾何人念此真令一捧腹故人相邀共題句詩爭竒葩字瘠竹林檎木瓜徒浪傳肯令貴耳不信目嬌紅暈紫眼未見浣花詩老虛留蜀東坡妙語傳瘴鄉如刷伏鸞梳隱鵠古來尤物知者少豈獨孤芳委榛曲對花歎息花無言萬感茫茫仍撥觸夢兒在官感成四首耿耿燈殘焰沈沈夜向冥似聞風颯㳫應識爾精靈噩夢昏常亂哀魂感易醒最憐身老大妙士手書銘嬌小初來日憐渠尚鬬强豈知蟲蠧葉不耐草飛霜醫藥遲真悔平生想若狂枕邉猶髣佛還捉舊衣裳念我淪飄久從知教督疏門衰真賴汝年小即知書下筆能驚座清言數起余硬黃臨故帖墨瀋尚如初老驥心空壯童烏淚不乾我衰三月劇汝死一門單骨月分張痛文章付託難失珠驚覺後慟絶撫遺棺題喬石林侍讀萬里歸舟圗三首采得鮫珠自百蠻春帆幾幅白雲間清江朝暮畫簾捲下上數峯如髻鬟九疑山深猿亂啼南嶽廟前烏欲栖孤城杳靄一聲角湘水瀲瀲浮玻璃猶記春流倚櫓枝六千里外得歸遲此中大有題詩客夜半􅝓亭舉火時題青溪釣隱圗三首七里灘邉正落暉漁歌遙唱晚天歸戴公山下秋風路黃葉人家住翠微好景婆娑日數回江山幾叠翠屏開烟波盡處暮潮落恐有片帆天際來知君摩詰是前身畫裡詩中兩逼真一片江天好吟思千秋長傍釣臺人送俞蒼文二首忽慢攀條悵逺行杏花寒食數歸程分明仍在廬江驛同聽淋浪夜雨聲子巳未曽留懷寧傳舍十日澄江如練謝家詩千載風流入夢思君是後來稱獨步合應題在小孤祠贈歌者時郎雕闌屈曲上花鈎行遍花隂逈自愁聽出一聲新樂府始知江左最風流妙絶南朝瓊樹詞空餘宰相寫烏絲秦淮三月花如雪一曲斷腸誰得知三年隋苑鬭繁華定子當筵醉臉斜水調莫歌歌最苦雷塘幾畝野田花梨花著雨淡生春小閣濃香撥一尊莫向湘南唱紅豆絃凝管咽欲銷魂琵琶筝笛等閒空蕭寺房廊夜夜風憶得扇紈零雨别幾回惆悵蠟鐙紅除夜二首眼看小嵗又嶙峋叠鼓喧喧動四鄰松燎桃符千里夢朱衣畫袴五陵人細思勝事隨年減默數清遊入夜頻長信新聞遺詔下更無帖子寫宜春遲回節物每驚嗟垂盡真憐赴壑蛇先飲屠蘇非少日浪書欎壘向天涯醉從司命爭阿堵癡憶添丁舞髻丫準備歸鞍到江路小紅剛放一枝花懷清堂集卷三
