body:
  text: 懷清堂集巻一吏部侍郎湯右曽撰過愚溪我讀蝜蝂傳居嘗念髙危栁侯亦知道未用譏訶為慷慨功與名失墜差豪釐栁詩豈知千仞墜祇為一豪差文墨本小道況乃工奕棊羣小既喧豗國事幾紛披風波一蹉跌逺逝湘水湄扣舷動哀吟離騷詠江蘺西山萬古色冉溪清漣漪種漆思南國成器詎可期三亭衰草沒故蹟誰復知兹溪非云愚使君失意時潨潨潄寒石清潭有餘悲我來愚溪上更詠溪居詩栁子祠丹茘遺碑字芳椒酹酒痕清溪自寒色返照入祠門種术風露晩結茅山水源平生靈爽在夜夜呌哀猿鈷鉧潭沿流直過西山西水聲激激風凄凄澄泓徹底不受泥一堆寒碧浮玻璃崇臺延檻望秋月天髙氣迥忘卑棲千年剥蝕潭上字空聴落日號荒鷄曉遊朝陽巖言尋朝陽巖煙日初㺯影清暉媚幽姿散步得妙領連娟浮嵓㠋逺目試一騁俯瞰瀟水流含漪𣺌千頃探竒下幽窟潛蛟舞浪井虚徐清風來蕭灑俗縁屏林梢法華寺㫁夢凄已冷清音非絃匏吟嘯坐日永漢陽渡朝趨武昌城暮指漢陽樹風波出沒間一日兩回渡江邉老人見我熟笑我往來計真誤停辛貯苦不得言破㡌青衫在行路既不能春風細浪沙棠舟玉簫金管坐兩頭又不能漁舠一葉舞空快踏浪上下随鳬鷗乘此兩版船截彼萬里流千丈俯蛟室九淵跨龍湫張風無帆捩無柁一夫雙槳如烟浮呉兒非解水楚俗寜善泅波瀾談笑意自得勇若壯士挾兩輈歘忽江心翻白鼉顛風雪浪髙峩峩急雨打面如飛梭牽船幸傍沙岸住不爾性命随濤波嗚呼性命随濤波艱難岐路奈爾何黄鶴樓金梯玉房不可求誰跨滄海凌瀛洲溶溶雲霧江漢上百尺逺抱空中樓問樓始何年千載嵗月遒刦火燒不盡云此仙人留仙人駕鴻靷鳳去黄鶴尚落清江頭舒翼繡桷奔矯首紫甍浮我來軒窻開面面恍踏鶴背汗漫乘風遊妙絶般與倕斧斤窮雕􅦒象形㑹意儼飛動青田萬里誰當儔樓中羽客來丹丘玉顔百錬須髯脩傳聞風月最佳夜一聲鐵笛横清秋潛蛟起舞老龍泣霓旌翠旗今在不西土亦何事來此維輕舟樓前觱篥聲樓下江水流孤雲飄落百蠻路仙骨未換仍羈愁竒蘭舖永州西三十里有蘭生松巔叢徑丈許土人云昔有人盜之為雷所擊道旁枯松尚存千年屈曲虬龍枝兎絲女蘿縈繞之風霜晼晩不相保雖有親愛誰得知嶺南寄生叢神木萬㸃葳㽔攢老槲漫山麄俗那足道可惜幽人在空谷藝畹從知傍水涯孤芳一任荒榛曲一朝下上随天風賢哉大夫如此松移根千尺摩蒼穹雨露黙與神靈通本榦蕃滋枝葉茂秋花淺碧春芽紅夜半小兒思引手空際驚霆逢鬼守道傍老樹空輪囷電尾煜煜燒為薪蘭兮蘭兮性守貞木有本兮水有源藤牽葛附爾何取縱得榮華非本根飛鸞橋曉起望驛堠晩飯投山村衡州十日來日苦風雨昏泥塗鞾韈不得洗快心娯目誰復論朝來灘聲作雷吼雪浪遥齧蒼山根僕夫顧我歎中心増勞煩俄然絶境得披豁長橋逺跨羅水源横亘三百尺連延二十門雲中忽投駕海霓潮上倐露浮天鵾憶昔行人久病涉浮梁連筰随波翻萬夫徙石鎮蛟穴千鎚積鐡防鯨吞重添飛樓臨縹緲更架傑閣聴潺湲我來一步一移目四山蒼翠手可捫恍如平江風輭舳艫銜尾過下水㣲見舒舒旛又如康莊之道接軫數十乘蹶張詎有犢破轅若施帷幕布瑶席便合歌舞行金尊天寒轉惜水勢減不及春夏看崩奔好景潛已移過眼那復存後山冥濛霧雨繁前山嶔崟虎豹蹲憂虞苦多安樂少一身萬里勞心魂自江口放船入洞庭千山萬山㫁極浦暮烟蒼然俯平楚浮空雲夢細莫數洞庭七百天奥府日東月西相吞吐環混宇宙自振古潛蛟老龍蓄雲雨湘妃漢女迭歌舞我來落景巴陵東萬頃漾作金盆紅塔勢矗矗烟濛濛滉瀁恰得生㣲風斜挂帆席推庳篷快哉手招浮丘翁岳陽樓髙翠嵌空君山螺黛盤當中磨崖碑青螺蜀棧真危哉西下逝水寜東迴移軍六合巻清霽中興大業由天開衡山山人謁靈武魚水道合無暌乖桓桓忠勇李與郭手執枹鼔如霆雷姦㓙滿盈神鬼怒將相和協功名偕金妃木母火當殪刲屠家禍誰胚胎二京收復凱歌入父老泣下長安街煙花紫禁列冠冕龍車鶴駕青春囬艱難秦越共肝膽安樂骨肉相嫌猜飛龍小兒竊國柄表裏宫掖亂所階長慶樓空夾城閉玉房朱户生青苔凄凉西内情尚爾摘𤓰况自歌黄臺漫郎摛辭意深痛涪翁弔古留餘哀春秋史法非頌體石湖晩出空譏排平生兩眼熟拓本愛此片石江山隈蓬州垂老嗟逺竄嵗久妙墨重摩揩攝衣拾級厯千尺孤亭下瞰雲濤堆撫時感舊増歎息啼猿落月同徘徊我行二首我行亂山間登頓力已勤下踏欲崩石上穿始生雲隂霾錯昏晝髙低亂氤氲一身塗路長何由息勞筋天邉有㫁翼哀鳴呼其羣山外啼清猿凄㫁詎可聞官道人烟絶空見水沄沄頻年困兵戈誰戀榆與枌比者賊雖滅尚未囘官軍飢腸已雷鳴日暮况風雨遥望蒼山根晩横煙一縷僕夫舉示我喜色上眉宇叩門乞酒漿安眠借廊廡相視但睢盱誰解相噢咻懐哉佳主人逆旅心獨苦窮山多盜賊深夜走豺虎防身有何術㣲命賤如土湘山寺二首花雨飄寳幢㣲風韻塔鈴馴鴿上齋鉢老僧閒誦經客子入門來佛燈晩熒熒被徑蔓蘿葛聞香啓幽扄法界優曇華三嵗始一零寺有千日蓮三年一開落廊深苔蘚古地僻草木靈緬惟咸通來日月如奔霆頎然金粟老彷彿長眉青林喧鳥知曙鐘殷寺初曉踏石穿煙霏屈曲羅翠篠暗泉尋石罅海眼逗雲表湘流去逶迤青山明鏡繞雲重巖岫複水逺鳬鷗小平生慕躋攀志與禽向矯香門昨夜夢一去堕縹緲悵焉解纜行飛鞚尚林杪桂林使院呈石林編脩漏永凄風響閣鈴語䦨殘燭尚熒熒五湖南下悲身事百粤西來傍使星枕石本難欹處稳看花不擬醉邉醒途窮肯問諸侯禮歌舞筵中酒肉腥時中丞以下皆請相見謝不往也話蜀中事尚餘苦熱在秋林更帶蠻溪水毒淫三峽波濤似雷吼誰言如綫復如鍼納凉薄扇輕羅稱野情筠牀筒簟有餘清孤懐能到古人少萬感盡從閒處生倒挽九牛真細事獨扛百斛亦空名西風取次成追憶鱸鱠何由入旅羮讀陸辛齋先生感事詩寛大何來見賜租催科日夜下臺符七言字字堪揮涕一幅流民鄭俠圖夜中大風雨得二絶句巴陵南下嵗將徂駭浪驚風走畏途今夜聴來孤枕上恍疑身又落江湖尚有輪囷醉膽横十年心事短歌行墻根老樹縁何意也作冰河鐡馬聲秋月一首寄家兄自從漢江來六見月圓缺徘徊穿房櫳曲折散林樾清輝豈不美可惜照離别攬衣步前除夜久衆星沒惟餘短墻下露冷草蟲咽念我同懐人踟蹰待明發野步散步聊乘興斜陽獨自來鳥鳴松逕寂風過竹扉開種菜先除蝗燒田尚􅓑灰村童訝客至三兩互驚猜牛羊下隴坂墟屋上炊烟野店殘陽路山橋落葉邉蒸壺親候火穿筧細分泉閒覺為農樂供家不用錢䟦喬石林編脩使粤集後使節南溟萬里長乘潮解纜興徜徉玉堂人物風流在泥酒遊山總不妨桂管歸來已二年眼中厯厯舊山川傷心灕水闗邉路一度看詩一惘然讀汪叔寜見詒之作兼懐令弟蛟門比部㡬將摹擬笑當塗陶謝風流今在無只有韋家好兄弟詩如水淡見工夫日暮散步登城西樓積雨始晴霽欣然試出門㫁煙生委巷殘照入孤村畦長新蔬甲池添舊水痕獨遊人迹少一一看鴉翻雉堞參差外江湖俯仰中危樓坐凭眺秋色敞虚空𣺌𣺌帆檣影蕭蕭蘆荻風翩然幽興在且欲問㝠鴻寓目即成趣荒村小市邉瀰漫分野水䆉稏對秋田隔壟呼牛笛歸人採芡船為農真自樂辛苦得豐年歸路猶延佇佳時惜易過人投暝色去寒入袷衣多䦨閙煙中鴨陂荒雨後荷小詩聊記取有興即髙歌别喬無功感時無那嵗嶒嶸轣轆征車想去程冰合河壖狐過迹雪晴江上雁歸聲異鄉兄弟依依在落日郊原莽莽平尚計為君留十日酒邉豪氣正縱横簡喬雲漸淮南插脚二年住嵗月過眼如迴飊蠨蛸入户蛬繞砌時慰幽獨來朋交書巢風義我師友一見便歎髙山髙叩門造請敢辭懶木鐸謬與黄鐘調君真採擇及葑菲明信謂可羞溪毛巷南巷北燈火近舎西舎東夢寐遥酒杯茗椀時到我肯令三日無佳招愛君散髪卧江海風味頗似斜川陶平生俗事不挂眼朱黄㸃勘忘昏朝詩騷苦語肺腑出自煮何啻河魚膏昨遣髯奴致雙鯉始聞謝病收羣囂遥知秋堂冰雪冷鳴簷夜雨風蕭騷要從歡喜生㣲恙用山谷語吾詩聊可供談嘲湖平木脱煙水濶獨雁呌羣天寂寥魚舠放浪發興極一閒脱手誰能邀少須健飯續前㑹三五同踏城西郊天公此福未吝與待放海月生烟梢閏六月二十日王方若生日為作長句王郎生時六月閏到此始經三度逢乘除强弱到六厯坐覺儀象羅心胸古人推算法則爾為子誇説如竒蹤君當招客我當賀一飲三百玻璃鍾西風初生梧䇿䇿劇暑未退號莎蛬海東月上聲影絶秋河一道來摇溶擥衣四顧莫歎息且變愁寂為歡悰明年四十君始滿赤手往看騎生龍不爾南山北山裏一鍤便作躬耕農鬈鬈垂髮百嵗母二頃亦可謀尸饔況兼兒郎好筆牘阿侯玉雪看姿容一生辛苦母乃僻那用萬户争先封是時我亦尋舊隐江南的的圍羣峯山兄漁弟足瀟灑墨場酒地思追從短篷倘肯勤過我待掃花徑呼諸儂詩成放筆一大笑隣寺忽打煙樓鐘贈王崑繩秋風颯颯吹驚沙横林一抺飛霜花掩闗窻户忽已冷日看髙樓盤棲鴉俄傳有客訪我至姓氏久遣傍人誇東陽大小吾所羡得一已足慰蒹葭悲歌感慨燕趙士翻與江左争風華掀髯為我論作者直欲上古窮羲媧中間雅鄭各判别往往麗則兼淫哇蟬連入耳意不厭妙語散出紛天葩君來十日未為久造請忙似逰春車我亦時過話詩律歸路每待㣲陽斜城北喬生吾好友主既不惡賓殊嘉花箋小幅日召我道此篤愛無疵瑕明燈絮語似夢寐酒杯吟巻忘天涯五更燭跋未肯住直待東海升青霞裁成長句貽贈我龍騰鳳翥相紛拏憑陵意氣流輩少似子筆力誰能加我詩委靡媿大手氣懾不振惟咨嗟留題紙尾亦徒爾聊復贈行當馬撾寄汪舟次檢討如瘖思語每掉舌如飢説食先流涎鯫生獨坐空館裏側想逰屐心茫然青鞵布韈性所好欲往追躡無因縁傾城燈前上元夜坎坎伐鼔歌喧闐待公不來踏筵舞浮江一舸春風顛光隂蠶市憶故國旅夢常繞東南天傳聞使者近持節煌煌千騎來聫翩旌旄遥駐御史府笳吹時到西湖船正逢四月五月後梅雨洗出山娟娟探幽要使單騎併選勝不惜衣裳褰題名山寺三百六傍人擬作飛空仙酒酣倒吸波底月筆落遥散風中煙鳳閣文詞新有様翰林風月誰當傳歡逰自歎不同賞空憶倒載迴朱駢秋風初生木葉脱我欲歸掃三椽眠是時公倘未即去便合一日争千年偶成梅花嬌小杏花憨此段春愁了不堪一蹴輕絃雙燕子喚囘歸夣到江南酬潘廣文匡主見貽四首大雅委荆榛斯人久寥落吾生苦不早心迹長寂寞窮年抱遺經㣲尚夙有托誰能導其源浩浩觀海若海上有君子身老道益尊讀書七十年細大悉討論檀弓言物始讀學百不存歎息耳食子焉能窺籬藩忠義在天下皎若行白日卓哉三四公廣文昔與㡬社陳夏及吾鄉陸陳諸公游事載史臣筆君今老書生奮袖談一一行成稗官録用以補闕逸我昔逰呉中竊窺一語妙廣文以事落職今復為諸生今兹淮南路半面接言笑晩將零落意託契到年少張裴彼何人往事重憑弔題喬子毅小照白衣青舫得閒身㡬曲霓裳一幅巾池上風流今在否相看已是巻中人刦火銷沈嵗月遷不將人事擾天全朱顔綠髪還如昨彈指過來廿八年柘水舟中遇大雨青天蕩蕩忽變色黒雲如山􅑬嵼立一條倒掛日脚明萬弩齊張雨㸃急時來自是風雷㑹幽處如聞鬼神集吾舟小比蝸牛廬苦怨腸饑衣更濕樂哉頃刻移隂晴雨過猶帶龍涎腥縱横亂赴塘下水磊落已見天邉星蛙鳴池上聲閤閤螢流草際光熒熒谿回漸近人語閙依約㡬㸃籬燈青觀俞錦泉家樂我醉來為蘂宫客丹梯直上三十級紅牙檀板才一聲珠裙美人雁行立平開寳靨玉色勻小曵羅襦香氣襲誰其主者芙蓉仙紫衫兩部迴春妍雲窻霧閣到今夕絶藝一一誰争先白雨催來羯鼔㸃緑腰撚出琵琶絃宜春院中搊軋筝雙成座上吹和笙一枝鐡􅐟水龍吟三尺玉簫雛鳳鳴忽聞清音起重叠姊妹桃根復桃葉等閒聽出猶可憐况是蛾眉好腰衱歌扇新開瓊樹花舞衫舊罥春風蝶不記今宵正三五璧月中天夜巳午哀絲急管爛不收肯捉回鞭踏街鼓巴牋叠幅當報投更索鬪酒飛觥籌狂言一發驚座不欲為越女三年留贈兩淮廵鹺六首大海環東萊滄波𣺌無極明公生其間昂藏萬夫特早入承明門丹臺動顔色許身良卓犖當官必正直謨謀見真儒獻替賴羣力翽翽朝陽桐威鳳占五徳古者設諌官上可比宰相君不及堯舜心恥常怏怏直前論事時百折氣逾壯公來簪白筆髙議殿廷上時清主既聖直道少疑謗還聞補五絲辛苦意不忘三代制國用其本在力田後世算錢刀利盡民力朘俗儒每病此我見不謂然山海天地藏百姓詎敢専但勿較分銖寛大衆所便今看周孔心未讀管晏篇緬惟鄭公鄉乃在公井里淵涵富經術千載繼前軌上之窺皇墳下遂逮子史餘事為詩言雅音被宫徴銀鈎勤翰墨爛爛光照几豈徒風節殊廷諍傳諌紙嚢無金門粟家有珠履人名流例愛士黙黙情自親道義收礲錯詩書浩涯津琰琬韞已輝椒房香可紉乃知氣類廣更歎品藻真引領仰末風願言揖後塵二年都城客取友素心最側聞公子賢一見下交葢是時迫嚴冬雪意飄酒外風流甫觴咏馬嘶促行斾怊悵猶至今歸帆亦呉㑹通門懐半刺節下整襟帶海陵官舎送馮大木歸徳州限韻江上昔相見秋風紅蓼時廣陵斗酒别殘雪挂松枝荏苒過三月殷勤贈片辭冷灰離恨劇屬思未嫌遲千里歸心疾聴君醉後談此宵唯接燭何計可留驂玉鱠輕飛雪朱盤脆擘柑且留今夕夣猶自遶江南别袖牽仍絶征鞭挽不停路分殘月白詩待逺山青磵口肩雙兎沙頭倒一瓶只應憐寂寞晤語憶寒㕔我數東歸近幽居興未涯雪消看種秫土潤遣移花湖雨千絲細江雲百尺斜㡬時君一訪烟水認浮家懐清堂集巻一
