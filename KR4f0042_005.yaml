body:
  text: 懐清堂集巻五吏部侍郎湯右曾撰贈喬石林侍讀四首南宫風月已多時得路煙霄去較遲閒與墨卿為職業冷看芸府是曹司闗心小貯銅匜火過眼慵爭玉局棊那更宦途論巧拙䕶花累石足幽期有才如此合騰鶱尺一俄聞詔㫖傳泚筆露分仙掌上題名香繞御屏邉遭逄魚水眞千載顧盼風雲便九天第五何因減驃騎品題況自玉皇前漫將鉛槧笑儒丘稽古榮看禮數優一賦舊曾傳豹尾七年今始上螭頭清班曠典知無愧密侍殊恩可易酬公等自堪當世用不徒文采重枚鄒每逢下直即談經萬巻書圍一草亭筆海濤聲天𣺌𣺌墨池雲氣雨冥冥山圖落手懐孤徃酒地當杯笑獨醒蕭散肯容無事在即看魁下是三星題殷彦來歲寒吟集後先有漁洋山薑兩先生贈句歌聲金石出閒居氷雪崢嶸歲漸除誰解何郎有佳句一時沈范兩尚書王赤抒舍人署其齋曰野航邀共賦詩因次原韻淺浦深灣一葉舟粳炊船尾鱠船頭滄波倚檝心常在畫舫名齋事更幽虹貫月時隨蕩漾浪如山處盡遮留舍人懐抱清於水閒詠陂塘菡萏秋花朝實君儀部招同諸子小集分韻得山字鋤字飲食煩君召疎慵笑我頑酒宜排日醉人趁一春閒坐覔林中草心貪雪後山百花開漸近鳥語變闗闗手自營珍味交親意有餘未嫌官俸薄常恐酒杯疎䱉蟹門生議缾罌隔歲儲艱難吾後約菜把出烟鋤送式如姪南歸蓬山芸閣賸閒身雨雪春來卧浹旬職事敢論三代史俸錢不救一官貧庾郎鮭菜無兼味謝氏烏衣有雅人每念竹林前會在愛君談麈徃來頻買得青帆欲渡江脩門别路水淙淙笑人多蠟㳺山屐為我歸營聴雨忩迸石斑斑牆外筍撥醅灔灧臘前缸燕雲吴樹勞相憶夢裏煙波尺鯉雙送履中長老沒膝街泥雨雪頻苦留莫漫笑因循師應桑下仍三宿我已花前負一春衣鉢只如飛鳥跡江山好在野雲身十年座下稱都講的有香門未了因賜金園圖歌為桐城尚書作今之元老桐城公廿年論道蓬萊宫手捫星辰夾日月蒸為甘雨嘘和風許身眞當稷契比髙志夙與煙霞通公家樅陽好巖壑楚山不斷青摩空龍眠翠壁看面面亂入窈窕穿􅌑瓏山莊李伯時故址留粉本公亦别墅環其中敞開堂軒複架閣密挿楊栁疎栽桐徃年兼金賜内府特以開鑿煩神工珍材豈分岱畎北異植或徙温房東君臣契合恩禮異書䇿所載誰能同我公風尚秉清素恥以富貴誇豪雄門前五畝耦沮溺但課歲事觀農功雨餘丰茸春稻緑霜後䆉稏秋塍紅愛山豈必山中人我聞此語東坡翁公方為國作梁棟明堂九室凌蒼穹鑑湖未須乞於越緑野漫自憐髙嵩栖丘飲谷事豈易逺夢空逐歸飛鴻虞山逸老妙圗畫紙尾薄技餘雕蟲公之文章浩河漢下笑涓滴流潨潨它年從逰許裵迪千里會買煙江篷病中查悔餘以詩見懐即次原韻蕭然敝几倦猶凭僮觸屏圍唤不譍病覺雪風侵骨泠貧憂藥物與年增濛濛自䕶藏灰火冏冏長懸照夜燈多謝先生好詩句愈風檄手更誰能送陳斐公南還二首䙰褷殘雪照河干送爾煙波倚櫂還愛弟心傷春草碧老親健喜舞衣斑隱居學道人爭許獨行持門事本艱竹傘藤鞵泉石路多應難似舊時閒俗學眞羞禄可干草堂歸夢羨君還雨餘翠竹穿忩小花下紅魚嚼影斑靜愛著書人未老貧憐負米歲方艱它時夜語香燈灺照盡恒河悉等閒次韻張聲伯孝亷見寄早攜綵筆壓神州兄弟才名入選樓不少吹嘘得任沈獨將風格繼梅歐聮翩宦跡青雲上屈注詞源碧海流遥想新詩滿河隴太行冰雪擁前騶題朱北山寒雀圖芭蕉葉枯霜已裂臘梅枝凍雪欲折寒雀忍寒拳兩翼橋邉何者彈古舌去年所種籬間雜花次第皆放一年前此挿花叢也有滋培長飬功小草無名雖瑣細孤根得地亦青葱經春雪大開差晩直北風多掃易空牋乞天工同愛惜數枝婀娜照簾櫳與張九如表叔夜話人生常飄飄風雨從所適五年如夣寐半面此良覿落身簿尉中趨走上官檄王程無東西氷雪就逺役長安僦居住斗米太倉糴通懐任舒巻豁意寫肝鬲我時困尫羸終日卧向壁殷勤數問訊藥餌巾蒙羃先生丈人行髙曾舊親戚猶記我童孩繞床梨棗覔巢傾故家燕管咽隣人笛念舊增歔欷撫時入感激於今太夫人濟上且安宅雖衰猶善飯至孝神理格尊前一杯酒聊用減憂慽晨鳬市已買早韭畦可摘歡㳺二三子情話朝及夕君留能兼旬夜忩待虚白合肥相公居廬三年常有白燕翔集作詩寄呈禎祥召有由幽隱理不隔允矣大孝人天地為感格我公曾閔性純懿洞金石禄養四十年愛日慮彌迫出踐百僚上丹青炳功績入侍慈母顔嬰孩伺喜戚臨危呼蒼旻籲禱躬自責淚盡屬纊辰血灑衫袖赤乃知終身慕萬口争歎息朝廷恩禮殊中使問絡繹煌煌貞松字寵命至尊錫碑綍歸阡原辟踊臨窀穸惻愴三年䘮倐若駟過隙骨立居倚廬長號晝連夕悲泉夜濆涌枯樹秋蕭摵寒吹振空山凄風結廣陌靈禽海上至皎皎刷毛翮䙰褷冰雪姿暎此麻衣白飛鳴不無意下上從所適終朝户庭間棲止松與栢徃者夢投懐瑞世生旦奭今兹幽埏上感召精誠積世衰行誼薄頺波藉公激豈惟在廟堂名德樹準的即今苴絰際坐見風俗易元化調鼎台人倫篤儒碩載賡白燕詞史乘流舄奕晨起聞同舍諸君有豐臺之㳺口占出郭休慿問訊書羣公作計未全疎醵錢先日謀沽酒好事東家許借驢一帶緑楊依水逺萬畦紅藥破煙初可知鄠杜㳺應徧卧病清愁忍笑予酬惠元龍庻常三首故人久疎索羸病卧逾時合藥期仍卜看花約屢辭細泉鳴石鼎鬬雀墮簷枝佳句勞相憶清愁罥亂絲載酒楚江上哦詩淮海濵風流前日事惆悵十年人移竹閒聴雨留花晩占春交情垂老大白髮數莖新三載蓬山住情親等弟兄青雲看後軰綵筆失先生土肯埋龍氣風須送鶴程蹉跎君莫歎得酒再三傾題悔餘蘆塘放鴨圖同錢石臣用鴨字昔者崔白與徐熙各各蘆塘畫秋鴨君從十年圖此本千里隨身在行笈江湖塵外饒啄食寒暑囊中等裘箑浮漚漾影光動揺接荇穿蒲波唼喋豈同先生住甫里亦與好景共清霅君才如掉溟渤鯨出語能令萬夫壓六鰲一釣連龍伯下笑䦨邉觜啑啑道士鵞寧有意籠海濱鷗本無心狎秋堂夜雨重把巻卧病經時寒白袷也知幽事同襟期恍與髙人接眉睫幾時倚槳隨君去出險心如下䕫峽驚濤擺闔駭浪輸淺水蘆花夢猶怯君家兄弟深契託豈比恒情稱欵洽不妨詩酒成三人共宅清漳我應夾南隣叩門船肯借北闕朝天履休趿識路知歸暝向村沿流自逺晨放牐家鷄野鶩莫分别聚訟紛然議禘祫只今秋帆理數幅别酒盈尊且勤呷閒來放鴨偶爾爾畫裏看人空劫劫桃弓休問踏浪兒卿去還應用卿法初秋病中遣懐四首一夜西風颯已秋雨餘㣲潤在衣篝暄涼候覺陰晴異造請忙因疾病休碧蘚嫩初侵露砌夕陽沈更暎簾鈎不巾不韈差疎快望裏橋虹晩欲收鶴長鳬短總堪嗤忍病清齋燕坐時食蛤蜊寧知許事索檳榔乃笑長飢可知說士甘扵肉差喜談兵畧似棊倦即髙眠醒便起半縈香篆上銅匜歸歟鄉井興何如菜把難營隙地鋤世上争能無事事閒中聊復借書書鷄蟲得失何闗我蠻觸紛紜可笑渠痩骨年來無一把棲心只合在清虚幽處微聞草木香安排筆格與茶牀雅思對客聞才語暇輙繙書檢藥方芝桂膎胰隨措置龍蛇虎鼠任料量蓬頭散帯丘明士吐論縱横或未妨題項霜田秋樹讀書圗司空三十車一過不再讀豈知瑯嬛洞萬籖未流目況復千年來煙海浩簡牘寶裝不觸手緹褁空架屋予生雖苦晩好古念久蓄幽森皇墳書寶秘金石録涓滴乞殘瀋氤氲丏餘馥所恨椎魯姿伸紙必三復得一九已忘枵然負此腹年來更蕪廢塵土盜寸禄狐史一筆無空名濫史局此心耿耿在詎便髙閣束譬如撥灰深温黁火猶宿每逢佳士語輙接遥夜燭徐徐涉波瀾浩浩脫邉幅君從故鄉來别更六寒燠平生舊㳺好命駕煩屢辱時時歌新詩清音戞寒玉興來為長句千言筆應秃旁𨽻史乘事朗若目親矚劉郎真善人能使家令伏自春卧羸病擁被苦瑟縮喜君談天口博辯如灸轂東方多澹辭詼啁語尤酷君才實具美分了十人足酒邉徴雅令猶足咜庸俗我雖愧如歸君每來不速錙銖較文字粗糲饜蔬䔩秋期整歸鞍湖海興已逐攜持視此圖令我紙尾續一編秋樹根溜雨蒼皮蹙金天爽氣豁眸子湛秋緑行當借一鴟從君舊山麓雖貧或未害日煮二升粟題折枝荷花圖蘭橈桂檝倚來頻翠葢紅妝晩更新不用鑑湖三百曲一枝留待若耶人題王赤抒納涼圖取少陵竹深留客處荷淨納涼時詩意寫得新圖野趣長恍遊竹逕過蓮塘風開月影一林瘦雨作湖聲六月涼髙節最宜霜後色苦心猶帶水邉香先生標格氷壺裏未省人間有暑光正月十三日東江席上同姜西溟趙蒙泉吳元朗張漢瞻宫友鹿用子瞻岐亭韻東風吹何時栁色染新汁連朝曉夢裏花朶壓紅濕入春春未動馬蹄空得得閒來叩君門推甕飲須急不知陂塘外拍拍幾鳬鴨喜心刲鮮腴暖氣上巾羃聞君宦㳺樂腰下金帶赤愛君名士風手中羽扇白談諧二三子取醉半墮幘酒酣哦新詩詩成鬼應泣纎纎月始生旋圓俄復缺人生幾良會珍重座巾客年年試燈期莫忘此宵集再用前韻送王雄飛之陽山六年勤過從墨費幾斗汁半從酣醉後霑灑衫袖濕浪擲虚牝金與君兩何得不知空釡裏飢腸轉逾急閒來繞階除羣心妬花鴨君如瑚璉器蹔用疏布羃玉川一先生并少婢脚赤故園刧火後彌望衰草白書劍久飄蓬髮疎不滿幘才髙身欲老相對如雨泣寧甘伏櫪歌未用唾壺缺賢侯在中路行矣萬里客期君嶺海隅維舟或來集徐道積招集碧山堂感賦仍到司空綠野堂酒人詞客舊歡場一生知已傷存歿十載逢君各老蒼天上鵷鸞堪接武尊前鴻雁自成行闌干十二春風地幾樹繁花月似霜賦得明月照積雪次新城公韻幽尋耿無寐滅燭夜分時起視雪千里微明月半規寒光坐超忽素影共䙰褷誰似王夫子巡簷獨詠詩匏瓜小園親種得苦葉覆柔條老藉霜斤斷輕留竹杖挑無風聲寂寂醉月影蕭蕭歲晩南村外巢由好共招與雄飛飲畢爾榮宅主人夜話塞上戰功殊可喜也小來氣決早知聞老去談兵尚一欣曾擊驍騰雲下賊盡驚鼓角地中軍紅燈愛就文人語繡甲親從武庫分駐蹕山前鏖戰處白衣誰省舊功勲曲阜顔太宜人七十壽三首華胄傳鄒魯賢聲著郝鍾璇閨聞内則畫㦸自名宗峩嶺千尋雪天陵百尺松長應紀彤史令德偹温恭最憶傳烽日城危壓陣雲九秋霜遽肅七日玉幾焚刃血殷重袖冰心凛一軍閨帷有竒節瀛海接英芬仙苑三珠樹爭看繞砌栽隔紗由母教視草見門才小劫銷沈後還丹次第來鸞封下重叠令序正恢台上掌院彭公四首崇朝已遍泰山雲亞相名髙海内聞此日師儒尊五緯向來物望重三君回天事每聞朝右掩巻詩常聴夜分一様勒銘鐘鼎在却輸公是寄斯文鶴書曾記日華東朶殿晴開曙色紅萬里清文羅闕下百年遺老訪淹中量才誰是淵雲敵下筆真無枚馬工天上寶書題第一五花香散墨池風十年芸局淡延襟别有耽佳好古心半篆香邊看冉冉八騶車下任駸駸間隨客品酒清濁愛讀書如山淺深只有濟南王學士時時花底共微吟五閲仙翁日月壺憶從槐市列生徒人間名字榮諸葛閣下文章比大蘇久識㳺魚潛沼樂待攜野鶴出林孤舊師仍是嵩陽客笑奉金箱五岳圖莽式歌莽式者樂舞之名也歲以季冬𨽻習禮部畧如古者百戲之屬甲戌十二月十四日余得寓目乃為作歌季冬臘日烹黄羊儺翁侲子如俳倡嗔拳雜伎閙里社細腰疉鼔喧村場太平有象自廊廟五兵角觝修總章春官都試平旦集萬人聮袂東西廂南箕北斗供摟􅔊繁絲軋竹同清揚闝驚出林吼虓虎很訝當道蹲封狼劃然忽變戰場態金戈鐡馬聲鏘鏘左旋右抽嫻進止先偏後伍紛低昂弓彎不射刃不斫徐以一矢定寇攘髣髴觀兵耀德意詎止武力夸多方帣韝鞠􅛏起上壽千年萬年歌未央昆明池頭夾棚路洛陽樓下列炬光麟洲小水跨鴨緑九部亦得諧宫商紫羅㡌邊挿鳥羽綘抹額上摇金鐺輕身似出都盧國假面或著蘭陵王盤空筯斗最竒絶如電䃱磹星光芒解紅俄作小兒舞文衣綷䌨顔􅀈霜戲馬䦨邊身便旋鬬鷄坊底神飛翔踏歌兩兩試燈節秧鼔面面熙春陽牽絲底用魁􅓓子阿鵲雅擅籧篨娘雙童夾鏡技渾脫晩出絶藝驚老蒼弄丸一串珠落手舞劍百道金飛鋩我聞殿前陳百戲緬昔制作傳漢唐魚龍曼衍雖技巧亦與民物闗禨祥賜酺懸知俗安樂拔河為卜年豐穰只今殿廷虡懸備兜離僸佅咸賓將鳴球拊石洽至德散樂亦預鈞天張恍從輶軒採謡咏正以鞮鞻懐要荒書郎羸馬久憔悴乍與鮑老同顛狂爰居縱駭鐘鼔饗舞鶴自應參差行千周萬帀狀倐忽舌撟目眩心蒼茫作歌形容莫究悉竊喜六律調歸昌東臯草堂看杏花歌清晨叩門折柬呼樹頭勸酒聞提壺芳郊走馬意不厭況有十里春風俱東畬曉烟林木暗一帶細草茸茸鋪萬錢几爼笑多事三月櫻笋煩新厨王孫天上本龍種文采復與常人殊喜聞佳士甘勝肉愛拂官紙柔於膚今晨召客昨宵徃先掃襌榻温僧爐香界庵前一把手兩腋風駕登煙途暈香亭子森翠繞細泉入盞浮雲腴風條露葉轉蒙密瞥眼仙杏花千株金明壓㡌十年事惆悵昔夢成老夫妍姿恰宜麗日暎憨態欲遣香雲扶看紅看白情未足惜花惜玉懐仍孤只今佳時促芳宴它日雅會思吾徒嬉春排日合洪醉東走脫兎西飛烏巾年絲竹本陶寫一串頗愛歌喉珠沙頭玉瓶酒不盡罍尊歡笑雜路隅栁條未放謝家絮蛺蝶新上滕王圖草堂重開割鮮罷更抄雲子炊彫胡城門曛黄歸轡急戀此光景留須臾鄉心毎念一區宅歸興空憶千頭奴羨君城南尺五地文酒之會無時無竹爐銅碾紛雅具清詞妙寄非俗儒東風落手先一笑芳徑未遂沾泥塗林亭韋杜倘許借斗酒更擬明朝沽送張卣臣學士祭告南岳尉候通重譯懐柔答萬靈天書頒北極祀事肅南溟衡嶽仙人宅文昌使者星九疑聨屬逺綵筆啟幽扄典禮修三楚提封接五谿烽銷青海北文諭夜郎西共識天威肅須令王會齊百蠻應震讋京觀築鯨鯢漢瞻南行詩以贈之如海長安城𣺌小一萍挂半肩寄圖籍兩耳聒梵唄時時從朋好清尊叙情話吾子昻藏人一徃喜疎快胸中九雲夢細碎肯蔕芥屢踏舉子場辛苦不得解蹉跎好名字尚有文可賣平生韓吏部混茫接髙派兩窮適相遭合豈待媒介愛如北方蛩㳺比南海魪吟牋拂詩成醉馬墮飲敗風流賭棊槊餘事猶為畫所嗟不得意青山涴塵霾西風一颯沓客子感秋屇結束還舊鄉修途逺行邁三年慈母心笑口北堂拜家臨太湖水朝夕看澎湃青蓮網白棘果否路荒怪幽居洵可樂即事足瀟灑相期春雨餘行園翦新薤懐清堂集巻五
